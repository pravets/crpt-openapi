info:
  name: Метод получения зарезервированных номеров партий
  type: http
  seq: 5
  tags:
    - Подача сведений
    - Резервирование партий

http:
  method: GET
  url: "{{baseUrl}}/party-numbers/list"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/party-numbers/list"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "partyNumberInfo": [
              {}
            ],
            "createdDateTime": "",
            "gtin": "",
            "partyNumber": "",
            "productGroups": [],
            "productionDate": ""
          }
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/party-numbers/list"
      method: GET
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  Метод предназначен для получения списка зарезервированных номеров партий для товарной группы «Молочная продукция».

  Тип приватности: приватный.
