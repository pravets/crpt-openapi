info:
  name: Метод резервирования номеров партий
  type: http
  seq: 4
  tags:
    - Подача сведений
    - Резервирование партий

http:
  method: POST
  url: "{{baseUrl}}/party-numbers/reserve"
  body:
    type: json
    data: |-
      {
        "pg": "milk",
        "partyNumber": [
          "04867777774906250214JiMTBbbbJ6zB",
          "04865555554906250214JiMTMmMmJ6zB"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/party-numbers/reserve"
      method: POST
      body:
        type: json
        data: |-
          {
            "pg": "milk",
            "partyNumber": [
              "04867777774906250214JiMTBbbbJ6zB",
              "04865555554906250214JiMTMmMmJ6zB"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "inn": "",
            "partyNumberInfo": [
              {}
            ],
            "partyNumber": [],
            "gtin": [],
            "productionDate": "",
            "errorMessage": "",
            "errorResult": {}
          }
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/party-numbers/reserve"
      method: POST
      body:
        type: json
        data: |-
          {
            "pg": "milk",
            "partyNumber": [
              "04867777774906250214JiMTBbbbJ6zB",
              "04865555554906250214JiMTMmMmJ6zB"
            ]
          }
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  Метод предназначен для резервирования сгенерированных номеров партий вне Системы маркировки для товарной группы «Молочная продукция».

  Тип приватности: приватный.
