          }
  - name: 403 Response
    description: "2.9. Код 403 при недоступности функциональности товарной группе, когда нет тела ответа от компонента товарной группы:"
    request:
      url: "{{baseUrl}}/lk/documents/create"
      method: POST
      params:
        - name: pg
          value: ""
          type: query
          description: Товарная группа Cм. справочник «Список поддерживаемых товарных групп» . В параметре указывается кодовый идентификатор товарной группы
      body:
        type: json
        data: |-
