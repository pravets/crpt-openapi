          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_message": "JSON parse error: <описание ошибки>"
          }
  - name: 401 Response
    description: "2.1. Код 401, если не указан токен:"
    request:
      url: "{{baseUrl}}/lk/documents/create"
      method: POST
      params:
        - name: pg
          value: ""
          type: query
          description: Товарная группа Cм. справочник «Список поддерживаемых товарных групп» . В параметре указывается кодовый идентификатор товарной группы
      body:
        type: json
        data: |-
