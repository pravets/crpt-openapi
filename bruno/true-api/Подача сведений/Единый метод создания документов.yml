info:
  name: Единый метод создания документов
  type: http
  seq: 1
  tags:
    - Подача сведений
    - Подача документов

http:
  method: POST
  url: "{{baseUrl}}/lk/documents/create"
  params:
    - name: pg
      value: ""
      type: query
      description: Товарная группа Cм. справочник «Список поддерживаемых товарных групп» . В параметре указывается кодовый идентификатор товарной группы
  body:
    type: json
    data: |-
      {
        "document_format": "string",
        "product_document": "<Тело формируемого документа, закодированное в base64>",
        "type": "string",
        "signature": "<Откреплённая подпись для product_document, закодированная в base64>",
        "second_product_document": "<Тело формируемого документа титула покупателя, закодированное в base64>",
        "second_signature": "<Откреплённая подпись для second_product_document, закодированная в base64>"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 100 Response
    description: "2.10. Код 409, если для типа документа «AGGREGATION_DOCUMENT» передано более 100 уникальных партий набора или более 10000 уникальных номеров партий вложений:"
    request:
      url: "{{baseUrl}}/lk/documents/create"
      method: POST
      params:
        - name: pg
          value: ""
          type: query
          description: Товарная группа Cм. справочник «Список поддерживаемых товарных групп» . В параметре указывается кодовый идентификатор товарной группы
      body:
        type: json
        data: |-
          {
            "document_format": "string",
            "product_document": "<Тело формируемого документа, закодированное в base64>",
            "type": "string",
            "signature": "<Откреплённая подпись для product_document, закодированная в base64>",
            "second_product_document": "<Тело формируемого документа титула покупателя, закодированное в base64>",
            "second_signature": "<Откреплённая подпись для second_product_document, закодированная в base64>"
          }
    response:
      status: 100
      statusText: Continue
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_message": "Превышено допустимое количество элементов в запросе – передано {Количество переданных значений}, допустимо {Текущий лимит}"
