info:
  name: Метод получения актуального баланса на складе
  type: http
  seq: 24
  tags:
    - Сведения о КИ и товарах

http:
  method: POST
  url: "{{baseUrl}}/warehouse/balance"
  body:
    type: json
    data: |-
      {
        "gtins": [
          "04611111111111",
          "00022222222222",
          4833333333333
        ],
        "pagination": {
          "page": 1,
          "perPage": 100
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

