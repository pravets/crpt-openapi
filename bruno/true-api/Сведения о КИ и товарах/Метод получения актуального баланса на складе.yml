  - name: 401 Response
    description: "2.9. Код 401, если токен не действителен:"
    request:
      url: "{{baseUrl}}/warehouse/balance"
      method: POST
      body:
        type: json
        data: |-
          {
            "gtins": [
              "04611111111111",
              "00022222222222",
              4833333333333
