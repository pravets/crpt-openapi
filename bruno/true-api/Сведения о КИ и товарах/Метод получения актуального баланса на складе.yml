      url: "{{baseUrl}}/warehouse/balance"
      method: POST
      body:
        type: json
        data: |-
          {
            "gtins": [
              "04611111111111",
              "00022222222222",
              4833333333333
            ],
            "pagination": {
              "page": 1,
              "perPage": 100
