docs: |-
  Метод возвращает список кодов товаров с возможностью указания параметров фильтрации в запросе. Для товарной группы «Альтернативная табачная продукция» в ответе отсутствует информация по кодам товаров, добавленным с помощью пользовательского интерфейса или через « Метод создания и обновления товаров » раздела « Методы «Национального каталога» ».

  Тип приватности: приватный.
