info:
  name: Метод получения списка кодов товаров (GTIN) УОТ по ИНН
  type: http
  seq: 13
  tags:
    - Сведения о КИ и товарах
    - Карточки товара

http:
  method: GET
  url: "{{baseUrl}}/product/gtin"
  params:
    - name: includeSubaccount
      value: ""
      type: query
      description: "Субаккаунт Если значение = true, то в ответе возвращаются данные по всем кодам товаров: принадлежащих участнику оборота товаров и предоставленных ему через субаккаунт. Если значение = false, то в ответе возвращаются данные только по коду товара, принадлежащему участнику оборота товаров. Значение по умолчанию = false"
      disabled: true
    - name: limit
      value: ""
      type: query
      description: Максимальное количество заказов КМ в ответе Не более 10000 записей (по умолчанию 10 записей)
      disabled: true
    - name: page
      value: ""
      type: query
      description: Номер страницы ответа, начальное значение - «0»
      disabled: true
    - name: pg
      value: ""
      type: query
      description: Наименование товарной группы См. « Справочник «Список поддерживаемых товарных групп» »
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
