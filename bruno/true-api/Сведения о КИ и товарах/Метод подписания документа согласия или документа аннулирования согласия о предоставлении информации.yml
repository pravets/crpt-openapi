info:
  name: Метод подписания документа согласия или документа аннулирования согласия о предоставлении информации
  type: http
  seq: 19
  tags:
    - Сведения о КИ и товарах
    - Согласие на предоставление информации

http:
  method: POST
  url: "{{baseUrl}}/agreement-registry/publish"
  body:
    type: json
    data: |-
      {
        "documentId": "string",
        "documentType": "AGREEMENT",
        "signature": "string"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/agreement-registry/publish"
      method: POST
      body:
        type: json
        data: |-
          {
            "documentId": "string",
            "documentType": "AGREEMENT",
            "signature": "string"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "documentId": "string",
            "status": "string"
          }
  - name: 400 Response
    description: 2.В случае ошибки 400.
    request:
      url: "{{baseUrl}}/agreement-registry/publish"
      method: POST
      body:
        type: json
        data: |-
          {
            "documentId": "string",
            "documentType": "AGREEMENT",
            "signature": "string"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_message": "Параметры запроса заданы неверно или документ не прошёл проверку"
          }
  - name: 404 Response
    description: 3.В случае ошибки 404.
    request:
      url: "{{baseUrl}}/agreement-registry/publish"
      method: POST
      body:
        type: json
        data: |-
          {
            "documentId": "string",
            "documentType": "AGREEMENT",
            "signature": "string"
          }
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_message": "Документ не найден"
          }
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/agreement-registry/publish"
      method: POST
      body:
        type: json
        data: |-
          {
            "documentId": "string",
            "documentType": "AGREEMENT",
            "signature": "string"
          }
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  Данный метод используется для подписания документа согласия и аннулирования документа согласия. Перед подписанием документа согласия, полученного ранее методом " Метод получения тела документа согласия или документа аннулирования согласия ", удалить пробелы и переносы строк в теле документа согласия.

  Тип приватности: приватный.
