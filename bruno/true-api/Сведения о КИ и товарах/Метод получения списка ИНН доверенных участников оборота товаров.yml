info:
  name: Метод получения списка ИНН доверенных участников оборота товаров
  type: http
  seq: 20
  tags:
    - Сведения о КИ и товарах
    - Согласие на предоставление информации

http:
  method: GET
  url: "{{baseUrl}}/agreement-registry/trusted/:ownerInn/list"
  params:
    - name: ownerInn
      value: ""
      type: path
      description: ИНН доверителя
    - name: inn
      value: ""
      type: query
      description: ИНН участника оборота товаров
      disabled: true
    - name: limit
      value: ""
      type: query
      description: "Предельное количество записей Значение по умолчанию: 10"
      disabled: true
    - name: name
      value: ""
      type: query
      description: Наименование организации участника оборота товаров
      disabled: true
    - name: needTotal
      value: ""
      type: query
      description: 'Признак необходимости подсчёта суммарного числа записей Значение по умолчанию: "true"'
      disabled: true
    - name: offset
      value: ""
      type: query
      description: "Смещение страницы Значение по умолчанию: 0"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

