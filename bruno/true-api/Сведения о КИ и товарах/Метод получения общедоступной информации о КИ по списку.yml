info:
  name: Метод получения общедоступной информации о КИ по списку
  type: http
  seq: 2
  tags:
    - Сведения о КИ и товарах
    - Данные о КИ

http:
  method: POST
  url: "{{baseUrl}}/cises/info"
  params:
    - name: childsWithoutBrackets
      value: ""
      type: query
      description: Признак получения кодов вложений без скобок Параметр считается устаревшим и не рекомендуется к использованию, при любом указанном или неуказанном значении игнорируется
      disabled: true
    - name: pg
      value: ""
      type: query
      description: Товарная группа Cм. « Справочник «Список поддерживаемых товарных групп» »
      disabled: true
  body:
    type: json
    data: |-
      [
        "010460000000000021LLLLLLLLLLLLL"
      ]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

