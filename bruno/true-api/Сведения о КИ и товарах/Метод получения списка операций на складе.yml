docs: |-
  Метод возвращает список документов, влияющих на баланс склада участника оборота товаров, за запрашиваемый период (разница между начальной и конечной датами не более 92 дней) для товарных групп «Антисептики и дезинфицирующие средства», «Консервированная продукция», «Корма для животных», «Косметика, бытовая химия и товары личной гигиены», «Молочная продукция», «Морепродукты», «Растительные масла», «Соковая продукция и безалкогольные напитки», «Специализированная пищевая продукция и БАД к пище» и «Упакованная вода».

  На балансе склада ГИС МТ не осуществляется учёт по кодам товаров групповых упаковок и наборов. После успешной обработки документа, влияющего на баланс, в котором указаны коды товаров групповых упаковок или наборов, к учёту будут приняты только коды единиц товаров, вложенные в данную групповую упаковку или набор. Количество на балансе склада ГИС МТ равно общему количеству кодов единиц товаров .

  Тип приватности: приватный.

  В документации приведено несколько вариантов тела запроса (2); в спецификации использован репрезентативный пример, остальные варианты см. в разделе 5.11 документации.
