info:
  name: Метод получения тела документа согласия или документа аннулирования согласия
  type: http
  seq: 18
  tags:
    - Сведения о КИ и товарах
    - Согласие на предоставление информации

http:
  method: GET
  url: "{{baseUrl}}/agreement-registry/:id/print-form"
  params:
    - name: id
      value: ""
      type: path
      description: ID документа
    - name: documentType
      value: ""
      type: query
      description: "Тип документа Возможные значения: AGREEMENT - документ согласия о предоставлении информации AGREEMENT_CANCELLATION - документ отмены согласия"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/agreement-registry/:id/print-form"
      method: GET
      params:
        - name: id
          value: ""
          type: path
          description: ID документа
        - name: documentType
          value: ""
          type: query
          description: "Тип документа Возможные значения: AGREEMENT - документ согласия о предоставлении информации AGREEMENT_CANCELLATION - документ отмены согласия"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "documentRegNumber": "AR631208202400074",
            "ownerOrganisationName": "ОО�О \"X\"",
            "ownerOrganisationInn": "1234567890",
