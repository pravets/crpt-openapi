info:
  name: Метод проверки ИНН доверенного участника оборота товаров
  type: http
  seq: 21
  tags:
    - Сведения о КИ и товарах
    - Согласие на предоставление информации

http:
  method: GET
  url: "{{baseUrl}}/agreement-registry/trusted/:ownerInn"
  params:
    - name: ownerInn
      value: ""
      type: path
      description: ИНН предполагаемого доверителя
    - name: everyonePermitted
      value: ""
      type: query
      description: Признак предоставления согласия для всех контрагентов При необходимости подписания согласия для всех контрагентов значение параметра должно быть "true", при этом параметр "trustedInn" должен быть пустым. Заполнение обоих параметров одновременно недопустимо. При передаче списка ИНН доверенных контрагентов в параметре "trustedInn" параметр "everyonePermitted" должен быть либо пустым, либо иметь значение "false". Параметр "everyonePermitted" автоматически принимает значение "false" при передаче пустого значения
      disabled: true
    - name: trustedInn
      value: ""
      type: query
      description: ИНН доверенного участника оборота товаров
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/agreement-registry/trusted/:ownerInn"
      method: GET
      params:
        - name: ownerInn
          value: ""
          type: path
          description: ИНН предполагаемого доверителя
        - name: everyonePermitted
          value: ""
          type: query
          description: Признак предоставления согласия для всех контрагентов При необходимости подписания согласия для всех контрагентов значение параметра должно быть "true", при этом параметр "trustedInn" должен быть пустым. Заполнение обоих параметров одновременно недопустимо. При передаче списка ИНН доверенных контрагентов в параметре "trustedInn" параметр "everyonePermitted" должен быть либо пустым, либо иметь значение "false". Параметр "everyonePermitted" автоматически принимает значение "false" при передаче пустого значения
          disabled: true
        - name: trustedInn
          value: ""
          type: query
          description: ИНН доверенного участника оборота товаров
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "trusted": true,
            "expirationDate": "string"
          }
  - name: 400 Response
    description: 2.В случае ошибки 400 "Входные параметры некорректны".
    request:
      url: "{{baseUrl}}/agreement-registry/trusted/:ownerInn"
      method: GET
      params:
        - name: ownerInn
          value: ""
          type: path
          description: ИНН предполагаемого доверителя
        - name: everyonePermitted
          value: ""
          type: query
          description: Признак предоставления согласия для всех контрагентов При необходимости подписания согласия для всех контрагентов значение параметра должно быть "true", при этом параметр "trustedInn" должен быть пустым. Заполнение обоих параметров одновременно недопустимо. При передаче списка ИНН доверенных контрагентов в параметре "trustedInn" параметр "everyonePermitted" должен быть либо пустым, либо иметь значение "false". Параметр "everyonePermitted" автоматически принимает значение "false" при передаче пустого значения
          disabled: true
        - name: trustedInn
          value: ""
          type: query
          description: ИНН доверенного участника оборота товаров
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "string",
            "error_description": "string"
          }
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/agreement-registry/trusted/:ownerInn"
      method: GET
      params:
        - name: ownerInn
          value: ""
          type: path
          description: ИНН предполагаемого доверителя
        - name: everyonePermitted
          value: ""
          type: query
          description: Признак предоставления согласия для всех контрагентов При необходимости подписания согласия для всех контрагентов значение параметра должно быть "true", при этом параметр "trustedInn" должен быть пустым. Заполнение обоих параметров одновременно недопустимо. При передаче списка ИНН доверенных контрагентов в параметре "trustedInn" параметр "everyonePermitted" должен быть либо пустым, либо иметь значение "false". Параметр "everyonePermitted" автоматически принимает значение "false" при передаче пустого значения
          disabled: true
        - name: trustedInn
          value: ""
          type: query
          description: ИНН доверенного участника оборота товаров
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  Метод используется для проверки наличия у ИНН участника оборота товаров признака доверия в соответствии с согласием о предоставлении информации.

  Тип приватности: публичный (с использованием токена).
