info:
  name: Метод запроса списка агрегированных КИ
  type: http
  seq: 9
  tags:
    - Сведения о КИ и товарах

http:
  method: POST
  url: "{{baseUrl}}/cises/aggregated/list"
  params:
    - name: pg
      value: ""
      type: query
      description: Товарная группа См. « Справочник «Список поддерживаемых товарных групп» »
      disabled: true
  body:
    type: json
    data: |-
      [
        "010463333333333321KkKkKK",
        "010463333333333321NNnnNn"
      ]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/cises/aggregated/list"
      method: POST
      params:
        - name: pg
          value: ""
          type: query
          description: Товарная группа См. « Справочник «Список поддерживаемых товарных групп» »
          disabled: true
      body:
        type: json
        data: |-
          [
            "010463333333333321KkKkKK",
            "010463333333333321NNnnNn"
          ]
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "010463333333333321KkKkKK": {
              "010465555555555521KkKkKK": [],
              "010465555555555521TvvVvv": []
            },
            "010463333333333321NNnnNn": {
              "010465555555555521TvvVNn": [],
              "010465555555555521TvvVNN": []
            }
          }
  - name: 400 Response
    description: "2.2. Код 400 при пустом списке КИ в теле запроса:"
    request:
      url: "{{baseUrl}}/cises/aggregated/list"
      method: POST
      params:
        - name: pg
          value: ""
          type: query
          description: Товарная группа См. « Справочник «Список поддерживаемых товарных групп» »
          disabled: true
      body:
        type: json
        data: |-
          [
            "010463333333333321KkKkKK",
            "010463333333333321NNnnNn"
          ]
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_message": "В запросе не указан ни один КИ"
          }
  - name: 401 Response
    description: "2.5. Код 401 при отсутствии токена:"
    request:
      url: "{{baseUrl}}/cises/aggregated/list"
      method: POST
      params:
        - name: pg
          value: ""
          type: query
          description: Товарная группа См. « Справочник «Список поддерживаемых товарных групп» »
          disabled: true
      body:
        type: json
        data: |-
          [
            "010463333333333321KkKkKK",
            "010463333333333321NNnnNn"
          ]
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_message": "Токен не действителен. Необходимо получить новый токен аутентификации"
          }
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/cises/aggregated/list"
      method: POST
      params:
        - name: pg
          value: ""
          type: query
          description: Товарная группа См. « Справочник «Список поддерживаемых товарных групп» »
          disabled: true
      body:
        type: json
        data: |-
          [
            "010463333333333321KkKkKK",
            "010463333333333321NNnnNn"
          ]
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  Метод возвращает дочерние КИ первого слоя агрегата. В одном запросе можно указать несколько КИ. Запятая не интерпретируется как разделитель для параметров запроса, а считается частью самого параметра. Метод возвращает все слои для агрегата товарной группы «Табачная продукция». Для групповой упаковки товарной группы «Табачная продукция» метод возвращает все единицы товаров, для транспортной упаковки — все групповые упаковки.

  Общедоступная информация:

  Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).
