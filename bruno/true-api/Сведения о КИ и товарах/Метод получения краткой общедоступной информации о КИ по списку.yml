info:
  name: Метод получения краткой общедоступной информации о КИ по списку
  type: http
  seq: 4
  tags:
    - Сведения о КИ и товарах
    - Данные о КИ

http:
  method: POST
  url: "{{baseUrl}}/cises/list"
  params:
    - name: childsWithoutBrackets
      value: ""
      type: query
      description: Признак получения кодов вложений без скобок Параметр считается устаревшим и не рекомендуется к использованию, при любом указанном или неуказанном значении игнорируется
      disabled: true
    - name: pg
      value: ""
      type: query
      description: Товарная группа Cм. « Справочник «Список поддерживаемых товарных групп» »
      disabled: true
    - name: values
      value: "[]"
      type: query
      description: "Список КИ Значение АТК, КИ, КиЗ, КИТУ от 18 до 74 символов включительно без заключённых в скобки идентификаторов применений «01» и «21» для всех товарных групп. КиЗ для товарной группы «Товары из натурального меха» указывать в соответствии с 20-значным шаблоном: (RU|AM|BY|KZ|KG)[-]{1}[A-Z0-9]{6}[-]{1}[A-Z0-9]{10}. Пример: RU-430302-AAA7064491"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

