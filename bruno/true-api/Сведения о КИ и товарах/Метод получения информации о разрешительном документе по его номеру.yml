info:
  name: Метод получения информации о разрешительном документе по его номеру
  type: http
  seq: 14
  tags:
    - Сведения о КИ и товарах

http:
  method: POST
  url: "{{baseUrl}}/rd/list"
  body:
    type: json
    data: |-
      {
        "documents": [
          {
            "type": "STATE_REGISTRATION_CERTIFICATE",
            "number": "string"
          },
          {
            "type": "CONFORMITY_DECLARATION",
            "number": "string",
            "dateFrom": "2025-01-01"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/rd/list"
      method: POST
      body:
        type: json
