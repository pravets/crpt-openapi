  - name: 400 Response
    description: "2.1. Код 400, если не передано тело запроса:"
    request:
      url: "{{baseUrl}}/rd/list"
      method: POST
      body:
        type: json
        data: |-
          {
            "documents": [
              {
                "type": "STATE_REGISTRATION_CERTIFICATE",
                "number": "string"
              },
              {
                "type": "CONFORMITY_DECLARATION",
                "number": "string",
