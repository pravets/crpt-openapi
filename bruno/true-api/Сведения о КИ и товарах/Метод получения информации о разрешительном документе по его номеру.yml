          {
            "documents": [
              {
                "type": "STATE_REGISTRATION_CERTIFICATE",
                "number": "string"
              },
              {
                "type": "CONFORMITY_DECLARATION",
                "number": "string",
                "dateFrom": "2025-01-01"
              }
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "result": {
              "documents": [
                {
                  "type": "STATE_REGISTRATION_CERTIFICATE",
