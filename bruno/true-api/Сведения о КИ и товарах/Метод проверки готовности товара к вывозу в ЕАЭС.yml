info:
  name: Метод проверки готовности товара к вывозу в ЕАЭС
  type: http
  seq: 6
  tags:
    - Сведения о КИ и товарах
    - Данные о КИ

http:
  method: POST
  url: "{{baseUrl}}/cises/eaes/check-export"
  params:
    - name: countryCode
      value: ""
      type: query
      description: 'Код страны по справочнику ОКСМ Доступные значения: "112" – Республика Беларусь; "417" – Кыргызская Республика; "398" – Республика Казахстан; "051" – Республика Армения'
    - name: pg
      value: ""
      type: query
      description: Товарная группа См. " Справочник «Список поддерживаемых товарных групп» ". Если отсутствует, то поиск осуществляется по всем товарным группам
      disabled: true
  body:
    type: json
    data: |-
      {
        "codes": [
          "0111111111111111111111111",
          "0222222222222222222222222"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

