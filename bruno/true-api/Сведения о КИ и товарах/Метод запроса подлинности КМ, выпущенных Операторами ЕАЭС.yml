info:
  name: Метод запроса подлинности КМ, выпущенных Операторами ЕАЭС
  type: http
  seq: 5
  tags:
    - Сведения о КИ и товарах
    - Данные о КИ

http:
  method: POST
  url: "{{baseUrl}}/cises/eaes/info"
  params:
    - name: country
      value: ""
      type: query
      description: 'Числовой код страны по ОКСМ Возможные значения: 112 — Республика Беларусь; 398 — Республика Казахстан. При указании значения "398" (Республика Казахстан), в параметре "pg" может быть указано только значение "shoes" ("Обувные товары"). Все коды маркировки, указанные в теле запроса в параметре "cis", проходят валидацию на соответствие шаблону кодов маркировки страны, указанной в параметре "country"'
    - name: pg
      value: ""
      type: query
      description: Товарная группа См. " Справочник «Список поддерживаемых товарных групп» "
      disabled: true
  body:
    type: json
    data: |-
      {
        "cis": "0104655555555555212FFFFFFFFFFFF\u001d91LlLl\u001d9212345TtTtT12345TtTtT12345TtTtT12345TtTtTtTt="
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

