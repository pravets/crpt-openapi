docs: |-
  Метод позволяет участнику оборота товаров получить список всех документов согласия о предоставлении информации.

  Пример запроса:

  Пример: curl -X GET "<url стенда>/agreement-registry/agreement/list?expirationDate.from=2021-06-22T07:04:42.000Z&expirationDate.to=2021-09-22T07:04:42.000Z&offset=0&limit=10&sort=publicationDate&direction=DESC"
  -H "accept: application/json"
  -H "Authorization: Bearer <ТОКЕН>"
