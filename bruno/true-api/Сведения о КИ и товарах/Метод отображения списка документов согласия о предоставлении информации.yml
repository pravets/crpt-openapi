info:
  name: Метод отображения списка документов согласия о предоставлении информации
  type: http
  seq: 17
  tags:
    - Сведения о КИ и товарах
    - Согласие на предоставление информации

http:
  method: GET
  url: "{{baseUrl}}/agreement-registry/agreement/list"
  params:
    - name: createDate
      value: ""
      type: query
      description: Фильтр по дате создания документа
      disabled: true
    - name: direction
      value: ""
      type: query
      description: "Направление фильтрации Возможные значения: ASC – по возрастанию; DESC – по убыванию"
      disabled: true
    - name: documentRegNumber
      value: ""
      type: query
      description: Регистрационный номер документа
      disabled: true
    - name: expirationDate
      value: ""
      type: query
      description: Фильтр по дате истечения срока действия документа
      disabled: true
    - name: from
      value: ""
      type: query
      description: Начало периода Задаётся в формате yyyy-MM-ddTHH:mm:ss.SSS’Z
      disabled: true
    - name: limit
      value: ""
      type: query
      description: "Предельное количество записей Значение по умолчанию: 0"
      disabled: true
    - name: offset
      value: ""
      type: query
      description: "Смещение страницы Значение по умолчанию: 0"
      disabled: true
    - name: participantId
      value: ""
      type: query
      description: ID участника оборота товаров
      disabled: true
    - name: participantInn
      value: ""
      type: query
      description: ИНН участника оборота товаров
      disabled: true
    - name: publicationDate
      value: ""
      type: query
      description: Фильтр по дате подписания документа
      disabled: true
    - name: sort
      value: ""
      type: query
      description: 'Параметр фильтрации Доступные параметры для фильтрации: "publisherId", "agreementCancellations", "agreement", "revisionNumber", "rejectionDate", "creatorId", "trustedOrganisations", "id", "publicationDate", "createDate", "status", "printForm"'
      disabled: true
    - name: status
      value: ""
      type: query
      description: "Статус документа Возможные значения: ESTABLISHED - сформирован (присваивается при записи документа в БД после успешного прохождения всех проверок); SIGNED - подписан (присваивается по факту подписания пользователем); REJECTED - отклонён (присваивается, если пользователь отказывается от подписания документа); OUTDATED - устарел (присваивается в случае, если документ был подписан ранее, но вместо него был подписан новый документ); CANCELLED - аннулирован (присваивается в случае аннулирования документа)"
      disabled: true
    - name: to
      value: ""
      type: query
      description: Конец периода Задаётся в формате yyyy-MM-ddTHH:mm:ss.SSS’Z
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

