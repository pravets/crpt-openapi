info:
  name: Метод получения списка загруженных документов в ГИС МТ
  type: http
  seq: 1
  tags:
    - Документы и чеки

http:
  method: GET
  url: "{{baseUrl}}/doc/list"
  params:
    - name: dateFrom
      value: ""
      type: query
      description: Дата документа, от Задаётся в формате yyyy-MM-ddTHH:mm:ss.SSS’Z
      disabled: true
    - name: dateTo
      value: ""
      type: query
      description: Дата документа, до Задаётся в формате yyyy-MM-ddTHH:mm:ss.SSS’Z
      disabled: true
    - name: did
      value: ""
      type: query
      description: Значение номера документа, по которому сортируются записи («точка отсчёта» — запись, с которой начнётся выборка) Использовать только совместно с параметром «orderedColumnValue" ("Значение столбца, «точки отсчета" (запись, с которой начинается выборка), по которому сортируются записи")
      disabled: true
    - name: documentFormat
      value: ""
      type: query
      description: "Тип документа Возможные значения: «MANUAL» – формат * .json; «UPD» – документы в формате ЭДО; «XML» – формат * .xml; «CSV» – формат * .csv"
      disabled: true
    - name: documentStatus
      value: ""
      type: query
      description: Статус документа См. « Справочник «Статусы документов» »
      disabled: true
    - name: documentType
      value: "[]"
      type: query
      description: Тип документа Cм. « Справочник «Типы документов» »
      disabled: true
    - name: limit
      value: ""
      type: query
      description: Количество записей в ответе Значение устанавливает количество записей в ответе. Максимальное значение — 1000. Значение по умолчанию — 50
      disabled: true
    - name: number
      value: ""
      type: query
      description: Идентификатор документа При указании данного параметра, параметр «did» («Значение номера документа, по которому сортируются записи («точка отсчёта» - запись, с которой начнётся выборка)») будет игнорироваться
      disabled: true
    - name: order
      value: ""
      type: query
      description: "Направление сортировки Возможные значения: «ASC» – по возрастанию; «DESC» – по убыванию"
      disabled: true
    - name: orderColumn
      value: ""
      type: query
      description: Название столбца, по которому будет производиться сортировка Данный параметр считается устаревшим. Сортировка возможна только по параметру ответа «docDate» («Дата и время документа») и устанавливается по умолчанию
      disabled: true
    - name: orderedColumnValue
      value: ""
      type: query
      description: Значение столбца, «точки отсчёта» (запись, с которой начинается выборка), по которому сортируются записи Параметр обязательный при указании параметра «did» («Значение номера документа, по которому сортируются записи («точка отсчёта» — запись, с которой начнётся выборка)»), в других случаях параметр неприменим
      disabled: true
    - name: pageDir
      value: ""
      type: query
      description: "Выбор направления Возможные значения: «PREV» – предыдущий раздел; «NEXT» – следующий раздел"
      disabled: true
    - name: pg
      value: ""
      type: query
      description: Товарная группа См. « Справочник «Список поддерживаемых товарных групп» »
    - name: receiverInn
      value: ""
      type: query
      description: ИНН получателя документа Обязательный, если нет «senderInn» («ИНН отправителя документа»). Одновременное указание параметров «receiverInn» («ИНН получателя документа») и «senderInn» («ИНН отправителя документа») не допускается
      disabled: true
    - name: senderInn
      value: ""
      type: query
      description: ИНН отправителя документа Обязательный, если нет «receiverInn» («ИНН получателя документа»). Одновременное указание параметров «senderInn» («ИНН отправителя документа») и «receiverInn» («ИНН получателя документа») не допускается
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

