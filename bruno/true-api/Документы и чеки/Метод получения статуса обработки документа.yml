info:
  name: Метод получения статуса обработки документа
  type: http
  seq: 7
  tags:
    - Документы и чеки

http:
  method: POST
  url: "{{baseUrl}}/doc/validator/status"
  params:
    - name: id
      value: ""
      type: query
      description: ID документа
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

