info:
  name: Метод подачи УПД на предварительную проверку
  type: http
  seq: 6
  tags:
    - Документы и чеки

http:
  method: POST
  url: "{{baseUrl}}/doc/validator/create"
  params:
    - name: content
      value: ""
      type: query
      description: Документ, закодированный в base64 Для документа должна использоваться кодировка Windows-1251
    - name: documentFormat
      value: ""
      type: query
      description: Формат документа Поддерживается только формат XML
    - name: documentType
      value: ""
      type: query
      description: Тип документа Поддерживается только тип UPD (универсальный передаточный документ)
    - name: id
      value: ""
      type: query
      description: ID документа
    - name: preliminaryWarnings
      value: "[]"
      type: query
      description: "Массив со списком дополнительных предварительных проверок, которые необходимо выполнить Допустимые значения: 3 — разрешительные документы. Проверяется статус разрешительных документов, указанных для всех КИ, в том числе для вложенных в агрегат. Описание групп статусов разрешительных документов см. в справочнике"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

