docs: |-
  После подачи УПД на стороне ГИС МТ выполняются следующие действия:

  Описание ошибок, которые возвращаются в случае, если проверка не пройдена, см. в документе «Описание ошибок обработки документов в личном кабинете и по API» и в «Методических рекомендациях по описанию сведений о передаче маркированных товаров при оформлении электронных документов для уведомления ГИС МТ об обороте маркированной продукции» в разделе «Описание кодов ошибки при проверке документов и КИ».

  На проверку могут быть отправлены только документы УПД и УПДи до осуществления приёмки продукции со стороны покупателя.

  Данный метод поддерживает два типа аутентификационного токена: участника оборота товаров и Оператора ЭДО.

  Пример запроса:

  Пример: curl -X POST "<url стенда>/doc/validator/create"
  -H "accept: application/json"
  -H "Content-Type: application/json"
  --data-raw "{\"id\":\"string\",\"content\":\"string\",\"documentType\":\"string\",\"documentFormat\":\"string\"}"

  Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).
