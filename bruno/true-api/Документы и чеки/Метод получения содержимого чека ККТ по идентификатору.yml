docs: |-
  Получение ошибок по чекам доступно в методе получения квитанции результата обработки чека по идентификатору чека .

  Пример запроса:

  Пример: curl -X GET "<url стенда v4>/receipt/{receiptId}/info"
   -H "accept: */*"
  -H "Authorization: Bearer <Токен>"

  Тип приватности: приватный.
