info:
  name: Метод получения содержимого чека ККТ по идентификатору
  type: http
  seq: 4
  tags:
    - Документы и чеки

http:
  method: GET
  url: "{{baseUrl}}/receipt/:receiptId/info"
  params:
    - name: receiptId
      value: ""
      type: path
      description: Идентификатор чека
    - name: body
      value: ""
      type: query
      description: "Признак необходимости в теле ответа содержимого чека Возможные значения: true - содержимое отправленного чека возвращается в ответе метода; false - содержимое отправленного чека не возвращается в ответе метода. Значение по умолчанию = false"
      disabled: true
    - name: content
      value: ""
      type: query
      description: "Признак необходимости контента чека в теле ответа Возможные значения: true - контент чека возвращается в ответе метода; false - контент чека не возвращается в ответе метода. Значение по умолчанию = false"
      disabled: true
    - name: limit
      value: ""
      type: query
      description: Количество кодов в теле чека Значение по умолчанию 5000
      disabled: true
    - name: pg
      value: ""
      type: query
      description: Товарная группа См. " Справочник «Список поддерживаемых товарных групп» "
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

