info:
  name: Метод получения содержимого документа по идентификатору
  type: http
  seq: 3
  tags:
    - Документы и чеки

http:
  method: GET
  url: "{{baseUrl}}/doc/:docId/info"
  params:
    - name: docId
      value: ""
      type: path
      description: ID документа, формируемый в ГИС МТ, или ИдФайл для УД
    - name: body
      value: ""
      type: query
      description: "Признак необходимости в теле ответа содержимого документа Возможные значения: «true» — содержимое отправленного документа возвращается в ответе метода; «false» — содержимое отправленного документа не возвращается в ответе метода. Значение по умолчанию = «false» По умолчанию установлен лимит — в ответе передаётся информация о 50 дочерних КМ"
      disabled: true
    - name: content
      value: ""
      type: query
      description: "Признак необходимости контента документа в теле ответа Возможные значения: «true» — контент документа возвращается в ответе метода; «false» — контент документа не возвращается в ответе метода. Значение по умолчанию = «false»"
      disabled: true
    - name: limit
      value: ""
      type: query
      description: "Количество кодов в теле документа Указывается только для документов УПД (UNIVERSAL_TRANSFER_DOCUMENT), УПДи (UNIVERSAL_TRANSFER_DOCUMENT_FIX), УКД (UNIVERSAL_CORRECTION_DOCUMENT), УКДи (UNIVERSAL_CORRECTION_DOCUMENT_FIX), УПД (отгрузка продукции) (FIXATION). Для других типов документов игнорируется при обработке. Значение по умолчанию и максимальное значение: 36000"
      disabled: true
    - name: pageNumber
      value: ""
      type: query
      description: "Лимит вывода информации по кодам Указывается для вывода информации по кодам только для документов УПД, УПДи, УКД, УКДи, УПД (отгрузка продукции). Для других типов документов игнорируется при обработке. Значение по умолчанию: 1. Если не указан, то в ответе возвращаются первые 36 000 значений кодов. Пример: если «pageNumber» = 1 и «limit» = 10 000, то в ответе вернутся первые 10 000 кодов по документу, для запроса следующих 10 000 кодов в параметре «pageNumber» указать соответствующее по счёту значение"
      disabled: true
    - name: pg
      value: ""
      type: query
      description: Товарная группа См. « Справочник «Список поддерживаемых товарных групп» ». Параметр обязательный для товарной группы «Товары из натурального меха»
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

