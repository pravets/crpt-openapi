info:
  name: Создание задания на выгрузку данных
  type: http
  seq: 1
  tags:
    - Выгрузки данных
    - Задания на выгрузку

http:
  method: POST
  url: "{{baseUrl}}/dispenser/tasks"
  body:
    type: json
    data: |-
      {
        "format": "CSV",
        "name": "DOCUMENTS_ERRORS",
        "params": "{\"documentId\": [\"uuid\", \"uuid\"]}",
        "periodicity": "SINGLE",
        "productGroupCode": "2"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/dispenser/tasks"
      method: POST
      body:
        type: json
        data: |-
          {
            "format": "CSV",
            "name": "DOCUMENTS_ERRORS",
            "params": "{\"documentId\": [\"uuid\", \"uuid\"]}",
            "periodicity": "SINGLE",
            "productGroupCode": "2"
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/dispenser/tasks"
      method: POST
      body:
        type: json
        data: |-
          {
            "format": "CSV",
            "name": "DOCUMENTS_ERRORS",
            "params": "{\"documentId\": [\"uuid\", \"uuid\"]}",
            "periodicity": "SINGLE",
            "productGroupCode": "2"
          }
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  Метод создаёт задание на формирование выгрузки данных из ГИС МТ. Одна операция объединяет все варианты выгрузок, описанные в разделе 8.3 документации (все используют POST /dispenser/tasks и различаются идентификатором выгрузки — поле «name» или «reportId» в теле запроса).

  Варианты выгрузок (раздел документации — название — идентификатор):
  - 8.3.1 «Получение ошибок по результатам обработки документов» — `DOCUMENTS_ERRORS` (Максимальное количество запросов в минуту — 15.)
  - 8.3.2 «Получение списка КИ участника оборота товаров по заданному фильтру» — `FILTERED_CIS_REPORT` (Максимальное количество запросов в минуту — 15.)
  - 8.3.3 «Получение данных о движении кодов идентификации по агентско-комиссионной схеме» — `CIS_ACS` (Максимальное количество запросов в минуту — 15.)
  - 8.3.4 «Получение документов по агентско-комиссионной схеме» — `ACS_DOCUMENTS` (Максимальное количество запросов в минуту — 15.)
  - 8.3.5 «Получение сведений об оптовых и розничных продажах в разрезе ИНН» — `ppr-1955-1-gismt-c` (Максимальное количество запросов в минуту — 15.)
  - 8.3.6 «Получение сведений об оборачиваемости товара» — `ppr-1955-2-gismt-c` (Максимальное количество запросов в минуту — 15.)
  - 8.3.7 «Получение сведений об объёме розничных продаж в разрезе по ИНН и адресам» — `ppr-1955-3-gismt-c` (Максимальное количество запросов в минуту — 15.)
  - 8.3.8 «Получение сведений о средневзвешенной цене в разрезе по GTIN» — `ppr-1955-4-gismt-c` (Максимальное количество запросов в минуту — 15.)
  - 8.3.9 «Получение перечня кодов товаров без определённого производителя» — `ppr-1955-5-gismt-w` (Максимальное количество запросов в минуту — 15.)
  - 8.3.10 «Получение сведений об ошибках в чеках» — `receipt-error` (Максимальное количество запросов в минуту — 15.)
  - 8.3.11 «Получение сведений об ошибках в УД» — `upd-error` (Максимальное количество запросов в минуту — 15.)
  - 8.3.12 «Получение сведений по карточкам товаров» — `product-cards` (Максимальное количество запросов в минуту — 15.)
  - 8.3.13 «Получение сведений по товарам и их владельцам, которые используют зарегистрированные товарные знаки» — `brand-2-inn` (Максимальное количество запросов в минуту — 15.)
  - 8.3.14 «Получение сведений о количестве и объёме введённых в оборот товаров» — `put-in-circulation-beer` (Максимальное количество запросов в минуту — 15.)
  - 8.3.15.1 «Выгрузка сведений об отклонениях» — `VIOLATIONS` (Максимальное количество запросов в минуту — 15.)
  - 8.3.16 «Получение сведений по количеству остатков товаров» — `participant_remains-gismt-c` (Максимальное количество запросов в минуту — 15.)
  - 8.3.17 «Получение сведений по виртуальному складу, включая партионный учёт» — `virtual-warehouse-water` (Максимальное количество запросов в минуту — 15.)
  - 8.3.18 «Получение сведений по акцизам» — `taxes` (Максимальное количество запросов в минуту — 15.)
  - 8.3.19 «Получение сведений по рассчитанному акцизу» — `check-doc-excise` (Максимальное количество запросов в минуту — 15.)
  - 8.3.20 «Получение сведений по эмиссии и нанесению кодов маркировки» — `emitted-applied-cis-gismt` (Максимальное количество запросов в минуту — 15.)
  - 8.3.21 «Получение сведений по начислениям за коды маркировки» — `paid-cis-gismt` (Максимальное количество запросов в минуту — 15.)
  - 8.3.22 «Продажи по аномальным ценам» — `abnormal-prices-gismt` (Максимальное количество запросов в минуту — 15.)
  - 8.3.23 «Получение сведений о количестве и объёме переданных товаров» — `transfer-report-gismt-w` (Максимальное количество запросов в минуту — 15.)
  - 8.3.24 «Получение сведений о количестве и объёме выведенных из оборота товаров» — `gismt-participant-withdrawal-circulation-c`
  - 8.3.25 «Получение сведений о продаже агентами товаров, поставленных участником» — `agents-sales-gismt-c` (Максимальное количество запросов в минуту — 15.)
  - 8.3.26 «Получение сведений об отчёте по разрешительной документации в карточках товаров» — `rd-gismt`
  - 8.3.27 «Получение сведений по ошибкам в документах прямой подачи» — `document-error-gismt` (Максимальное количество запросов в минуту — 15.)

  Поле «params» — строка с JSON, структура которого зависит от вида выгрузки (см. соответствующий раздел документации).

  В документации разделы 8.3.1 и 8.3.13 подписаны как публичные, однако 25 из 27 разделов 8.3.x — приватные и все примеры запросов используют Bearer-токен; метод считается приватным.
