info:
  name: Метод получения ZIP-файла выгрузки
  type: http
  seq: 6
  tags:
    - Выгрузки данных

http:
  method: GET
  url: "{{baseUrl}}/dispenser/results/:resultId/file"
  params:
    - name: resultId
      value: ""
      type: path
      description: Параметр пути URL (см. документацию)
    - name: downloadFormat
      value: ""
      type: query
      description: "Формат выгрузки файла Применимо только для выгрузок: «ACS_DOCUMENTS» («Документы, на основании которых была оформлена передача и получение кодов идентификации по агентско-комиссионной схеме»); «CIS_ACS» («Данные о кодах идентификации, переданных и полученных по агентско-комиссионной схеме»). Если не указан, выгрузка формируется в формате * .csv. Допустимое значение: «XLSX»"
      disabled: true
    - name: pg
      value: ""
      type: query
      description: Товарная группа Цифровой код товарной группы (см. « Справочник «Список поддерживаемых товарных групп» »). Значение должно совпадать с «productGroupCode» («Товарная группа») задания на выгрузку. Если при формировании задания на выгрузку параметр «productGroupCode» («Товарная группа») не передавался, то в данном запросе параметр указывать не требуется
      disabled: true
    - name: resultFilePartId
      value: ""
      type: query
      description: Идентификатор дополнительного файла выгрузки Параметр заполняется для выгрузки, состоящей из нескольких файлов
      disabled: true
    - name: result_id
      value: ""
      type: query
      description: Идентификатор выгрузки Идентификатор возвращается в ответе метода « Метод получения результирующих ID выгрузок данных »
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

