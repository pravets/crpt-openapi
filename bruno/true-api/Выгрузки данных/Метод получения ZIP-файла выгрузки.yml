docs: |-
  Метод предоставляет возможность скачивания выгрузки в статусе «COMPLETED» («Выполнено») по идентификатору выгрузки, полученному в ответе метода « Метод получения результирующих ID выгрузок данных ».

  Максимальное количество запросов в минуту — 12.

  Пример запроса:

  Пример: curl -X GET "<url стенда>dispenser/results/00000000-0000-0000-0000-000000000000/file?pg=3"
  -H "accept: */*"
  -H "Authorization: Bearer <ТОКЕН>"

  Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).
