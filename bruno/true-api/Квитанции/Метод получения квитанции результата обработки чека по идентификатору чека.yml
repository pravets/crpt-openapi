info:
  name: Метод получения квитанции результата обработки чека по идентификатору чека
  type: http
  seq: 2
  tags:
    - Квитанции

http:
  method: GET
  url: "{{baseUrl}}/receipt/documents"
  params:
    - name: id
      value: ""
      type: query
      description: ID чека
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

