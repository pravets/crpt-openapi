  type: http
  seq: 1
  tags:
    - Квитанции

http:
  method: GET
  url: "{{baseUrl}}/documents/edo/tpr/ud"
  params:
    - name: fileId
      value: ""
      type: query
      description: Полное имя из "ИдФайл" XML направленного документа Для документа «УПД (отгрузка продукции)» (FIXATION) необходимо указывать в качестве fileId "FIX_ИдФайл…​"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

