info:
  name: Метод получения токена аутентификации в СУЗ
  type: http
  seq: 1
  tags:
    - Станция управления заказами

http:
  method: POST
  url: "{{baseUrl}}/auth/simpleSignIn/:omsConnection"
  params:
    - name: omsConnection
      value: ""
      type: path
      description: Уникальный идентификатор соединения (внешнего подключения), присвоенный зарегистрированной установке интеграционного решения Выдаётся при регистрации установки интеграционного решения
  body:
    type: json
    data: |-
      {
        "uuid": "b223216d-5c43-416a-b2c3-39c79240c08a",
        "data": "<Подписанные данные в base64>"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/auth/simpleSignIn/:omsConnection"
      method: POST
      params:
        - name: omsConnection
          value: ""
          type: path
          description: Уникальный идентификатор соединения (внешнего подключения), присвоенный зарегистрированной установке интеграционного решения Выдаётся при регистрации установки интеграционного решения
      body:
        type: json
        data: |-
          {
            "uuid": "b223216d-5c43-416a-b2c3-39c79240c08a",
            "data": "<Подписанные данные в base64>"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": "2f2222c2-cbc2-22ff-bc2c-2222222fbef2"
          }
  - name: 400 Response
    description: "2.1. Код 400, если не указан параметр тела запроса «uuid» («Уникальный идентификатор подписанных случайных данных»):"
    request:
      url: "{{baseUrl}}/auth/simpleSignIn/:omsConnection"
      method: POST
      params:
        - name: omsConnection
          value: ""
          type: path
          description: Уникальный идентификатор соединения (внешнего подключения), присвоенный зарегистрированной установке интеграционного решения Выдаётся при регистрации установки интеграционного решения
      body:
        type: json
        data: |-
          {
            "uuid": "b223216d-5c43-416a-b2c3-39c79240c08a",
            "data": "<Подписанные данные в base64>"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_message": "В запросе отсутствует идентификатор авторизации (UUID)"
          }
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/auth/simpleSignIn/:omsConnection"
      method: POST
      params:
        - name: omsConnection
          value: ""
          type: path
          description: Уникальный идентификатор соединения (внешнего подключения), присвоенный зарегистрированной установке интеграционного решения Выдаётся при регистрации установки интеграционного решения
      body:
        type: json
        data: |-
          {
            "uuid": "b223216d-5c43-416a-b2c3-39c79240c08a",
            "data": "<Подписанные данные в base64>"
          }
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  Метод используется для получения маркера безопасности (токена аутентификации) в СУЗ.

  Для получения токена для СУЗ в строке запроса указывается параметр «omsConnection» — уникальный идентификатор соединения (внешнего подключения), присвоенный зарегистрированной установке интеграционного решения.
