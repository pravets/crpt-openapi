info:
  name: Проверка наличия МЧД по ИНН физического лица
  type: http
  seq: 6
  tags:
    - Обращение к True API

http:
  method: POST
  url: "{{baseUrl}}/mrd/delegation/search"
  body:
    type: json
    data: |-
      {
        "onlyActive": true,
        "organisationInn": 555555555555
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/mrd/delegation/search"
      method: POST
      body:
        type: json
        data: |-
          {
            "onlyActive": true,
            "organisationInn": 555555555555
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "results": [
                {
                  "organisationInn": "555555555555",
                  "status": "ACTIVE",
                  "startDate": "2023-09-05T17:48:59.861Z",
                  "endDate": "2024-09-05T17:48:59.861Z"
                }
              ]
            }
          ]
  - name: 400 Response
    description: "2.1. Код 400 при отсутствии в токене авторизации обязательного параметра «poa_number» («Номер доверенности»):"
    request:
      url: "{{baseUrl}}/mrd/delegation/search"
      method: POST
      body:
        type: json
        data: |-
          {
            "onlyActive": true,
            "organisationInn": 555555555555
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 400,
            "description": "Неподходящий тип УКЭП. Запрос может быть отправлен только от физического лица.",
            "error_message": "Неподходящий тип УКЭП. Запрос может быть отправлен только от физического лица."
          }
  - name: 401 Response
    description: "2.2. Код 401 при отсутствии токена авторизации:"
    request:
      url: "{{baseUrl}}/mrd/delegation/search"
      method: POST
      body:
        type: json
        data: |-
          {
            "onlyActive": true,
            "organisationInn": 555555555555
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 401,
            "description": "Токен не действителен. Необходимо получить новый токен аутентификации",
            "error_message": "Токен не действителен. Необходимо получить новый токен аутентификации"
          }
  - name: 404 Response
    description: "2.3. Код 404, если не удалось найти МЧД по данным в токене авторизации:"
    request:
      url: "{{baseUrl}}/mrd/delegation/search"
      method: POST
      body:
        type: json
        data: |-
          {
            "onlyActive": true,
            "organisationInn": 555555555555
          }
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "code": 404,
            "description": "Не удалось найти доверенность по указанному номеру",
            "error_message": "Не удалось найти доверенность по указанному номеру"
          }
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/mrd/delegation/search"
      method: POST
      body:
        type: json
        data: |-
          {
            "onlyActive": true,
            "organisationInn": 555555555555
          }
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  Метод предназначен для проверки наличия машиночитаемых доверенностей, выданных пользователю, выполняющему запрос. При наличии МЧД метод возвращает о них информацию: ИНН юридического лица / индивидуального предпринимателя, которым выдана МЧД, статус, дату начала и окончания действия МЧД.

  Тип приватности: приватный.
