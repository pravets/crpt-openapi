docs: |-
  Метод предназначен для добавления мест осуществления деятельности (МОД). Единовременно можно добавить до 100 МОД.

  Метод доступен для товарных групп «Антисептики и дезинфицирующие средства», «Альтернативная табачная продукция», «Безалкогольное пиво», «Велосипеды и велосипедные рамы», «Духи и туалетная вода», «Игры и игрушки для детей», «Кабельно-проводниковая продукция», «Консервированная продукция», «Корма для животных», «Косметика, бытовая химия и товары личной гигиены», «Лёгкая промышленность», «Молочная продукция», «Морепродукты», «Моторные масла», «Мясные изделия», «Натуральный мех», «Никотиносодержащая продукция», «Обувные товары», «Оптоволокно и оптоволоконная продукция», «Отопительные приборы», «Печатная продукция», «Пиво, напитки, изготавливаемые на основе пива, слабоалкогольные напитки», «Пиротехника и огнетушащее оборудование», «Полимерные трубы», «Радиоэлектронная продукция», «Радиоэлектронная продукция. Ноутбуки и смартфоны», «Радиоэлектронная продукция. Электронные системы доставки никотина», «Растительные масла», «Сладости и кондитерские изделия», «Соковая продукция и безалкогольные напитки», «Строительные материалы», «Табачная продукция», «Упакованная вода», «Фотокамеры (кроме кинокамер), фотовспышки и лампы-вспышки», «Шины и покрышки пневматические резиновые новые».

  Тип приватности: приватный.
