info:
  name: Метод проверки регистрации участников оборота товаров по ИНН в ГИС МТ
  type: http
  seq: 1
  tags:
    - Обращение к True API

http:
  method: GET
  url: "{{baseUrl}}/participants"
  params:
    - name: inns
      value: ""
      type: query
      description: Список ИНН участников оборота товаров Не более 100 ИНН
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/participants"
      method: GET
      params:
        - name: inns
          value: ""
          type: query
          description: Список ИНН участников оборота товаров Не более 100 ИНН
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "inn": "0000000000",
            "status": "Зарегистрирован",
            "productGroups": [
              "lp",
              "tobacco",
              "shoes"
            ],
            "is_registered": true,
            "is_kfh": true
          }
  - name: 400 Response
    description: '2.2. При запросе информации с некорректным ИНН возвращается ответ с кодом ошибки 400 "ИНН некорректен":'
    request:
      url: "{{baseUrl}}/participants"
      method: GET
      params:
        - name: inns
          value: ""
          type: query
          description: Список ИНН участников оборота товаров Не более 100 ИНН
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "inn": "00000",
            "error_code": "400",
            "error_message": "ИНН некорректен"
          }
  - name: 404 Response
    description: '2.1. При запросе информации с ИНН, по которому нет информации в ГИС МТ, возвращается ответ с кодом ошибки 404 "УОТ не найден":'
    request:
      url: "{{baseUrl}}/participants"
      method: GET
      params:
        - name: inns
          value: ""
          type: query
          description: Список ИНН участников оборота товаров Не более 100 ИНН
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "inn": "0000000002",
            "error_code": "404",
            "error_message": "УОТ не найден"
          }
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/participants"
      method: GET
      params:
        - name: inns
          value: ""
          type: query
          description: Список ИНН участников оборота товаров Не более 100 ИНН
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  В результате успешного выполнения запроса по одному или нескольким ИНН участников оборота товаров в ответе возвращается информация об участнике оборота товаров.

  Публичный метод: без токена возвращается краткая информация об УОТ; с токеном — расширенная (при совпадении ИНН).
