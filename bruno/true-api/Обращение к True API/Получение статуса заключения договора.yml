info:
  name: Получение статуса заключения договора
  type: http
  seq: 8
  tags:
    - Обращение к True API
    - Счета и договоры

http:
  method: GET
  url: "{{baseUrl}}/elk/outgoing-documents"
  params:
    - name: limit
      value: ""
      type: query
      description: Количество возвращаемых документов Значение по умолчанию = 10
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Смещение Значение по умолчанию = 0
      disabled: true
    - name: asc
      value: ""
      type: query
      description: "Параметр, определяющий направление сортировки Допустимые значения: false — по убыванию (значение по умолчанию); true — по возрастанию"
      disabled: true
    - name: created_from
      value: ""
      type: query
      description: Нижняя граница фильтрации документов по времени создания В выборку попадут документы, время создания которых больше или равно указанному
      disabled: true
    - name: created_to
      value: ""
      type: query
      description: Верхняя граница фильтрации документов по времени создания В выборку попадут документы, время создания которых меньше или равно указанному
      disabled: true
    - name: folder
      value: ""
      type: query
      description: "Цифровое обозначение папки, в которой находятся документы Для поиска по всем папкам параметр не указывается. Допустимые значения: 0 — документы; 1 — архив; 2 — корзина; 3 — на подписание; 4 — отклоненные; 5 — на подпись РВ; 6 — на подпись РЭ; 7 — биллинг; 8 — автоподписание"
      disabled: true
    - name: partner_id
      value: ""
      type: query
      description: Идентификатор получателя документа
      disabled: true
    - name: partner_inn
      value: ""
      type: query
      description: ИНН контрагента Для исходящего документа это получатель, для входящего — отправитель
      disabled: true
    - name: product_group
      value: ""
      type: query
      description: Цифровое обозначение товарной группы См. Справочник «Список поддерживаемых товарных групп»
      disabled: true
    - name: sortBy
      value: ""
      type: query
      description: "Параметр, по которому необходимо отсортировать возвращаемый список документов Допустимые значения: created_at — время создания документа"
      disabled: true
    - name: status
      value: ""
      type: query
      description: Цифровое обозначение статуса возвращаемых документов См. « Справочник «Статусная модель» »
      disabled: true
    - name: type
      value: ""
      type: query
      description: Цифровое обозначение типа создаваемых документов См. « Справочник «Типы универсальных документов» »
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

