info:
  name: Метод получения списка МОД по участнику оборота товаров
  type: http
  seq: 5
  tags:
    - Обращение к True API

http:
  method: GET
  url: "{{baseUrl}}/mods/list"
  params:
    - name: fiasId
      value: ""
      type: query
      description: Идентификатор ФИАС Если не будет указан, то в ответе вернутся все МОД
      disabled: true
    - name: inns
      value: "[]"
      type: query
      description: Список ИНН участников оборота товаров Максимально допустимое значение — 10. Если не будет указан, то в ответе вернутся все МОД участника оборота товаров, осуществляющего запрос
      disabled: true
    - name: kpp
      value: ""
      type: query
      description: КПП Для юридических лиц. Если не будет указан, то в ответе вернутся все МОД
      disabled: true
    - name: limit
      value: ""
      type: query
      description: "Максимальное количество записей на странице результата поиска Максимально допустимое значение — 1000, минимально допустимое значение — 1. Значение по умолчанию: 100"
      disabled: true
    - name: page
      value: ""
      type: query
      description: "Номер страницы Используется для пагинации. Начинается с «0». Значение по умолчанию: 0"
      disabled: true
    - name: productGroups
      value: "[]"
      type: query
      description: Список товарных групп См. « Справочник «Список поддерживаемых товарных групп» ». Если не будет указан, то в ответе вернутся МОД по всем товарным группам
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

