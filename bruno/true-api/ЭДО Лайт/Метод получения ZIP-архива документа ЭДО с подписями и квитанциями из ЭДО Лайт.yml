info:
  name: Метод получения ZIP-архива документа ЭДО с подписями и квитанциями из ЭДО Лайт
  type: http
  seq: 2
  tags:
    - ЭДО Лайт
    - Рекомендации по работе с API
    - Регистрация УОТ

http:
  method: GET
  url: "{{baseUrl}}/elk/outgoing-documents/:documentId"
  params:
    - name: documentId
      value: ""
      type: path
      description: Идентификатор документа в системе ЭДО оператора
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/elk/outgoing-documents/:documentId"
      method: GET
      params:
        - name: documentId
          value: ""
          type: path
          description: Идентификатор документа в системе ЭДО оператора
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/zip
      body:
        type: text
        data: ""
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/elk/outgoing-documents/:documentId"
      method: GET
      params:
        - name: documentId
          value: ""
          type: path
          description: Идентификатор документа в системе ЭДО оператора
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  Метод предназначен для получения ZIP-архива входящих либо исходящих документов ЭДО (УПД, УПДи, УКД, УКДи) с подписями и квитанциями обмена с подписями.

  Тип приватности: приватный.

  В документации раздел описывает несколько URL; данная операция соответствует варианту: «Для исходящих документов».

  Тот же метод описан в разделе 2.1.5 «Шаг 5: выгрузка подписанных договоров» (сценарий регистрации УОТ), который отсылает к подробному описанию в разделе 9.2: данный метод используется при необходимости получения ZIP-архива подписанных входящих либо исходящих документов ЭДО и подписанных квитанций обмена.
