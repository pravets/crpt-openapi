info:
  name: Публичный метод получения идентификатора абонента в ЭДО Лайт
  type: http
  seq: 1
  tags:
    - ЭДО Лайт

http:
  method: GET
  url: "{{baseUrl}}/edo/inn/:inn"
  params:
    - name: inn
      value: ""
      type: path
      description: ИНН участника оборота товаров
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/edo/inn/:inn"
      method: GET
      params:
        - name: inn
          value: ""
          type: path
          description: ИНН участника оборота товаров
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "inn": "7777777777",
            "id": "2LT-572279988",
            "name": "ООО",
            "hub": true
          }
  - name: 400 Response
    description: "2.1. Код 400, если запрос в сервис организации вернул пустой ответ или статус организации = «NOT_REGISTERED» («Не зарегистрирован»):"
    request:
      url: "{{baseUrl}}/edo/inn/:inn"
      method: GET
      params:
        - name: inn
          value: ""
          type: path
          description: ИНН участника оборота товаров
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_message": "Организация не зарегистрирована"
          }
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/edo/inn/:inn"
      method: GET
      params:
        - name: inn
          value: ""
          type: path
          description: ИНН участника оборота товаров
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  Метод предназначен для получения идентификатора абонента в ЭДО Лайт: в одном запросе указывается ИНН одного участника оборота товаров.

  Принцип формирования ответа метода:

  Пример запроса с токеном:

  Пример: curl -X GET "<url стенда v4>/edo/inn/7777777777"
  -H "accept: application/json"
  -H "Authorization: Bearer <ТОКЕН>"

  Пример запроса без токена:

  Пример: curl -X GET "<url стенда v4>/edo/inn/7777777777"
  -H "accept: application/json"

  Публичный метод, токен не требуется.
