info:
  name: Метод получения списка торговых марок
  type: http
  seq: 2
  tags:
    - Национальный каталог

http:
  method: GET
  url: "{{baseUrl}}/nk/brands"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. раздел « Единая аутентификация »)
      disabled: true
    - name: limit
      value: ""
      type: query
      description: Количество записей в ответе Максимально допустимое значение — 10000, минимально допустимое значение — 1
      disabled: true
    - name: name
      value: ""
      type: query
      description: Полное или частичное наименование товарного знака
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Смещение относительно начала выдачи Минимально допустимое значение — 0
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

