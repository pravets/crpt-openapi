info:
  name: Метод получения XML товаров по массиву ID товаров или коду товара
  type: http
  seq: 11
  tags:
    - Национальный каталог

http:
  method: POST
  url: "{{baseUrl}}/nk/feed-product-document"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. «Единая аутентификация»)
      disabled: true
    - name: format
      value: ""
      type: query
      description: "Формат вывода ответа Возможные значения: «json» (по умолчанию); «xml»"
      disabled: true
  body:
    type: json
    data: |-
      {
        "goodIds": [],
        "gtins": [],
        "publicationAgreement": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

