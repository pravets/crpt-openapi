docs: |-
  Метод предназначен для пропорционального изменения размера изображения с заполнением недостающих полей белым цветом. При отправке данных об изображении в ответе возвращается JPEG изменённого изображения.

  Метод не используется для работы с карточками индустриальной маркировки (префикс 004).

  Пример запроса:

  Пример: curl -X GET "<url стенда>/nk/image?name=https://национальный-каталог.рф/i/300x200/5a7eb614-13d3-69ed-caf7-420624d1bdd3.jpg&width=300&height=400"
  -H "accept: image/jpeg"
  -H "Authorization: Bearer <ТОКЕН>"

  Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).
