info:
  name: Метод изменения размера изображения с заполнением недостающих полей белым цветом
  type: http
  seq: 14
  tags:
    - Национальный каталог

http:
  method: GET
  url: "{{baseUrl}}/nk/image"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. раздел « Единая аутентификация »)
      disabled: true
    - name: height
      value: ""
      type: query
      description: Высота рисунка на выходе в пикселях Должен быть в границах [100, 1000] (результирующая высота в пикселях)
      disabled: true
    - name: name
      value: ""
      type: query
      description: Полный URI изображения
      disabled: true
    - name: no-background
      value: ""
      type: query
      description: "Параметр добавления белого фона к рисунку для соблюдения размеров Возможные значения: «1» — фон не добавлять; «0» — фон добавлять (значение по умолчанию)"
      disabled: true
    - name: width
      value: ""
      type: query
      description: Ширина рисунка на выходе в пикселях Должен быть в границах [100, 1000] (результирующая ширина в пикселях)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

