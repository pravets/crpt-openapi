docs: |-
  Метод предназначен для проверки доступа к кодам товаров со стороны субаккаунта.

  Примечание По механизму настройки субаккаунтов получить доступ можно только к российским кодам товаров (046) и кодам товаров индустриальной маркировки (004)

  Пример запроса:

  Пример: curl -X GET "<url стенда>/nk/linked-gtins?gtin=0000000000000"
  -H "accept: application/json"
  -H "Authorization: Bearer<ТОКЕН>"

  Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).
