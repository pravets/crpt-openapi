info:
  name: Метод проверки доступа к списку кодов товаров со стороны субаккаунта
  type: http
  seq: 20
  tags:
    - Национальный каталог

http:
  method: GET
  url: "{{baseUrl}}/nk/linked-gtins"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. раздел «Единая аутентификация»)
      disabled: true
    - name: gtin
      value: ""
      type: query
      description: Код товара Указывается для проверки доступности конкретного кода товара. Можно указать несколько значений. Максимально допустимое значение — 10 000, минимально допустимое значение — 0
      disabled: true
    - name: inn
      value: ""
      type: query
      description: ИНН субаккаунта ИНН субаккаунта, для которого необходимо вывести список доступных кодов товаров
      disabled: true
    - name: limit
      value: ""
      type: query
      description: Количество записей в ответе Максимально допустимое значение — 10 000 (по умолчанию). Минимально допустимое значение — 1
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Смещение относительно начала выдачи Минимально допустимое значение — 0. При указании значения, превышающего значение парамера «limit» («Количество записей в ответе»), вернётся пустой ответ
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

