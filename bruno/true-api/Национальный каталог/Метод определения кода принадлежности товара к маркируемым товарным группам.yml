info:
  name: Метод определения кода принадлежности товара к маркируемым товарным группам
  type: http
  seq: 19
  tags:
    - Национальный каталог

http:
  method: POST
  url: "{{baseUrl}}/nk/mark-check"
  body:
    type: json
    data: |-
      {
        "gtins": [
          "04610043553256",
          4610043553287,
          3331436808029,
          783320402685,
          "3234567890126",
          38000232671,
          4640076801444,
          4640076801352,
          "4810978019678",
          2900001633116,
          "7891024188279"
        ],
        "tnveds": [
          "63",
          "0401",
          "6302",
          "040410",
          "0404100200",
          "6404",
          "9001200000"
        ]
