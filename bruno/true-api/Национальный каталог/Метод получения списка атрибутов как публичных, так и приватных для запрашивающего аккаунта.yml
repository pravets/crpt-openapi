info:
  name: Метод получения списка атрибутов как публичных, так и приватных для запрашивающего аккаунта
  type: http
  seq: 1
  tags:
    - Национальный каталог

http:
  method: GET
  url: "{{baseUrl}}/nk/attributes"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token («Токен аутентификации») (см. раздел «Единая аутентификация»)
      disabled: true
    - name: attr_type
      value: ""
      type: query
      description: "Тип атрибута Возможные значения: «a» — вернуть все атрибуты (значение по умолчанию); «m» — вернуть только обязательные атрибуты; «r» — вернуть только рекомендуемые атрибуты; «o» — вернуть только опциональные атрибуты"
      disabled: true
    - name: cat_id
      value: ""
      type: query
      description: Идентификатор категории Идентификатор любой из категорий товаров, к которой относятся атрибуты. Параметр обязательный, если указан параметр «attr_type» («Тип атрибута») и не указан параметр «tnved» («Код ТН ВЭД»)
      disabled: true
    - name: format
      value: ""
      type: query
      description: "Формат вывода ответа Возможные значения: «json» (по умолчанию); «xml»"
      disabled: true
    - name: is_set
      value: ""
      type: query
      description: "Признак карточки товара типа «Набор» Используется для получения атрибутивного состава набора. Возможные значения: true; false (по умолчанию)"
      disabled: true
    - name: tnved
      value: ""
      type: query
      description: Код ТН ВЭД Код ТН ВЭД (10 знаков) или группы ТН ВЭД (4 знака), для которого запрашивается набор атрибутов. Параметр обязательный, если указан параметр «attr_type» («Тип атрибута») и не указан «cat_id» («Идентификатор категории»)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

