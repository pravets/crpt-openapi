info:
  name: Метод получения карточки товара, в том числе неопубликованной карточки
  type: http
  seq: 9
  tags:
    - Национальный каталог

http:
  method: GET
  url: "{{baseUrl}}/nk/feed-product"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. раздел «Единая аутентификация»)
      disabled: true
    - name: format
      value: ""
      type: query
      description: "Формат вывода ответа Возможные значения: «json» (по умолчанию); «xml»"
      disabled: true
    - name: good_id
      value: ""
      type: query
      description: Идентификатор товара в Национальном каталоге Обязательный, если не указан параметр «gtin» («Код товара»)
      disabled: true
    - name: good_ids
      value: ""
      type: query
      description: "Список идентификаторов товаров в Национальном каталоге Разделитель — «;». Обязательный, если не указаны параметры: «good_id» («Идентификатор товара в каталоге»); «gtin» («Код товара»); «gtins» («Список кодов товара»)"
      disabled: true
    - name: gtin
      value: ""
      type: query
      description: Код товара Обязательный, если не указан параметр «good_id» («Идентификатор товара в Национальном каталоге»)
      disabled: true
    - name: gtins
      value: ""
      type: query
      description: "Список кодов товаров Разделитель — «;». Обязательный, если не указаны параметры: «good_id» («Идентификатор товара в Национальном каталоге»); «good_ids» («Список идентификаторов товаров в Национальном каталоге»); «gtin» («Код товара»)"
      disabled: true
    - name: subaccount
      value: ""
      type: query
      description: Признак запроса карточки товара из-под субаккаунта
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

