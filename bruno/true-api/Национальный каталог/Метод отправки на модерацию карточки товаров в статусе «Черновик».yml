info:
  name: Метод отправки на модерацию карточки товаров в статусе «Черновик»
  type: http
  seq: 18
  tags:
    - Национальный каталог

http:
  method: GET
  url: "{{baseUrl}}/nk/feed-moderation"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. раздел «Единая аутентификация»)
      disabled: true
    - name: format
      value: ""
      type: query
      description: "Формат вывода ответа Возможные значения: «json» (по умолчанию); «xml»"
      disabled: true
    - name: good_id
      value: ""
      type: query
      description: Идентификатор товара в Национальном каталоге Обязательный, если не указаны параметры «gtin» («Код товара») и «inn» («ИНН аккаунта»)
      disabled: true
    - name: gtin
      value: ""
      type: query
      description: Код товара Обязательный, если не указан «good_id» («Идентификатор товара в Национальном каталоге»)
      disabled: true
    - name: inn
      value: ""
      type: query
      description: ИНН аккаунта Обязательный, если не указан «good_id» («Идентификатор товара в Национальном каталоге»)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

