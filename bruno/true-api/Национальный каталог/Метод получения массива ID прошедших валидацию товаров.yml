docs: |-
  Метод принимает массив объектов, в объектах содержатся good_id товара и подписанный XML для этого товара.

  Пример запроса:

  Пример: curl -X POST "<url стенда>/nk/feed-product-sign"
  -H "accept: application/json"
  -H "Content-Type: application/json; charset=utf-8"
  -H "Authorization: Bearer <ТОКЕН>"
  --data-raw

  Ограничения: Количество товаров в запросе — не более 10.

  Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).
