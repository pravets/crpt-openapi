info:
  name: Метод получения массива ID прошедших валидацию товаров
  type: http
  seq: 12
  tags:
    - Национальный каталог

http:
  method: POST
  url: "{{baseUrl}}/nk/feed-product-sign"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. «Единая аутентификация»)
      disabled: true
    - name: format
      value: ""
      type: query
      description: "Возможные значения: «json» (по умолчанию); «xml»"
      disabled: true
  body:
    type: json
    data: |-
      [
        {
          "goodId": 5000,
          "xml": "..."
        },
        {
          "goodId": 3,
          "xml": "..."
        },
        {
          "goodId": 5,
          "xml": "<..."
        }
      ]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
