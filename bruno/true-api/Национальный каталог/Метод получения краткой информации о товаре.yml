docs: |-
  Метод возвращает краткую или полную информацию о продукте (товаре).

  Требует обязательного указания одного из следующих параметров: идентификатор товара, код товара (штрих-код) с указанием идентификатора торговой сети, который относится к запрашиваемому аккаунту.

  Если указаны более одного из обязательных параметров, то возвращается результат выборки, соответствующий данному алгоритму:

  Примечание Если карточка создана с признаком «is_sim» («Признак создания карточки индустриальной маркировки»), то будет возвращён ответ, что такой карточки товара не существует; При указании одного из параметров gtin или good_id и одного из параметров gtins или good_ids , возвращается ошибка 400

  Пример запроса:

  Пример: curl -X GET "<url стенда>/nk/short-product?gtin=0000000000000"
  -H "accept: application/json"
  -H "Authorization: Bearer <ТОКЕН>"

  Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).
