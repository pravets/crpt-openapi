      description: "Список кодов товаров Разделитель — «;». Обязательный, если не указаны параметры: «good_id» («Идентификатор товара в Национальном каталоге»); «good_ids» («Список идентификаторов товаров в Национальном каталоге»); «gtin» («Код товара»)"
      disabled: true
