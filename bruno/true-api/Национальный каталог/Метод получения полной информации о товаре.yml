http:
  method: GET
  url: "{{baseUrl}}/nk/product"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. раздел «Единая аутентификация»)
      disabled: true
    - name: cat_id
      value: ""
      type: query
      description: Идентификатор категории Идентификатор любой из категорий товаров. Используется при запросе на поиск отсутствующего товара
      disabled: true
    - name: format
      value: ""
      type: query
      description: "Формат вывода ответа Возможные значения: «json» (по умолчанию); «xml»"
      disabled: true
    - name: good_id
      value: ""
      type: query
      description: Идентификатор товара в Национальном каталоге Обязательный, если не указан «gtin» («Код товара»)
      disabled: true
    - name: good_ids
      value: ""
      type: query
      description: "Список идентификаторов товаров в Национальном каталоге Разделитель — «;». Обязательный, если не указаны параметры: «gtin» («Код товара»); «good_id» («Идентификатор товара в Национальном каталоге»); «gtins» («Список кодов товаров»)"
      disabled: true
    - name: gtin
