info:
  name: Метод подписи карточки товара
  type: http
  seq: 10
  tags:
    - Национальный каталог

http:
  method: POST
  url: "{{baseUrl}}/nk/feed-product-sign-pkcs"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. «Единая аутентификация»)
      disabled: true
    - name: format
      value: ""
      type: query
      description: "Формат вывода ответа Возможные значения: «json» (по умолчанию); «xml»"
      disabled: true
  body:
    type: json
    data: |-
      [
        {
          "goodId": 3,
          "base64Xml": "...",
          "signature": "..."
        },
        {
          "goodId": 3119690,
          "base64Xml": "...",
          "signature": "..."
        },
        {
          "goodId": 521,
          "base64Xml": "...",
          "signature": "..."
        }
      ]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

