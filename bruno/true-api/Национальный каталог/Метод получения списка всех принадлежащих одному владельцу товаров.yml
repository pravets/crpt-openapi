info:
  name: Метод получения списка всех принадлежащих одному владельцу товаров
  type: http
  seq: 13
  tags:
    - Национальный каталог

http:
  method: GET
  url: "{{baseUrl}}/nk/etagslist"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. раздел «Единая аутентификация»)
      disabled: true
    - name: brand_id
      value: ""
      type: query
      description: Идентификатор товарного знака
      disabled: true
    - name: cat_id
      value: ""
      type: query
      description: Идентификатор категории Идентификатор любой из категорий товаров
      disabled: true
    - name: format
      value: ""
      type: query
      description: "Формат вывода ответа Возможные значения: «json» (по умолчанию); «xml»"
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Смещение относительно начала списка выдачи
      disabled: true
    - name: owner_inn
      value: ""
      type: query
      description: ИНН компании владельца товаров
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

