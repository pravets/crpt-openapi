info:
  name: Метод получения файла в формате XML для управления доступами субаккаунтов
  type: http
  seq: 5
  tags:
    - Национальный каталог

http:
  method: POST
  url: "{{baseUrl}}/nk/linked-accounts-documents"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. раздел «Единая аутентификация»)
      disabled: true
    - name: format
      value: ""
      type: query
      description: "Формат вывода ответа Возможные значения: «json» (по умолчанию); «xml»"
      disabled: true
  body:
    type: json
    data: |-
      {
        "linked_account_inn": "",
        "is_access_allowed": false,
        "linked_goods": []
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

