info:
  name: Метод получения списка субаккаунтов компании
  type: http
  seq: 3
  tags:
    - Национальный каталог

http:
  method: POST
  url: "{{baseUrl}}/nk/linked-accounts"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. раздел «Единая аутентификация»)
      disabled: true
    - name: format
      value: ""
      type: query
      description: "Формат вывода ответа Возможные значения: «json» (по умолчанию); «xml»"
      disabled: true
    - name: inn
      value: ""
      type: query
      description: ИНН субаккаунта ИНН субаккаунта, для которого необходимо вывести список доступных кодов товара. Если не указан, то выводятся все субаккаунты пользователя без списка кодов товаров
      disabled: true
    - name: limit
      value: ""
      type: query
      description: Количество записей в ответе Минимально допустимое значение — 1. Максимально допустимое значение — 10 000 (значение по умолчанию). Если в запросе указаны параметры «inn» («ИНН субаккаунта») и «limit» («Количество записей в ответе»), то параметр применяется к списку кодов товаров
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Смещение относительно начала выдачи Минимально допустимое значение — 0. Если 0 или не заполнено, то в ответе список кодов товара по субаккаунту возвращается от начала списка. Если указано значение, превышающее значение параметра «limit» («Количество записей в ответе»), то вернётся пустой ответ. Если в запросе указаны параметры «inn» («ИНН субаккаунта для которого необходимо вывести список доступных кодов маркировки») и «offset» («Смещение относительно начала выдачи»), то параметр применяется к списку кодов товаров
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

