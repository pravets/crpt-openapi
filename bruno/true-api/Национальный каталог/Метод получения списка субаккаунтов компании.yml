docs: |-
  Пример запроса:

  Пример: curl -X POST "<url стенда>/nk/linked-accounts?format=json&limit=10"
  -H "accept: application/json"
  -H "Authorization: Bearer <ТОКЕН>"

  Тип приватности: приватный.
