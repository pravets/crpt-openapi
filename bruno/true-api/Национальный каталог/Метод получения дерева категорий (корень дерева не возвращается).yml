info:
  name: Метод получения дерева категорий (корень дерева не возвращается)
  type: http
  seq: 6
  tags:
    - Национальный каталог

http:
  method: GET
  url: "{{baseUrl}}/nk/categories"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. раздел « Единая аутентификация »)
      disabled: true
    - name: cat_id
      value: ""
      type: query
      description: Идентификатор категории Не может быть указан одновременно с «tnved» («Код ТН ВЭД»)
      disabled: true
    - name: gismt_code
      value: ""
      type: query
      description: Код маркируемой товарной группы См. « Справочник «Список поддерживаемых товарных групп» ». Не может быть указан одновременно с «tnved» («Код ТН ВЭД»)
      disabled: true
    - name: tnved
      value: ""
      type: query
      description: Код ТН ВЭД Код конечного уровня от 4 до 10 цифр. Не может быть указан одновременно с «cat_id» («Идентификатор категории») и «gismt_code» («Код маркируемой товарной группы»)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
