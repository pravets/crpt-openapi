info:
  name: Метод генерации черновиков кодов товаров
  type: http
  seq: 15
  tags:
    - Национальный каталог

http:
  method: GET
  url: "{{baseUrl}}/nk/generate-gtins"
  params:
    - name: apikey
      value: ""
      type: query
      description: Параметр, необходимый для авторизации и совершения запросов API Параметр обязательный, если в заголовке запроса не указан «token» («Токен аутентификации») (см. раздел « Единая аутентификация »)
      disabled: true
    - name: exist
      value: ""
      type: query
      description: Признак, обозначающий запрос уже сгенерированных и имеющихся в базе пользователя gtin Принимает значения 1 / 0 (true / false)
      disabled: true
    - name: quantity
      value: ""
      type: query
      description: Количество новых черновиков кодов товаров, которые нужно сгенерировать Обязателен при запросе генерации новых черновиков gtin
    - name: supplier_key
      value: ""
      type: query
      description: «api-key» поставщика или производителя товаров При выставлении данного параметра генерируется карточка товара поставщика / производителя товаров (GTIN) в НКМТ. При этом используется GCP / GLN организации поставщика / производителя товаров
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

