info:
  name: Метод подписи предоставления или отзыва разрешения на использование КИ
  type: http
  seq: 4
  tags:
    - Национальный каталог

http:
  method: POST
  url: "{{baseUrl}}/nk/linked-accounts-sign"
  body:
    type: json
    data: |-
      [
        {
          "linked_account_inn": "000000001",
          "base64_xml": "string",
          "signature": "string"
        }
      ]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Успешный ответ
    request:
      url: "{{baseUrl}}/nk/linked-accounts-sign"
      method: POST
      body:
        type: json
        data: |-
          [
            {
              "linked_account_inn": "000000001",
              "base64_xml": "string",
              "signature": "string"
            }
          ]
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "signed": [],
            "linked_account_inn": "",
            "access": "",
            "errors": [],
            "message": "",
            "code": ""
          }
  - name: 400 Response
    description: Ошибка 400
    request:
      url: "{{baseUrl}}/nk/linked-accounts-sign"
      method: POST
      body:
        type: json
        data: |-
          [
            {
              "linked_account_inn": "000000001",
              "base64_xml": "string",
              "signature": "string"
            }
          ]
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "signed": [
              {
                "linked_account_inn": "0000000001",
                "access": "allowed"
              },
              {
                "linked_account_inn": "0000000002",
                "access": "deleted"
              }
            ],
            "errors": [
              {
                "linked_account_inn": "0000000003",
                "message": "text",
                "code": "11"
              }
            ]
          }
  - name: 401 Response
    description: "2.3. Код 401, если в заголовке запроса (параметр «Authorization: Bearer <token>») указан неактуальный для аккаунта аутентификационный токен ГИС МТ:"
    request:
      url: "{{baseUrl}}/nk/linked-accounts-sign"
      method: POST
      body:
        type: json
        data: |-
          [
            {
              "linked_account_inn": "000000001",
              "base64_xml": "string",
              "signature": "string"
            }
          ]
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_message": "Указан неактуальный для аккаунта <token>"
          }
  - name: 403 Response
    description: "2.5. Код 403, если указан неправильный ключ API:"
    request:
      url: "{{baseUrl}}/nk/linked-accounts-sign"
      method: POST
      body:
        type: json
        data: |-
          [
            {
              "linked_account_inn": "000000001",
              "base64_xml": "string",
              "signature": "string"
            }
          ]
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_message": "Отсутствует доступ к ресурсу"
          }
  - name: default Response
    description: Ошибка по умолчанию
    request:
      url: "{{baseUrl}}/nk/linked-accounts-sign"
      method: POST
      body:
        type: json
        data: |-
          [
            {
              "linked_account_inn": "000000001",
              "base64_xml": "string",
              "signature": "string"
            }
          ]
    response:
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error_code": "",
            "error_message": ""
          }

docs: |-
  Метод предназначен для подписи (с помощью сертификата в формате PKCS#7) предоставления или отзыва разрешения субаккаунту на использование своих кодов товаров для эмиссии КМ и ввода товаров в оборот. Данные кодируются в BASE64.

  Максимальное количество позиций в запросе: 100.

  Примечание По механизму настройки субаккаунтов компания-владелец кодов товаров может предоставить доступ только к российским кодам товаров (046) и кодам товаров индустриальной маркировки (004)

  Пример запроса:

  Пример: curl -X POST "<url стенда>nk/linked-accounts-sign?format=json"
  -H "accept: application/json"
  -H "Content-Type: application/json"
  -H "Authorization: Bearer <ТОКЕН>"
  --data-raw "[{\"linked_account_inn\":0,\"base64_xml\":\"string\",\"signature\":\"string\"}]"

  Тип приватности: приватный.
