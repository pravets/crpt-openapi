info:
  name: Загрузка файла информации продавца УПДи в формате XML
  type: http
  seq: 3
  tags:
    - Исходящие документы

http:
  method: POST
  url: "{{baseUrl}}/api/v1/outgoing-documents/xml/updi"
  headers:
    - name: send_mchd_file
      value: "false"
      description: |
        Способ передачи сведений об МЧД. Параметр необязательный.
        - true — будет передана МЧД в виде отдельного файла и подписи к нему, если данная МЧД зарегистрирована в ГИС МТ;
        - false — сведения об МЧД будут переданы в метаданных.
        Если параметр не заполнен, значение по умолчанию — false.
        При заполненном параметре система проверяет наличие информационных полей (ИнфПолФХЖ1) с наименованием «МЧД» в XML,
        берёт значение МЧД и передаёт указанную МЧД в виде файла в пакете с документом и подписью.
  body:
    type: multipart-form
    data:
      - name: content
        type: file
        value: []
        description: Ссылка на XML документ. Метод не поддерживает загрузку УПДи (ON_NSCHFDOPPRPROS) с признаком прослеживаемости (PROS)
      - name: signature
        type: text
        value: ""
        description: Откреплённая УКЭП XML документа в формате base64
      - name: parent_id
        type: text
        value: ""
        description: Идентификатор родительского документа (UUID)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
