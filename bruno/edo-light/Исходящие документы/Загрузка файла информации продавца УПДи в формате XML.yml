docs: |
  Метод предназначен для загрузки файла информации продавца (титула продавца) УПДи по формату Приказа ФНС России № ЕД-7-26/970@ от 19.12.2023.

  При выполнении метода без параметра «signature» загружаемый документ будет находиться в статусе «Черновик»,
  с параметром «signature» — в статусе «Отправлен».

  Метод не поддерживает загрузку УПДи (ON_NSCHFDOPPRPROS) с признаком прослеживаемости (PROS).
