info:
  name: Загрузка информации продавца УКД (приказ № 189 от 13.04.2016) в формате XML
  type: http
  seq: 4
  tags:
    - Исходящие документы

http:
  method: POST
  url: "{{baseUrl}}/api/v1/outgoing-documents/xml/ukd"
  body:
    type: multipart-form
    data:
      - name: content
        type: file
        value: []
        description: Ссылка на XML документ
      - name: signature
        type: text
        value: ""
        description: Откреплённая УКЭП XML документа в формате base64
      - name: parent_id
        type: text
        value: ""
        description: Идентификатор родительского документа (UUID)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Файл информации продавца УКД успешно загружен (при повторной загрузке файла с тем же наименованием вернётся идентификатор ранее загруженного файла)
    request:
      url: "{{baseUrl}}/api/v1/outgoing-documents/xml/ukd"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Ссылка на XML документ
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП XML документа в формате base64
          - name: parent_id
            type: text
            value: ""
            description: Идентификатор родительского документа (UUID)
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "00000000-0000-0000-0000-000000000000"
          }
  - name: 400 Response
    description: |
      Ошибка запроса. Типичные сообщения:
      - «Отсутствует или неверный формат заголовка запроса: multipart/form-data»;
      - «В теле запроса отсутствует файл» / «Отсутствует form-data key: content»;
      - «Неверный тип загружаемого файла: Content-Type: (...)»;
      - «Неверный тип документа загружаемого xml файла»;
      - «Неверный формат параметра "product_group" / "signature" / "folder"»;
      - «Неверный формат параметра запроса "parent_id"»;
      - «Нет прав на подписание документа».

      Полный перечень ошибок см. в документации ЭДО Лайт.
    request:
      url: "{{baseUrl}}/api/v1/outgoing-documents/xml/ukd"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Ссылка на XML документ
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП XML документа в формате base64
          - name: parent_id
            type: text
            value: ""
            description: Идентификатор родительского документа (UUID)
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }
  - name: 401 Response
    description: "Ошибка авторизации — токен не прошёл проверку, истёк срок жизни токена или запрос выполнен без токена («Access denied: token not valid» / «Access denied: token not found»)"
    request:
      url: "{{baseUrl}}/api/v1/outgoing-documents/xml/ukd"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Ссылка на XML документ
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП XML документа в формате base64
          - name: parent_id
            type: text
            value: ""
            description: Идентификатор родительского документа (UUID)
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }
  - name: 500 Response
    description: Внутренняя ошибка сервиса / сервис недоступен
    request:
      url: "{{baseUrl}}/api/v1/outgoing-documents/xml/ukd"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Ссылка на XML документ
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП XML документа в формате base64
          - name: parent_id
            type: text
            value: ""
            description: Идентификатор родительского документа (UUID)
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }

docs: |
  Метод предназначен для загрузки файла информации продавца УКД. Формат УКД регламентируется Приказом ФНС от 13 апреля 2016 г. № ММВ-7-15/189
  (https://www.nalog.gov.ru/rn77/about_fts/docs/6076582/).

  При выполнении метода без параметра «signature» загруженный документ будет находиться в статусе «Черновик»,
  с параметром «signature» — в статусе «Отправлен».
