info:
  name: Создание УПДи через XML (приказ № ЕД-7-26/970@ от 19.12.2023)
  type: http
  seq: 11
  tags:
    - Исходящие документы

http:
  method: POST
  url: "{{baseUrl}}/api/v1/outgoing-documents/xml/updi/970"
  body:
    type: multipart-form
    data:
      - name: content
        type: file
        value: []
        description: Файл документа (XML)
      - name: doc_id
        type: text
        value: ""
        description: Идентификатор связанного документа (UUID). Может быть указан документ любого типа (DOCUMENTS), который есть в БД
      - name: signature
        type: text
        value: ""
        description: Откреплённая УКЭП содержимого файла документа в формате base64
      - name: product_group
        type: text
        value: ""
        description: Код товарной группы. См. справочник «Список поддерживаемых товарных групп» документации ЭДО Лайт
      - name: movement_control
        type: text
        value: ""
        description: Объект, содержащий в себе флаги-параметры N4 и N5 (контроль движения маркированной продукции)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

