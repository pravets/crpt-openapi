docs: |
  Метод предназначен для создания УПДи через XML. Формирование УПДи производится по формату приказа ФНС России от 19.12.2023 № ЕД-7-26/970@,
  в том числе для документа-основания по формату приказа ФНС России от 19.12.2018 № ММВ-7-15/820@.

  Неоднозначность документации: в таблице заголовков указан Content-Type «application/x-www-form-urlencoded»,
  однако состав тела (загрузка файла) и перечень ошибок («Отсутствует заголовок запроса: multipart/form-data»,
  «Отсутствует form-data key: content») указывают на multipart/form-data — в спецификации принят multipart/form-data.
