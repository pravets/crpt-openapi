docs: |
  Метод предназначен для загрузки файла информации продавца (титула продавца) УПД по формату Приказа ФНС России № ЕД-7-26/970@ от 19.12.2023.

  При выполнении метода без параметра «signature» загруженный XML будет находиться в статусе «Черновик».
  При выполнении метода с параметром «signature» («Откреплённая УКЭП XML документа в формате base64») загруженный документ будет находиться в статусе «Отправлен».

  Метод не поддерживает загрузку УПД (ON_NSCHFDOPPRPROS) с признаком прослеживаемости (PROS).

  В зависимости от идентификатора ЭДО получателя документа (в *.xml значение «СвУчДокОбор.ИдПол») документ будет доставлен получателю в «ЭДО Лайт»
  или отправлен в роуминг; система проверит статус связи между отправителем и получателем в случае отправки документа в роуминг.

  При заполненном заголовке «send_mchd_file» система проверяет наличие информационных полей (ИнфПолФХЖ1) с наименованием «МЧД» в XML,
  берёт значение МЧД и передаёт указанную МЧД в виде файла в пакете с УПД и подписью.

  Форматы и XSD-схема размещены на сайте ФНС: https://www.nalog.gov.ru/rn77/about_fts/docs/8335278/
