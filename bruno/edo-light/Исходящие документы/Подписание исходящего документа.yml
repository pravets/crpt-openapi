docs: |
  Метод используется для добавления электронной откреплённой подписи к черновику файла информации продавца (УПД/УПДи/УКД/УКДи).
  В результате выполнения метода к документу добавляется откреплённая подпись, после чего документ отправляется получателю.

  Пример создания и подписания титула:
  1. Создаётся черновик документа методами загрузки файла информации продавца (УПД/УПДи/УКД) — возвращается doc_id документа.
  2. Запрашивается XML документа методом «Получение содержимого XML документа» с использованием doc_id — возвращается XML.
  3. XML подписывается и отправляется с использованием doc_id.

  Примечание: при попытке подписания и отправки документа участнику оборота товаров, не зарегистрированному в ГИС МТ,
  возвращается ошибка с кодом 400 («Невозможно создать документ. <наименование организации> не зарегистрирован в ГИС МТ»).
