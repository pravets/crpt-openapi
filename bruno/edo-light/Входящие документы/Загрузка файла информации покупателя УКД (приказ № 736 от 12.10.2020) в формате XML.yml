            value: ""
            description: Откреплённая УКЭП XML документа в формате base64
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "event_id": "000a0a00-0aaa-0a00-000a-0a00a0a0aa00"
