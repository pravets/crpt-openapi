docs: |
  Метод предназначен для загрузки файла информации покупателя УКД согласно приказу ФНС № ЕД-7-26/736@ от 12.10.2020.

  По документации Content-Type: application/json — для интеграции с 1С; multipart/form-data — в остальных случаях
  (структура JSON-тела для интеграции с 1С в документации не приведена).
