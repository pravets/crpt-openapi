info:
  name: Загрузка файла информации покупателя УКД (приказ № 189 от 13.04.2016) в формате XML
  type: http
  seq: 9
  tags:
    - Входящие документы

http:
  method: POST
  url: "{{baseUrl}}/api/v1/incoming-documents/xml/ukd/title"
  body:
    type: multipart-form
    data:
      - name: content
        type: file
        value: []
        description: Ссылка на XML документ (файл информации / титула покупателя)
      - name: doc_id
        type: text
        value: ""
        description: Идентификатор документа файла информации продавца (UUID)
      - name: signature
        type: text
        value: ""
        description: Откреплённая УКЭП XML документа в формате base64
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Файл информации покупателя УКД успешно загружен
    request:
      url: "{{baseUrl}}/api/v1/incoming-documents/xml/ukd/title"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Ссылка на XML документ (файл информации / титула покупателя)
          - name: doc_id
            type: text
            value: ""
            description: Идентификатор документа файла информации продавца (UUID)
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП XML документа в формате base64
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "event_id": "875b2e45-3aad-4c55-831b-2c58a5d7bb40"
          }
  - name: 400 Response
    description: |
      Ошибка запроса. Типичные сообщения:
      - «Неверно указан получатель документа» / «Неверно указан получатель»;
      - «Получатель использует услуги ЭДО другого оператора» / «Отсутствует настройка роуминга с оператором ЭДО получателя»;
      - «Отсутствует или неверный формат заголовка запроса: multipart/form-data»;
      - «В теле запроса отсутствует файл» / «Отсутствует form-data key: content»;
      - «Неверный тип документа загружаемого xml файла» / «Неверный тип загружаемого документа»;
      - «Подпись не прошла проверку в crypto» / «Нет прав на подписание квитанции»;
      - «Документ уже подписан» / «Документ ... не может быть подписан»;
      - «Функция документа и титула не совпадают»;
      - «Документ [doc_id] не найден в базе»;
      - «Неверный формат параметра запроса 'doc_id'».

      Полный перечень ошибок см. в документации ЭДО Лайт.
    request:
      url: "{{baseUrl}}/api/v1/incoming-documents/xml/ukd/title"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Ссылка на XML документ (файл информации / титула покупателя)
          - name: doc_id
            type: text
            value: ""
            description: Идентификатор документа файла информации продавца (UUID)
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП XML документа в формате base64
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }
  - name: 401 Response
    description: "Ошибка авторизации — токен не прошёл проверку, истёк срок жизни токена или запрос выполнен без токена («Access denied: token not valid» / «Access denied: token not found»)"
    request:
      url: "{{baseUrl}}/api/v1/incoming-documents/xml/ukd/title"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Ссылка на XML документ (файл информации / титула покупателя)
          - name: doc_id
            type: text
            value: ""
            description: Идентификатор документа файла информации продавца (UUID)
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП XML документа в формате base64
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }
  - name: 500 Response
    description: Внутренняя ошибка сервиса / сервис недоступен
    request:
      url: "{{baseUrl}}/api/v1/incoming-documents/xml/ukd/title"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Ссылка на XML документ (файл информации / титула покупателя)
          - name: doc_id
            type: text
            value: ""
            description: Идентификатор документа файла информации продавца (UUID)
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП XML документа в формате base64
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }

docs: |
  Метод предназначен для загрузки файла информации покупателя УКД согласно приказу ФНС № ММВ-7-15/189 от 13.04.2016.
  В ответе возвращается идентификатор события (event_id), по которому можно производить с документом необходимые действия.

  Неоднозначность документации: в таблице заголовков указан Content-Type «multipart/form-data»,
  однако в примере curl указан заголовок «Content-Type: application/json;charset=UTF-8» — в спецификации принят multipart/form-data.
