info:
  name: Получение списка входящих документов
  type: http
  seq: 4
  tags:
    - Входящие документы

http:
  method: GET
  url: "{{baseUrl}}/api/v1/incoming-documents"
  params:
    - name: limit
      value: "10"
      type: query
      description: Количество возвращаемых документов. По умолчанию 10
    - name: offset
      value: "0"
      type: query
      description: Позиция смещения в наборе результатов для начала нумерации страниц. По умолчанию 0
    - name: created_from
      value: ""
      type: query
      description: Нижняя граница фильтрации документов по времени создания (Unix timestamp, секунды). В выборку попадут документы, время создания которых больше или равно указанному
      disabled: true
    - name: created_to
      value: ""
      type: query
      description: Верхняя граница фильтрации документов по времени создания (Unix timestamp, секунды). В выборку попадут документы, время создания которых меньше или равно указанному
      disabled: true
    - name: partner_inn
      value: ""
      type: query
      description: ИНН контрагента. Для исходящего документа это получатель, для входящего — отправитель
      disabled: true
    - name: partner_id
      value: ""
      type: query
      description: Идентификатор получателя документа
      disabled: true
    - name: status
      value: ""
      type: query
      description: Цифровое обозначение статуса возвращаемых документов. См. справочник «Статусы документов» документации ЭДО Лайт
      disabled: true
    - name: type
      value: ""
      type: query
      description: Цифровое обозначение типа документов. См. справочник «Типы документов» документации ЭДО Лайт
      disabled: true
    - name: folder
      value: "0"
      type: query
      description: |
        Цифровое обозначение папки, в которой находятся документы. Для поиска по всем папкам параметр не указывается.
        Допустимые значения:
        - 0 — документы;
        - 1 — архив;
        - 2 — корзина;
        - 3 — на подписание;
        - 4 — отклоненные;
        - 5 — на подпись РВ;
        - 6 — на подпись РЭ;
        - 7 — биллинг;
        - 8 — автоподписание.
      disabled: true
    - name: folder
      value: "1"
      type: query
      description: |
        Цифровое обозначение папки, в которой находятся документы. Для поиска по всем папкам параметр не указывается.
