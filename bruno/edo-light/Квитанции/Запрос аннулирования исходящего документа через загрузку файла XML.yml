docs: |
  Метод предназначен для создания запроса (предложения) аннулирования исходящего документа — квитанции DP_PRANNUL — через загрузку XML-файла.

  Примечание: метод разрешает аннулировать документ в статусе «Уточнён», если все его дочерние документы аннулированы, т. е.:
  - УКД может быть аннулирован, если все УКДи на него уже находятся в статусе «Аннулирован»;
  - УПД может быть аннулирован, если УПДи, УКД и УКДи для него уже в статусе «Аннулирован».
