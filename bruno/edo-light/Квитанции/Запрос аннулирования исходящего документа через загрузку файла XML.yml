          - name: doc_id
            type: text
            value: ""
            description: Идентификатор документа, который предлагается аннулировать. В значении идентификатора допускаются символы латинского алфавита a–z и цифры 0–9 (UUID)
          - name: signature
            type: text
            value: ""
