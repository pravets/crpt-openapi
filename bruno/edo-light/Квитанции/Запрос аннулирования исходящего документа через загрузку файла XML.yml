  - name: 400 Response
    description: |
      Ошибка запроса. Типичные сообщения:
      - «Неверно указан получатель документа» / «Неверно указан получатель»;
      - «Получатель использует услуги ЭДО другого оператора» / «Отсутствует настройка роуминга с оператором ЭДО получателя»;
