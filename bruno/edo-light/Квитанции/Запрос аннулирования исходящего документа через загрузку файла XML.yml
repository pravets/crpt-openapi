info:
  name: Запрос аннулирования исходящего документа через загрузку файла XML
  type: http
  seq: 7
  tags:
    - Квитанции

http:
  method: POST
  url: "{{baseUrl}}/api/v1/outgoing-documents/xml/annul_02"
  body:
    type: multipart-form
    data:
      - name: content
        type: file
        value: []
        description: Файл DP_PRANNUL (XML)
      - name: doc_id
        type: text
        value: ""
        description: Идентификатор документа, который предлагается аннулировать. В значении идентификатора допускаются символы латинского алфавита a–z и цифры 0–9 (UUID)
      - name: signature
        type: text
        value: ""
        description: Откреплённая УКЭП
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Запрос аннулирования успешно создан
    request:
      url: "{{baseUrl}}/api/v1/outgoing-documents/xml/annul_02"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
