      - «"doc_id" обязательный параметр» / «"signature" обязательный параметр»;
      - «Неверный формат параметра "signature"»;
      - «Документ ... не найден в базе»;
      - «Ошибка создания объекта DP_PRANNUL[doc_id:] version:»;
      - «Ошибка сохранения эвента ... в базе».

      Полный перечень ошибок см. в документации ЭДО Лайт.
