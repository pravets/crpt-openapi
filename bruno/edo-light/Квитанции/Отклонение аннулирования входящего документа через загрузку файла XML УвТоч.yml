info:
  name: Отклонение аннулирования входящего документа через загрузку файла XML УвТоч
  type: http
  seq: 10
  tags:
    - Квитанции

http:
  method: POST
  url: "{{baseUrl}}/api/v1/incoming-documents/xml/annul_uvtoch"
  body:
    type: multipart-form
    data:
      - name: content
        type: file
        value: []
        description: Файл DP_UVUTOCH (XML)
      - name: doc_id
        type: text
        value: ""
        description: Идентификатор документа, для которого отклоняется аннулирование (UUID)
      - name: annul_id
        type: text
        value: ""
        description: Идентификатор запроса аннулирования — квитанции DP_PRANNUL (UUID)
      - name: signature
        type: text
        value: ""
        description: Откреплённая УКЭП
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Отклонение аннулирования успешно создано
    request:
      url: "{{baseUrl}}/api/v1/incoming-documents/xml/annul_uvtoch"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Файл DP_UVUTOCH (XML)
          - name: doc_id
            type: text
            value: ""
            description: Идентификатор документа, для которого отклоняется аннулирование (UUID)
          - name: annul_id
            type: text
            value: ""
            description: Идентификатор запроса аннулирования — квитанции DP_PRANNUL (UUID)
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "111b1e11-1aad-1c11-111b-1c11a1d1bb11"
          }
  - name: 400 Response
    description: |
      Ошибка запроса. Типичные сообщения:
      - «Неверно указан получатель документа» / «Неверно указан получатель»;
      - «Отсутствует или неверный формат заголовка запроса: multipart/form-data»;
      - «В теле запроса отсутствует файл» / «Отсутствует form-data key: content»;
      - «"doc_id" обязательный параметр» / «"signature" обязательный параметр» / «"annul_id" обязательный параметр»;
      - «Неверный формат параметра запроса "doc_id" / "annul_id"»;
      - «Нет прав на подписание квитанции» — подпись не прошла проверку;
      - «Квитанция запроса аннулирования ... не найдена» — квитанция DP_PRANNUL не найдена;
      - «На документ ... в статусе ... уточнение невозможно»;
      - «Ошибка создания объекта DP_UVUTOCH[doc_id:] для DP_PRANNUL[annul_id:]»;
      - «Документ ... не найден в базе».

      Полный перечень ошибок см. в документации ЭДО Лайт.
    request:
      url: "{{baseUrl}}/api/v1/incoming-documents/xml/annul_uvtoch"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Файл DP_UVUTOCH (XML)
          - name: doc_id
            type: text
            value: ""
            description: Идентификатор документа, для которого отклоняется аннулирование (UUID)
          - name: annul_id
            type: text
            value: ""
            description: Идентификатор запроса аннулирования — квитанции DP_PRANNUL (UUID)
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }
  - name: 401 Response
    description: "Ошибка авторизации — токен не прошёл проверку, истёк срок жизни токена или запрос выполнен без токена («Access denied: token not valid» / «Access denied: token not found»)"
    request:
      url: "{{baseUrl}}/api/v1/incoming-documents/xml/annul_uvtoch"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Файл DP_UVUTOCH (XML)
          - name: doc_id
            type: text
            value: ""
            description: Идентификатор документа, для которого отклоняется аннулирование (UUID)
          - name: annul_id
            type: text
            value: ""
            description: Идентификатор запроса аннулирования — квитанции DP_PRANNUL (UUID)
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }
  - name: 500 Response
    description: Внутренняя ошибка сервиса / сервис недоступен
    request:
      url: "{{baseUrl}}/api/v1/incoming-documents/xml/annul_uvtoch"
      method: POST
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Файл DP_UVUTOCH (XML)
          - name: doc_id
            type: text
            value: ""
            description: Идентификатор документа, для которого отклоняется аннулирование (UUID)
          - name: annul_id
            type: text
            value: ""
            description: Идентификатор запроса аннулирования — квитанции DP_PRANNUL (UUID)
          - name: signature
            type: text
            value: ""
            description: Откреплённая УКЭП
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }

docs: Метод предназначен для отклонения предложения об аннулировании входящего документа — создания уведомления об уточнении (DP_UVUTOCH) на предложение об аннулировании (DP_PRANNUL).
