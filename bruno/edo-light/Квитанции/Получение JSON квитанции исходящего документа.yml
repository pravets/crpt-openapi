docs: |
  Метод предназначен для получения содержимого квитанции исходящего документа в формате *.json.
  В частности, метод полезен для получения текста уведомления об уточнении, комментария к аннулированию или отказа от аннулирования.
  Список типов квитанций доступен в разделе «Справочник "Типы квитанций"» документации ЭДО Лайт.

  Неоднозначность документации: URL описан как «api/v1/outgoing-documents/идентификатор документа/events/{тип квитанции}»,
  т. е. в примере («events/000000») вместо идентификатора события указан тип квитанции. В спецификации параметр оформлен как
  event_id (UUID) по аналогии с остальными методами — фактический формат следует уточнять по документации.
