          type: path
          description: Идентификатор документа (UUID). В документации указан тип integer, однако во всех примерах используется UUID-строка
        - name: event_id
          value: ""
          type: path
          description: Идентификатор события / квитанции (UUID), полученный в ответе на создание файла информации покупателя или файла квитанции. В документации указан тип integer, однако в примерах используется UUID-строка
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Файл универсального сообщения в формате XML (DP_UNISOOBSCH)
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }
  - name: 404 Response
    description: «Документ не найден в БД» / «Квитанция не найдена в БД»
    request:
      url: "{{baseUrl}}/api/v1/outgoing-documents/xml/unimsg/:doc_id/event/:event_id"
      method: POST
      params:
        - name: doc_id
          value: ""
