info:
  name: Создание универсального сообщения через XML к предложению об аннулировании / титулу покупателя (исходящий документ)
  type: http
  seq: 3
  tags:
    - Универсальные сообщения

http:
  method: POST
  url: "{{baseUrl}}/api/v1/outgoing-documents/xml/unimsg/:doc_id/event/:event_id"
  params:
    - name: doc_id
      value: ""
      type: path
      description: Идентификатор документа (UUID). В документации указан тип integer, однако во всех примерах используется UUID-строка
    - name: event_id
      value: ""
      type: path
      description: Идентификатор события / квитанции (UUID), полученный в ответе на создание файла информации покупателя или файла квитанции. В документации указан тип integer, однако в примерах используется UUID-строка
  body:
    type: multipart-form
    data:
      - name: content
        type: file
        value: []
        description: Файл универсального сообщения в формате XML (DP_UNISOOBSCH)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Универсальное сообщение успешно создано
    request:
      url: "{{baseUrl}}/api/v1/outgoing-documents/xml/unimsg/:doc_id/event/:event_id"
      method: POST
      params:
        - name: doc_id
          value: ""
          type: path
          description: Идентификатор документа (UUID). В документации указан тип integer, однако во всех примерах используется UUID-строка
        - name: event_id
          value: ""
          type: path
          description: Идентификатор события / квитанции (UUID), полученный в ответе на создание файла информации покупателя или файла квитанции. В документации указан тип integer, однако в примерах используется UUID-строка
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Файл универсального сообщения в формате XML (DP_UNISOOBSCH)
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "cd0ce000-0cd0-0c0c-0f0a-00000e0c000f"
          }
  - name: 400 Response
    description: |
      Ошибка запроса. Типичные сообщения:
      - «Обмен УС со статусом {...} ограничен» — некорректный код УС;
      - «Приём УС для титула покупателя со статусом {...} ограничен» / «Приём УС для предложения об аннулировании со статусом {...} ограничен»;
      - «Для документа невозможно создать УС»;
      - «Невалидные входные параметры» / «Некорректное тело запроса» / «Тело запроса отсутствует»;
      - «Значение элемента ИдОтпрУС / ИдПолучУС не совпадает с данными, указанными в ИдФайл»;
      - «Данные отправителя / получателя УС не совпадают с данными получателя / отправителя документа или ПоА {filename}»;
      - «УС ссылается на квитанцию {...} и не может быть загружен к квитанции {filename}»;
      - «Имя загружаемого файла: {filename} не соответствует значению атрибута ИдФайл».

      Полный перечень ошибок см. в документации ЭДО Лайт.
    request:
      url: "{{baseUrl}}/api/v1/outgoing-documents/xml/unimsg/:doc_id/event/:event_id"
      method: POST
      params:
        - name: doc_id
          value: ""
          type: path
          description: Идентификатор документа (UUID). В документации указан тип integer, однако во всех примерах используется UUID-строка
        - name: event_id
          value: ""
          type: path
          description: Идентификатор события / квитанции (UUID), полученный в ответе на создание файла информации покупателя или файла квитанции. В документации указан тип integer, однако в примерах используется UUID-строка
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Файл универсального сообщения в формате XML (DP_UNISOOBSCH)
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }
  - name: 401 Response
    description: "Ошибка авторизации — токен не прошёл проверку, истёк срок жизни токена или запрос выполнен без токена («Access denied: token not valid» / «Access denied: token not found»)"
    request:
      url: "{{baseUrl}}/api/v1/outgoing-documents/xml/unimsg/:doc_id/event/:event_id"
      method: POST
      params:
        - name: doc_id
          value: ""
          type: path
          description: Идентификатор документа (UUID). В документации указан тип integer, однако во всех примерах используется UUID-строка
        - name: event_id
          value: ""
          type: path
          description: Идентификатор события / квитанции (UUID), полученный в ответе на создание файла информации покупателя или файла квитанции. В документации указан тип integer, однако в примерах используется UUID-строка
      body:
        type: multipart-form
        data:
          - name: content
            type: file
            value: []
            description: Файл универсального сообщения в формате XML (DP_UNISOOBSCH)
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "error_message": "",
            "code": "",
            "description": ""
          }
  - name: 403 Response
    description: «Указанная в токене роль не разрешена при работе с документом»
    request:
      url: "{{baseUrl}}/api/v1/outgoing-documents/xml/unimsg/:doc_id/event/:event_id"
      method: POST
