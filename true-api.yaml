                  errorMessage:
                    type: string
                    description: Сообщение об индивидуальной ошибке по КИ
                  errorCode:
                    type: integer
                    description: Код индивидуальной ошибки по КИ
                  error_message:
                    type: string
                    description: Сообщение об общей ошибке Параметр возвращается при
