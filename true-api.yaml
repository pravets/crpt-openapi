  /product/gtin:
    get:
      summary: Метод получения списка кодов товаров (GTIN) УОТ по ИНН
      operationId: get_product_gtin
      description: 'Метод возвращает список кодов товаров с возможностью указания
        параметров фильтрации в запросе. Для товарной группы «Альтернативная табачная
        продукция» в ответе отсутствует информация по кодам товаров, добавленным с
        помощью пользовательского интерфейса или через « Метод создания и обновления
        товаров » раздела « Методы «Национального каталога» ».


        Тип приватности: приватный.'
      x-section: 5.6.2
      x-doc-anchor: _метод_получения_списка_кодов_товаров_gtin_уот_по_инн
      tags:
      - Сведения о КИ и товарах
      - Карточки товара
      x-true-api-version: v4
      parameters:
      - name: includeSubaccount
        in: query
        required: false
        schema:
          type: boolean
        description: 'Субаккаунт Если значение = true, то в ответе возвращаются данные
          по всем кодам товаров: принадлежащих участнику оборота товаров и предоставленных
          ему через субаккаунт. Если значение = false, то в ответе возвращаются данные
          только по коду товара, принадлежащему участнику оборота товаров. Значение
          по умолчанию = false'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
        description: Максимальное количество заказов КМ в ответе Не более 10000 записей
          (по умолчанию 10 записей)
      - name: page
        in: query
        required: false
        schema:
          type: integer
        description: Номер страницы ответа, начальное значение - «0»
      - name: pg
        in: query
        required: true
        schema:
          type: string
        description: Наименование товарной группы См. « Справочник «Список поддерживаемых
          товарных групп» »
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        gtin:
                          type: string
                        goodStatus:
                          type: string
                        isKit:
                          type: boolean
                        isSet:
                          type: boolean
                        isGtinSubaccount:
                          type: boolean
                        setGtin:
                          type: array
                          items:
                            type: object
                            properties:
                              gtin:
                                type: string
                              quantity:
                                type: integer
                        setDescription:
                          type: string
                    description: В ответе возвращается по тем «gtin», по которым найдены
                      сведения, и которые удовлетворяют условиям поиска
                  total:
                    type: integer
                    description: Количество найденных товаров
                  errorCode:
                    type: string
                    description: Код ошибки Параметр указывается при наличии ошибки
                  goodStatus:
                    type: string
                    description: 'Статус карточки товара в НК Возможные значения:
                      draft - черновик, на модерации, требует изменений, ожидает подписания;
                      published - опубликована; archived - в архиве'
                  gtin:
                    type: string
                    description: Код товара
                  isGtinSubaccount:
                    type: boolean
                    description: Признак принадлежности кода товара субаккаунту Если
                      значение = true — субаккаунту был предоставлен доступ к этому
                      коду товара. Если значение = false — код товара собственный
                  isKit:
                    type: boolean
                    description: Признак «Комплект» в карточке товара Возвращается
                      в ответе при условии указания сведений в карточке товара в НК.
                      Принимает значение «false» при изменении карточки комплекта
                      на карточку набора или на карточку единицы товара для товарных
                      групп «Духи и туалетная вода», «Фотокамеры (кроме кинокамер),
                      фотовспышки и лампы-вспышки»
                  isSet:
                    type: boolean
                    description: Признак «Набор» по карточке товара в НК Возвращается
                      в ответе при условии указания сведений в карточке товара в НК.
                      Для карточки набора принимает значение «true» после изменения
                      значения «isKit» («Признак «Комплект» в карточке товара») с
                      «true» на «false» для товарных групп «Духи и туалетная вода»,
                      «Фотокамеры (кроме кинокамер), фотовспышки и лампы-вспышки».
                      Для карточки единицы товара принимает значение «false» после
                      изменения значения «isKit» («Признак «Комплект» в карточке товара»)
                      с true на false для товарных групп «Духи и туалетная вода»,
                      «Фотокамеры (кроме кинокамер), фотовспышки и лампы-вспышки»
                  permittedInns:
                    type: array
                    items:
                      type: string
                    description: Массив ИНН компаний-субаккаунтов, которым владелец
                      кода товара предоставил возможность использовать данный код
                      товара для заказа КМ Возвращается в ответе при условии указания
                      сведений в карточке товара в НК и только владельцу кода товара
                  setDescription:
                    type: string
                    description: Описание состава набора Возвращается описание товара
                      в составе набора, содержащее параметры, специфичные для конкретного
                      товара. Данный параметр вернётся в том случае, если он заполнен
                      в карточке НК (см. « Справочник «Дополнительные параметры в
