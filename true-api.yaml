          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /nk/short-product:
    get:
      summary: Метод получения краткой информации о товаре
      operationId: get_nk_short_product
      description: 'Метод возвращает краткую или полную информацию о продукте (товаре).


        Требует обязательного указания одного из следующих параметров: идентификатор
        товара, код товара (штрих-код) с указанием идентификатора торговой сети, который
        относится к запрашиваемому аккаунту.


        Если указаны более одного из обязательных параметров, то возвращается результат
        выборки, соответствующий данному алгоритму:


        Примечание Если карточка создана с признаком «is_sim» («Признак создания карточки
