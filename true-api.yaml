              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: Ошибка при выполнении запроса
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
