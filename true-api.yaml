  /nk/linked-accounts-sign:
    post:
      summary: Метод подписи предоставления или отзыва разрешения на использование
        КИ
      operationId: post_nk_linked_accounts_sign
      description: 'Метод предназначен для подписи (с помощью сертификата в формате
        PKCS#7) предоставления или отзыва разрешения субаккаунту на использование
        своих кодов товаров для эмиссии КМ и ввода товаров в оборот. Данные кодируются
        в BASE64.


        Максимальное количество позиций в запросе: 100.


        Примечание По механизму настройки субаккаунтов компания-владелец кодов товаров
        может предоставить доступ только к российским кодам товаров (046) и кодам
        товаров индустриальной маркировки (004)


        Пример запроса:


        Пример: curl -X POST "<url стенда>nk/linked-accounts-sign?format=json"

        -H "accept: application/json"

        -H "Content-Type: application/json"

        -H "Authorization: Bearer <ТОКЕН>"

        --data-raw "[{\"linked_account_inn\":0,\"base64_xml\":\"string\",\"signature\":\"string\"}]"


        Тип приватности: приватный.'
      x-section: '10.5'
      x-doc-anchor: _метод_подписи_предоставления_или_отзыва_разрешения_на_использование_ки
      tags:
      - Национальный каталог
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  linked_account_inn:
                    type: string
                  base64_xml:
                    type: string
                  signature:
                    type: string
            example:
            - linked_account_inn: '000000001'
              base64_xml: string
              signature: string
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  signed:
                    type: array
                    items:
                      type: number
                    description: Массив числовых идентификаторов товаров, для которых
                      прошла валидация и проверка карточки товара, товар переведен
                      в статус "Опубликован"
                  linked_account_inn:
                    type: string
                    description: ИНН субаккаунта
                  access:
                    type: string
                    description: 'Флаг предоставления или отзыва доступа Возможные
                      значения: allowed – предоставление доступа; deleted – отзыв
                      доступа'
                  errors:
                    type: array
                    items:
                      type: string
                    description: Массив объектов, содержащих идентификаторы товара
                      и текст ошибки, возникшей при обработке переданных XML (закодированных
                      в BASE64)
                  message:
                    type: string
                    description: Текст ошибки Возвращается в случае ошибки
                  code:
                    type: string
                    description: Код ошибки Возвращается в случае ошибки
                required:
                - access
                - code
                - linked_account_inn
                - message
                - signed
        '400':
          description: Ошибка 400
          content:
            application/json:
              schema:
                type: object
                properties:
                  signed:
                    type: array
                    items:
                      type: object
                      properties:
                        linked_account_inn:
                          type: string
                        access:
                          type: string
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        linked_account_inn:
                          type: string
                        message:
                          type: string
                        code:
                          type: string
              example:
                signed:
                - linked_account_inn: '0000000001'
                  access: allowed
                - linked_account_inn: '0000000002'
                  access: deleted
                errors:
                - linked_account_inn: '0000000003'
                  message: text
                  code: '11'
        '401':
          description: '2.3. Код 401, если в заголовке запроса (параметр «Authorization:
            Bearer <token>») указан неактуальный для аккаунта аутентификационный токен
