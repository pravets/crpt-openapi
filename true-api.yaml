        Пример: curl -X GET "<url стенда>/nk/generate-gtins?quantity=3"

        -H "accept: application/json"

        -H "Authorization: Bearer <ТОКЕН>"


        Пример запроса генерации новых черновиков gtin от имени поставщика контента
        или лаборатории:


        Пример: curl -X GET "<url стенда>/nk/generate-gtins?quantity=3&supplier_key=YYY"

        -H "accept: application/json"

        -H "Authorization: Bearer <ТОКЕН>"


        Пример запроса, возвращающий уже имеющиеся черновики gtin:


