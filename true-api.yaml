  /warehouse/balance:
    post:
      summary: Метод получения актуального баланса на складе
      operationId: post_warehouse_balance
      description: 'Метод возвращает информацию о балансе, актуальном на текущий день,
        по кодам товаров без остатков и без движения за текущие сутки, для товарных
        групп «Антисептики и дезинфицирующие средства», «Консервированная продукция»,
        «Корма для животных», «Косметика, бытовая химия и товары личной гигиены»,
        «Молочная продукция», «Морепродукты», «Растительные масла», «Соковая продукция
        и безалкогольные напитки», «Специализированная пищевая продукция и БАД к пище»
        и «Упакованная вода».


        Функциональность «Склад» обеспечивает предоставление сведений об обороте маркированного
        товара в объёмно-сортовом разрезе. Информация о состоянии баланса позволяет
        осуществлять контроль товарооборота — отслеживать количество единиц полученного
        и переданного товара по коду товара, что особенно актуально для документов
        с подачей сведений по объёмно-сортовым показателям (в подаваемом документе
        указываются коды товара и количество товара по каждому коду товара), а также
        отслеживать объёмно-весовые характеристики товара. Учёт товара ведётся на
        основании результата обработки полученных документов, влияющих на баланс,
        как с экземплярной прослеживаемостью (в подаваемом документе указывается перечень
        КИ), так и с объёмно-сортовой прослеживаемостью. Документами, влияющими на
        баланс, являются сведения, содержащие указание экземплярной или объёмно-сортовой
        прослеживаемости, поступившие от участника оборота товаров, и успешно обработанные
        в ГИС МТ.


        На балансе склада ГИС МТ не осуществляется учёт по кодам товаров групповых
        упаковок и наборов. После успешной обработки документа, влияющего на баланс,
        в котором указаны коды товаров групповых упаковок или наборов, к учёту будут
        приняты только коды единиц товаров, вложенные в данную групповую упаковку
        или набор. Количество на балансе склада ГИС МТ равно общему количеству кодов
        единиц товаров .


        На балансе склада учитываются операции расхода по чеку продажи с поэкземплярным
        указанием кодов маркировки и прихода по чеку возврата / чеку возврата (коррекции)
        при отсутствии признака HoReCa в реквизитах чека. Для чеков с указанием кода
        товара (GTIN) и количества такие операции учитываются только при отсутствии
        признаков вендинга и HoReCa в реквизитах чека.


        Операции расхода / прихода на балансе склада по чеку продажи / чеку возврата
        / чеку возврата (коррекции) с признаком агентско-комиссионной схемы и указанием
        кода товара (GTIN), а также количества, отражаются на балансе поставщика,
        а не фактического продавца, если до момента реализации не зарегистрировано
        перемещение кодов идентификации на фактического продавца.


        Тип приватности: приватный.


        В документации приведено несколько вариантов тела запроса (2); в спецификации
        использован репрезентативный пример, остальные варианты см. в разделе 5.10
        документации.'
      x-section: '5.10'
      x-doc-anchor: _метод_получения_актуального_баланса_на_складе
      tags:
      - Сведения о КИ и товарах
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gtins:
                  type: array
                  items:
                    type: string
                  description: 'Массив кодов товаров От 1 до 1000 кодов товаров включительно.
                    Формат кода товара: 14 цифр включительно. Если код товара менее
                    14 цифр, то дополнить его лидирующими нулями. При отсутствии параметра
                    в ответе возвращается информация по всем найденным кодам товаров
                    (не более 1000 на странице с учётом параметров пагинации) участника
                    оборота товаров, выполнившего запрос'
                pagination:
