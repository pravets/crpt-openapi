  /elk/outgoing-documents:
    get:
      summary: Получение статуса заключения договора
      operationId: get_elk_outgoing_documents
      description: 'Метод предназначен для получения информации о статусе заключения
        всех договоров между ГИС МТ и УОТ.


        В результате передачи в токене запроса идентификатора УОТ (ParticipantId)
        возвращается массив статусов обработки договоров УОТ.


        Существуют следующие статусы:


        Если подписана только часть договоров, то УОТ не может быть полностью активен
        в ГИС МТ (общий статус УОТ не валиден в Системе).


        Если требуется подписание договора со стороны УОТ, то статус входящего документа
        = "Черновик".


        Если требуется подписание договора со стороны Оператора, то статус входящего
        документа = "Доставлен (ожидается подпись)", статус исходящего документа =
        "Требуется подпись".


        Если обе стороны подписали документ, то статус входящего и исходящего документа
        = "Подписан".


        Тип приватности: приватный.


        В документации раздел описывает несколько URL; данная операция соответствует
        варианту: «Для исходящих документов».


        Этот же метод (path+HTTP-метод) описан также в разделе 9.3 «Метод получения
        списка документов» документации.'
      x-section: 3.7.4
      x-doc-anchor: _получение_статуса_заключения_договора
      tags:
      - Обращение к True API
      - Счета и договоры
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: string
        description: Количество возвращаемых документов Значение по умолчанию = 10
      - name: offset
        in: query
        required: false
        schema:
          type: string
        description: Смещение Значение по умолчанию = 0
      - name: asc
        in: query
        required: false
        schema:
          type: boolean
        description: 'Параметр, определяющий направление сортировки Допустимые значения:
          false — по убыванию (значение по умолчанию); true — по возрастанию'
      - name: created_from
        in: query
        required: false
        schema:
          type: integer
          format: int64
        description: Нижняя граница фильтрации документов по времени создания В выборку
          попадут документы, время создания которых больше или равно указанному
      - name: created_to
        in: query
        required: false
        schema:
          type: integer
          format: int64
        description: Верхняя граница фильтрации документов по времени создания В выборку
          попадут документы, время создания которых меньше или равно указанному
      - name: folder
        in: query
        required: false
        schema:
          type: integer
        description: 'Цифровое обозначение папки, в которой находятся документы Для
          поиска по всем папкам параметр не указывается. Допустимые значения: 0 —
          документы; 1 — архив; 2 — корзина; 3 — на подписание; 4 — отклоненные; 5
          — на подпись РВ; 6 — на подпись РЭ; 7 — биллинг; 8 — автоподписание'
      - name: partner_id
        in: query
        required: false
        schema:
          type: string
        description: Идентификатор получателя документа
      - name: partner_inn
        in: query
        required: false
        schema:
          type: string
        description: ИНН контрагента Для исходящего документа это получатель, для
          входящего — отправитель
      - name: product_group
        in: query
        required: false
        schema:
          type: integer
        description: Цифровое обозначение товарной группы См. Справочник «Список поддерживаемых
          товарных групп»
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
        description: 'Параметр, по которому необходимо отсортировать возвращаемый
          список документов Допустимые значения: created_at — время создания документа'
      - name: status
        in: query
        required: false
        schema:
          type: integer
        description: Цифровое обозначение статуса возвращаемых документов См. « Справочник
          «Статусная модель» »
      - name: type
        in: query
        required: false
        schema:
          type: integer
        description: Цифровое обозначение типа создаваемых документов См. « Справочник
          «Типы универсальных документов» »
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: Число возвращённых документов
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: integer
                    description: Список договоров с ГИС МТ При наличии договора в
                      ГИС МТ
                  id:
                    type: string
                    description: Идентификатор документа в системе ЭДО оператора
                  status:
                    type: number
                    description: Статус заключения черновика договора либо договора
                      см. справочник «Статусная модель» Если status = 4, то договор
                      считается подписанным обеими сторонами. Иначе при любом другом
                      значении status договор считается неподписанным обеими сторонами.
                required:
                - count
                - id
                - status
              example:
                count: 4
                items:
                - id: 5b7f19e8-db96-463a-9735-2ef1a73abf9b
                  status: 2
                - id: 02e88283-5793-42fd-bdba-1b5176fe912c
                  status: 4
                - id: 0268d1c9-b601-4866-9ed1-3595e34387bc
                  status: 0
                - id: 057fbd84-a933-4eee-b5a4-0f4b9579f901
                  status: 1
        '401':
          description: '2.1. Код 401 В случае, если не указан токен:'
          content:
            application/xml:
              schema:
                type: string
              example: '<UnauthorizedException>

                <error>unauthorized</error>

                <error_description>Full authentication is required to access this

                resource</error_description>

                </UnauthorizedException>'
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-merged-sections:
      - '9.3'
