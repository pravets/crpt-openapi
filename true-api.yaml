            и аутентификационный токен ГИС МТ в заголовке запроса (параметр «Authorization:
            Bearer <token>»):'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: Недопустимо использование apikey вместе с <token>
        '401':
          description: '2.4. Код 401, если в заголовке запроса (параметр «Authorization:
            Bearer <token>») указан неактуальный для аккаунта аутентификационный токен
            ГИС МТ:'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: У�казан неактуальный для аккаунта <token>
        '403':
          description: '2.6. Код 403, если указан неправильный ключ API:'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: Отсутствует доступ к ресурсу
