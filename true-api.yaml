  /product/gtin-weight/cis-count:
    post:
      summary: Метод расчёта количества КИ на основании веса товара
      operationId: post_product_gtin_weight_cis_count
      description: 'В ответе метода возвращается информация о количестве единиц товара
        для каждой запрашиваемой пары кода товара и веса в граммах. Если в карточке
        товара в НКМТ не заполнены или некорректно заполнены атрибуты по весовым характеристикам
        товара, то в ответе метода информация о количестве КИ будет отсутствовать.


        Метод доступен для товарных групп, в которых реализован объёмно-сортовой учёт
        (в документе указывается количество товаров и их коды товаров) по весу товара.


        Для метода действует ограничение на частоту запросов. Минимальный интервал
        между запросами — 30 секунд.


        Тип приватности: c токеном авторизации участника оборота товаров или Оператора
        ЭДО.'
