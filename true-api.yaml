              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: Указанный ИНН не найден
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
