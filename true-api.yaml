  /nk/linked-gtins:
    get:
      summary: Метод проверки доступа к списку кодов товаров со стороны субаккаунта
      operationId: get_nk_linked_gtins
      description: 'Метод предназначен для проверки доступа к кодам товаров со стороны
        субаккаунта.


        Примечание По механизму настройки субаккаунтов получить доступ можно только
        к российским кодам товаров (046) и кодам товаров индустриальной маркировки
        (004)


        Пример запроса:


        Пример: curl -X GET "<url стенда>/nk/linked-gtins?gtin=0000000000000"

        -H "accept: application/json"

        -H "Authorization: Bearer<ТОКЕН>"


        Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).'
      x-section: '10.21'
      x-doc-anchor: _метод_проверки_доступа_к_списку_кодов_товаров_со_стороны_субаккаунта
      tags:
      - Национальный каталог
      security: []
      parameters:
      - name: apikey
        in: query
        required: false
        schema:
          type: string
        description: Параметр, необходимый для авторизации и совершения запросов API
          Параметр обязательный, если в заголовке запроса не указан «token» («Токен
          аутентификации») (см. раздел «Единая аутентификация»)
      - name: gtin
        in: query
        required: false
        schema:
          type: string
        description: Код товара Указывается для проверки доступности конкретного кода
          товара. Можно указать несколько значений. Максимально допустимое значение
          — 10 000, минимально допустимое значение — 0
      - name: inn
        in: query
        required: false
        schema:
          type: string
        description: ИНН субаккаунта ИНН субаккаунта, для которого необходимо вывести
          список доступных кодов товаров
      - name: limit
        in: query
        required: false
        schema:
          type: integer
        description: Количество записей в ответе Максимально допустимое значение —
          10 000 (по умолчанию). Минимально допустимое значение — 1
      - name: offset
        in: query
        required: false
        schema:
          type: integer
        description: Смещение относительно начала выдачи Минимально допустимое значение
          — 0. При указании значения, превышающего значение парамера «limit» («Количество
          записей в ответе»), вернётся пустой ответ
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiversion:
                    type: integer
                    description: Номер версии API метода
                  result:
                    type: object
                    properties:
                      linked_gtins:
                        type: array
                        items:
                          type: object
                          properties:
                            producer_inn:
                              type: string
                            producer_name:
                              type: string
                            gtin:
                              type: string
                    description: Результат Возвращается при наличии ответа
                  linked_gtins:
                    type: array
                    items:
                      type: object
                    description: Список кодов товаров, к которым предоставлен доступ
                      Возвращается пустой массив, если участник оборота товаров не
                      добавлен как субаккаунт. Обязательный, если возвращается «result»
                      («Результат»)
                  producer_inn:
                    type: string
                    description: ИНН основного аккаунта ИНН владельца кода товара,
                      предоставившего доступ для субаккаунта. Обязательный, если возвращается
                      «linked_gtins» («Список кодов товаров, к которым предоставлен
                      доступ»)
                  producer_name:
                    type: string
                    description: Наименование основного аккаунта Обязательный, если
                      возвращается «linked_gtins» («Список кодов товаров, к которым
                      предоставлен доступ»)
                  gtin:
                    type: string
                    description: Код товара Обязательный, если возвращается «linked_gtins»
                      («Список кодов товаров, к которым предоставлен доступ»)
                  errors:
                    type: array
                    items:
                      type: object
                    description: Список ошибок Возвращается при наличии ошибок
                  message:
                    type: string
                    description: Текст ошибки
                  code:
                    type: integer
                    description: Код ошибки
                required:
                - apiversion
              example:
                apiversion: 3
                result:
                  linked_gtins:
                  - producer_inn: string
                    producer_name: string
                    gtin: '0000000000001'
                  - producer_inn: string
                    producer_name: string
                    gtin: '0000000000002'
                  - producer_inn: string
                    producer_name: string
                    gtin: '0000000000003'
        '400':
          description: Ошибка 400
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: Недопустимо использование apikey вместе с <token>
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/simpleSignIn/{omsConnection}:
    post:
      summary: Метод получения токена аутентификации в СУЗ
      operationId: post_auth_simplesignin_by_omsconnection
      description: 'Метод используется для получения маркера безопасности (токена
        аутентификации) в СУЗ.


        Для получения токена для СУЗ в строке запроса указывается параметр «omsConnection»
        — уникальный идентификатор соединения (внешнего подключения), присвоенный
        зарегистрированной установке интеграционного решения.'
      x-section: '11.1'
      x-doc-anchor: _метод_получения_токена_аутентификации_в_суз
      tags:
      - Станция управления заказами
      parameters:
      - name: omsConnection
        in: path
        required: true
        schema:
          type: string
        description: Уникальный идентификатор соединения (внешнего подключения), присвоенный
          зарегистрированной установке интеграционного решения Выдаётся при регистрации
          установки интеграционного решения
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                uuid:
                  type: string
                  description: Уникальный идентификатор сгенерированных случайных
                    данных
                data:
                  type: string
                  description: Cлучайные данные в base64, подписанные УКЭП участника
                    оборота товаров, зарегистрированного в ГИС МТ (присоединённая
                    электронная подпись)
                inn:
                  type: string
                  description: 'ИНН участника оборота товаров, под которым требуется
                    авторизация для физического лица по машиночитаемой доверенности
                    Параметр заполняется для получения аутентификационного токена
                    на конкретную организацию / индивидуального предпринимателя и
                    только в случае, если пользователь, выполняющий запрос, имеет
                    активные машиночитаемые доверенности от разных организаций / индивидуальных
                    предпринимателей. Длина значения: 10 или 12 цифр'
              required:
              - data
              - uuid
            example:
              uuid: b223216d-5c43-416a-b2c3-39c79240c08a
              data: <Подписанные данные в base64>
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Токен аутентификации Токен действителен в течение
                      10 часов. Параметр возвращается в случае успешного ответа
                  code:
                    type: string
                    description: Код ошибки
                  error_message:
                    type: string
                    description: Сообщение об ошибке Возвращается в случае ошибки
                  description:
                    type: string
                    description: Описание ошибки Возвращается в случае ошибки
              example:
                token: 2f2222c2-cbc2-22ff-bc2c-2222222fbef2
        '400':
          description: '2.1. Код 400, если не указан параметр тела запроса «uuid»
            («Уникальный идентификатор подписанных случайных данных»):'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: В запросе отсутствует идентификатор авторизации (UUID)
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 'Аутентификация по токену (Bearer). Токен получается в два шага:
        GET /auth/key (получение пары uuid + data) и POST /auth/simpleSignIn (передача
        uuid и подписанных УКЭП данных; в ответе — токен). Для СУЗ используется POST
        /auth/simpleSignIn/{omsConnection}. Токен передаётся в заголовке Authorization:
        Bearer <токен>.'
  schemas:
    Error:
      type: object
      properties:
        error_code:
          type: string
          description: Код ошибки
        error_message:
          type: string
          description: Описание ошибки
security:
- bearerAuth: []
