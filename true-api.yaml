  /agreement-registry/agreement:
    post:
      summary: Метод создания документа согласия о предоставлении сведений о КИ
      operationId: post_agreement_registry_agreement
      description: 'Метод формирует черновик, который подписывается УКЭП генерального
        директора в личном кабинете ГИС МТ. В ГИС МТ может находиться только один
        действующий документ согласия о предоставлении сведений.


        Тип приватности: приватный.'
      x-section: 5.8.1
      x-doc-anchor: _метод_создания_документа_согласия_о_предоставлении_сведений_о_ки
      tags:
      - Сведения о КИ и товарах
      - Согласие на предоставление информации
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trustedInns:
                  type: array
                  items:
                    type: string
                  description: Список доверенных ИНН контрагентов
                everyonePermitted:
                  type: boolean
                  description: Признак предоставления согласия для всех контрагентов
                    При необходимости подписания согласия для всех контрагентов значение
                    параметра должно быть "true", при этом параметр "trustedInn" должен
                    быть пустым. Заполнение обоих параметров одновременно недопустимо.
                    При передаче списка ИНН доверенных контрагентов в параметре "trustedInn"
                    параметр "everyonePermitted" должен быть либо пустым, либо иметь
                    значение "false". Параметр "everyonePermitted" автоматически принимает
                    значение "false" при передаче пустого значения
                expirationDate:
                  type: string
                  description: 'Дата окончания срока действия согласия Формат: yyyy-MM-ddTHH:mm:ss.SS’Z.
                    Значение не может превышать дату окончания срока действия используемой
                    УКЭП. Значение устанавливаемой даты не может быть меньше текущей
                    даты создания документа согласия о предоставлении сведений'
              required:
              - expirationDate
            example:
              trustedInns:
              - string
              everyonePermitted: true
              expirationDate: string
      responses:
        '201':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID документа согласия о предоставлении информации
                  message:
                    type: string
                    description: Сообщение об ошибке Возвращается только в случае
                      ошибки
                required:
                - id
              example:
                id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        '400':
          description: 2.В случае ошибки 400 (документ не прошёл валидацию);
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    message:
                      type: string
                    object:
                      type: array
                      items:
                        type: string
              example:
              - message: Для опубликованной ревизии согласия существует документ аннулирования
                  в статусе 'На подготовке'
                object: []
              - message: Срок действия документа не должен заканчиваться позже даты
