        идентификаторов ФИАС адресов МОД»), то в ответе возвращаются данные по блокировке
        участника оборота товаров, осуществляющего запрос.


        Метод доступен только для товарной группы «Пиво, напитки, изготавливаемые
        на основе пива, слабоалкогольные напитки».


        Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).'
      x-section: '3.4'
      x-doc-anchor: _метод_проверки_статуса_места_осуществления_деятельности_организации
      tags:
      - Обращение к True API
      x-true-api-version: v3
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pg:
                  type: array
                  items:
                    type: string
                  description: 'Массив товарных групп Возможное значение: «beer» («Пиво,
                    напитки, изготавливаемые на основе пива, слабоалкогольные напитки»)'
                inn:
                  type: string
                  description: ИНН Можно указать только один ИНН. Если не заполнен,
                    то вернутся МОД участника оборота товаров, осуществляющего запрос.
                    Если параметр заполнен, вернутся МОД участника оборота товаров,
                    ИНН которого указан в этом параметре
                kpp:
                  type: array
                  items:
                    type: string
                  description: Массив КПП МОД Только для юридических лиц. Не более
                    1000 КПП в массиве
                fiasId:
                  type: array
                  items:
                    type: string
                  description: Массив идентификаторов ФИАС адресов МОД Только для
                    индивидуальных предпринимателей. Не более 1000 идентификаторов
                    ФИАС в массиве
              required:
              - pg
            example:
              pg:
              - beer
              inn: '1234567890'
              kpp:
              - '123456789'
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  productGroupInfo:
                    type: array
                    items:
                      type: object
                      properties:
                        productGroup:
                          type: string
                        status:
                          type: string
                    description: Статус доступности работы с товарной группой по ЕГАИС
                  mods:
                    type: array
                    items:
                      type: object
                      properties:
                        kpp:
                          type: string
                        productGroup:
                          type: string
                        isBlocked:
                          type: boolean
                        address:
                          type: string
                    description: МОД
                  productGroup:
                    type: string
                    description: 'Товарная группа Возможное значение: «beer» («Пиво,
                      напитки, изготавливаемые на основе пива, слабоалкогольные напитки»)'
                  status:
                    type: string
                    description: 'Статус Возможные значения: blocked — все адреса
                      осуществления деятельности заблокированы в ЕГАИС; active — есть
                      адреса осуществления деятельности не заблокированные в ЕГАИС'
                  kpp:
                    type: string
                    description: КПП МОД Возвращается для юридических лиц
                  fiasId:
                    type: string
                    description: Идентификатор ФИАС МОД Возвращается для индивидуальных
                      предпринимателей
                  isBlocked:
                    type: boolean
                    description: 'Признак блокировки Возможные значения: true — заблокирован
                      в ЕГАИС; false — не заблокирован в ЕГАИС'
                  address:
                    type: string
                    description: Адрес МОД
                required:
                - address
                - isBlocked
                - productGroup
                - status
              example:
                productGroupInfo:
                - productGroup: beer
                  status: active
                mods:
                - kpp: '123456789'
                  productGroup: beer
                  isBlocked: false
                  address: string
        '400':
          description: '2.1. Код 400, если не заполнен параметр тела запроса «pg»
            («Массив товарных групп»):'
          content:
            application/json:
              schema:
