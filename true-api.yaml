                    description: Код товара из тела запроса
                  weight:
                    type: integer
                    description: Вес товара в граммах из тела запроса Число строкового
                      типа преобразуется в число числового типа
                  cisCount:
                    type: integer
                    description: 'Количество КИ Количество единиц товара для каждого
                      запрашиваемого объекта в параметре тела запроса "products" ("Список
