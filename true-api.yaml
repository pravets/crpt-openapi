                    методов: « Метод получения карточки товара, в том числе неопубликованной
                    карточки »; « Метод получения полной информации о товаре »; «
                    Метод получения краткой информации о товаре »'
                gtin:
                  type: string
                  description: Код товара Обязательный при создании новой карточки
