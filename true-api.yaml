  /nk/attributes:
    get:
      summary: Метод получения списка атрибутов как публичных, так и приватных для
        запрашивающего аккаунта
      operationId: get_nk_attributes
      description: 'Метод возвращает перечень атрибутов для создания карточки товара
        с указанным кодом ТН ВЭД или идентификатором категории. Если не указан код
        ТН ВЭД или идентификатор категории, возвращается полный список атрибутов доступных
        для запрашивающего аккаунта.


        Если ТН ВЭД не определяет товарную группу однозначно, то для получения корректного
        перечня атрибутов следует предварительно запросить перечень категорий, соответствующих
        данному ТН ВЭД (« Метод получения дерева категорий (корень дерева не возвращается)
        »), после чего осуществить запрос списка атрибутов по идентификатору подходящей
        категории (параметр «cat_id»).


        Пример запроса с использованием идентификатора категории:


        Пример: curl -X GET "<url стенда>/nk/attributes?cat_id=11111&attr_type=m"

        -H "accept: application/json"

        -H "Authorization: Bearer <ТОКЕН>"


        Пример запроса с использованием кода ТН ВЭД:


        Пример: curl -X GET "<url стенда>/nk/attributes?tnved=1111&attr_type=m"

        -H "accept: application/json"

        -H "Authorization: Bearer <ТОКЕН>"


        Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).'
      x-section: '10.2'
      x-doc-anchor: metod_polucheniya_spiska_atributov_kak_publichnykh_tak_i_privatnykh_dlya_zaprashivayushchego_akkaunta
      tags:
      - Национальный каталог
      security: []
      parameters:
      - name: apikey
        in: query
        required: false
        schema:
          type: string
        description: Параметр, необходимый для авторизации и совершения запросов API
          Параметр обязательный, если в заголовке запроса не указан «token («Токен
          аутентификации») (см. раздел «Единая аутентификация»)
      - name: attr_type
        in: query
        required: false
        schema:
          type: string
        description: 'Тип атрибута Возможные значения: «a» — вернуть все атрибуты
          (значение по умолчанию); «m» — вернуть только обязательные атрибуты; «r»
          — вернуть только рекомендуемые атрибуты; «o» — вернуть только опциональные
          атрибуты'
      - name: cat_id
        in: query
        required: false
        schema:
          type: integer
        description: Идентификатор категории Идентификатор любой из категорий товаров,
          к которой относятся атрибуты. Параметр обязательный, если указан параметр
          «attr_type» («Тип атрибута») и не указан параметр «tnved» («Код ТН ВЭД»)
      - name: format
        in: query
        required: false
        schema:
          type: string
        description: 'Формат вывода ответа Возможные значения: «json» (по умолчанию);
          «xml»'
      - name: is_set
        in: query
        required: false
        schema:
          type: boolean
        description: 'Признак карточки товара типа «Набор» Используется для получения
          атрибутивного состава набора. Возможные значения: true; false (по умолчанию)'
      - name: tnved
        in: query
        required: false
        schema:
          type: string
        description: Код ТН ВЭД Код ТН ВЭД (10 знаков) или группы ТН ВЭД (4 знака),
          для которого запрашивается набор атрибутов. Параметр обязательный, если
          указан параметр «attr_type» («Тип атрибута») и не указан «cat_id» («Идентификатор
          категории»)
      responses:
