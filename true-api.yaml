  /doc/{docId}/info:
    get:
      summary: Метод получения содержимого документа по идентификатору
      operationId: get_doc_by_docid_info
      description: 'Для товарной группы «Духи и туалетная вода» метод возвращает в
        ответе только КИ из тела документа (см. « Справочник «Типы документов» »)
        без отражения информации о КИ дочерних вложений, входящих в состав агрегирующих
        КИ: параметры «count_children» и «children» в ответе остаются скрытыми.


        Пример запроса:


        Пример: curl -X GET "<url стенда v4>/doc/f111111e-11fa-11d1-111d-1cf1c1f1111c/info?pg=lp&body=true"

        -H "accept: application/json"

        -H "Authorization: Bearer <Токен>"


        Тип приватности: приватный.'
      x-section: '6.3'
      x-doc-anchor: _метод_получения_содержимого_документа_по_идентификатору
      tags:
      - Документы и чеки
      x-true-api-version: v4
      parameters:
      - name: docId
        in: path
        required: true
        schema:
          type: string
        description: ID документа, формируемый в ГИС МТ, или ИдФайл для УД
      - name: body
        in: query
        required: false
        schema:
          type: boolean
        description: 'Признак необходимости в теле ответа содержимого документа Возможные
          значения: «true» — содержимое отправленного документа возвращается в ответе
          метода; «false» — содержимое отправленного документа не возвращается в ответе
          метода. Значение по умолчанию = «false» По умолчанию установлен лимит —
          в ответе передаётся информация о 50 дочерних КМ'
      - name: content
        in: query
        required: false
        schema:
          type: boolean
        description: 'Признак необходимости контента документа в теле ответа Возможные
          значения: «true» — контент документа возвращается в ответе метода; «false»
          — контент документа не возвращается в ответе метода. Значение по умолчанию
          = «false»'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
        description: 'Количество кодов в теле документа Указывается только для документов
          УПД (UNIVERSAL_TRANSFER_DOCUMENT), УПДи (UNIVERSAL_TRANSFER_DOCUMENT_FIX),
          УКД (UNIVERSAL_CORRECTION_DOCUMENT), УКДи (UNIVERSAL_CORRECTION_DOCUMENT_FIX),
          УПД (отгрузка продукции) (FIXATION). Для других типов документов игнорируется
          при обработке. Значение по умолчанию и максимальное значение: 36000'
      - name: pageNumber
        in: query
        required: false
        schema:
          type: integer
        description: 'Лимит вывода информации по кодам Указывается для вывода информации
          по кодам только для документов УПД, УПДи, УКД, УКДи, УПД (отгрузка продукции).
          Для других типов документов игнорируется при обработке. Значение по умолчанию:
          1. Если не указан, то в ответе возвращаются первые 36 000 значений кодов.
          Пример: если «pageNumber» = 1 и «limit» = 10 000, то в ответе вернутся первые
          10 000 кодов по документу, для запроса следующих 10 000 кодов в параметре
          «pageNumber» указать соответствующее по счёту значение'
      - name: pg
        in: query
        required: false
        schema:
          type: string
        description: Товарная группа См. « Справочник «Список поддерживаемых товарных
          групп» ». Параметр обязательный для товарной группы «Товары из натурального
          меха»
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    number:
                      type: string
                    docDate:
                      type: string
                      format: date-time
                    receivedAt:
                      type: string
                      format: date-time
                    type:
                      type: string
                    status:
                      type: string
                    senderInn:
                      type: string
                    senderName:
                      type: string
                    receiverInn:
                      nullable: true
                    receiverName:
                      nullable: true
                    invoiceNumber:
                      nullable: true
                    invoiceDate:
                      nullable: true
                    relatedDocId:
                      nullable: true
                    body:
                      type: object
                    input:
                      type: boolean
                    errors:
                      type: array
                      items:
                        type: string
                    commonErrors:
                      type: array
                      items:
                        type: object
                        properties:
                          errorCode:
                            type: string
                          errorMessage:
                            type: string
                          errorObject:
                            type: string
                    productGroup:
                      type: array
                      items:
                        type: string
                    productGroupId:
                      type: array
                      items:
                        type: integer
              example:
              - number: 50f6b645-09a8-4ee1-8bb4-e426274e82ee
                docDate: '2024-03-29T13:28:35.615Z'
                receivedAt: '2024-03-29T13:28:35.615Z'
                type: LP_INTRODUCE_GOODS
                status: PARSE_ERROR
                senderInn: '0000000000'
                senderName: string
                receiverInn: null
                receiverName: null
                invoiceNumber: null
                invoiceDate: null
                relatedDocId: null
                body: {}
                input: false
                errors:
                - '29: Недопустимый формат передаваемого файла JSON.'
                commonErrors:
                - errorCode: INTRO_ERROR
                  errorMessage: '29: Недопустимый формат передаваемого файла JSON.'
                  errorObject: 50f6b645-09a8-4ee1-8bb4-e426274e82ee
                productGroup:
                - lp
                productGroupId:
                - 1
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
