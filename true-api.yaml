  /nk/feed-product:
    get:
      summary: Метод получения карточки товара, в том числе неопубликованной карточки
      operationId: get_nk_feed_product
      description: 'Метод возвращает всю имеющуюся информацию о продукте, то есть
        все заполненные атрибуты карточки товара независимо от статуса самой карточки.
        Требует обязательного указания следующих параметров: идентификатор товара
        (goodId), код товара (штрих-код) и указание apikey владельца товара.


        Если указаны оба обязательных параметра, то возвращается результат выборки
        по good_id . При этом код товара игнорируется.


        Если указан один из параметров gtin или good_id и один из параметров gtins
        или good_ids, то возвращается ошибка 400.


        Пример запроса:


        Пример: curl -X GET "<url стенда>/nk/feed-product?gtin=0000000000000&format=xml"

        -H "accept: application/json"

        -H "Authorization: Bearer <ТОКЕН>"


        Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).'
      x-section: '10.10'
      x-doc-anchor: metod_polucheniya_kartochki_tovara_v_tom_chisle_neopublikovannoy_kartochky
      tags:
      - Национальный каталог
      security: []
      parameters:
      - name: apikey
        in: query
        required: false
        schema:
          type: string
        description: Параметр, необходимый для авторизации и совершения запросов API
          Параметр обязательный, если в заголовке запроса не указан «token» («Токен
          аутентификации») (см. раздел «Единая аутентификация»)
      - name: format
        in: query
        required: false
        schema:
          type: string
        description: 'Формат вывода ответа Возможные значения: «json» (по умолчанию);
          «xml»'
      - name: good_id
        in: query
        required: false
        schema:
          type: string
        description: Идентификатор товара в Национальном каталоге Обязательный, если
          не указан параметр «gtin» («Код товара»)
      - name: good_ids
        in: query
        required: false
        schema:
          type: string
        description: 'Список идентификаторов товаров в Национальном каталоге Разделитель
          — «;». Обязательный, если не указаны параметры: «good_id» («Идентификатор
          товара в каталоге»); «gtin» («Код товара»); «gtins» («Список кодов товара»)'
      - name: gtin
        in: query
        required: false
        schema:
          type: string
        description: Код товара Обязательный, если не указан параметр «good_id» («Идентификатор
          товара в Национальном каталоге»)
      - name: gtins
        in: query
        required: false
        schema:
          type: string
