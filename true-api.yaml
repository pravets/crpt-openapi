  /document/reprocess:
    post:
      summary: Метод отправки документа ЭДО на повторную обработку
      operationId: post_document_reprocess
      description: 'Данный метод используется для отправки документов УПД, УКД, УПД(и),
        УКД(и) и УПД (отгрузка продукции), ранее загруженных в ГИС МТ, на повторную
        обработку после исправления ошибки, найденной при предыдущей обработке документа.


        Возможна повторная загрузка следующих типов документов: UNIVERSAL_TRANSFER_DOCUMENT,
        UNIVERSAL_CORRECTION_DOCUMENT, UNIVERSAL_TRANSFER_DOCUMENT_FIX, UNIVERSAL_CORRECTION_DOCUMENT_FIX,
        FIXATION (см. Справочник «Типы документов» ). При загрузке иных типов документов
        будет выдана ошибка.


        После того как документ будет отправлен и принят на повторную обработку статус
        документа изменится на «IN_PROGRESS» - «Проверяется» (см. « Справочник «Статусы
        документов» »).


        Повторная обработка недоступна для документов в статусах: CHECKED_OK, CANCELLED,
        PROCESSING_ERROR, IN_PROGRESS (см. « Справочник «Статусы документов» »).


        Документ не будет обработан повторно, если по результату его первой обработки
        в ГИС МТ были зафиксированы следующие типы ошибок:


        Код ошибки возвращается в параметре «code» («Уникальный код ошибки»).


        Повторная обработка документа возможна не ранее, чем через 4 часа.


        Пример запроса:


        Пример: curl -X POST "<url стенда>/document/reprocess?pg=shoes"

        Content-Type: application/json

        Authorization: Bearer <ТОКЕН>


        Тип приватности: приватный.'
      x-section: '6.5'
      x-doc-anchor: _метод_отправки_документа_эдо_на_повторную_обработку
      tags:
      - Документы и чеки
      parameters:
      - name: pg
        in: query
        required: false
        schema:
          type: string
        description: Товарная группа См. « Справочник «Список поддерживаемых товарных
          групп» »
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documentId:
                  type: string
                  description: Идентификатор универсального документа (ИдФайл) Для
                    документа «УПД (отгрузка продукции)» (FIXATION) необходимо указывать
                    идентификатор документа с префиксом «FIX_»
              required:
              - documentId
            example:
              documentId: string
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  description:
                    type: string
                  resultDocId:
                    type: string
                  sourceDocId:
                    type: string
                  nextTimeToReprocess:
                    type: string
                    format: date-time
              example:
                code: 0
                description: Ok
                resultDocId: UTXMNGR00000000000000000013-9339
                sourceDocId: UUD00000000000000000007-5340
                nextTimeToReprocess: '2021-02-24T18:33:49.110Z'
        '400':
          description: Ошибка 400
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  error_description:
                    type: string
              example:
                error: string
                error_description: string
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /doc/validator/create:
    post:
      summary: Метод подачи УПД на предварительную проверку
      operationId: post_doc_validator_create
      description: 'После подачи УПД на стороне ГИС МТ выполняются следующие действия:


        Описание ошибок, которые возвращаются в случае, если проверка не пройдена,
        см. в документе «Описание ошибок обработки документов в личном кабинете и
        по API» и в «Методических рекомендациях по описанию сведений о передаче маркированных
        товаров при оформлении электронных документов для уведомления ГИС МТ об обороте
        маркированной продукции» в разделе «Описание кодов ошибки при проверке документов
        и КИ».


        На проверку могут быть отправлены только документы УПД и УПДи до осуществления
        приёмки продукции со стороны покупателя.


        Данный метод поддерживает два типа аутентификационного токена: участника оборота
        товаров и Оператора ЭДО.


        Пример запроса:


        Пример: curl -X POST "<url стенда>/doc/validator/create"

        -H "accept: application/json"

        -H "Content-Type: application/json"

        --data-raw "{\"id\":\"string\",\"content\":\"string\",\"documentType\":\"string\",\"documentFormat\":\"string\"}"


        Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).'
      x-section: '6.6'
      x-doc-anchor: _метод_подачи_упд_на_предварительную_проверку
      tags:
      - Документы и чеки
      security: []
      parameters:
      - name: content
        in: query
        required: true
        schema:
          type: string
        description: Документ, закодированный в base64 Для документа должна использоваться
          кодировка Windows-1251
      - name: documentFormat
        in: query
        required: true
        schema:
          type: string
        description: Формат документа Поддерживается только формат XML
      - name: documentType
        in: query
        required: true
        schema:
          type: string
        description: Тип документа Поддерживается только тип UPD (универсальный передаточный
          документ)
      - name: id
        in: query
        required: true
        schema:
          type: string
        description: ID документа
      - name: preliminaryWarnings
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        description: 'Массив со списком дополнительных предварительных проверок, которые
          необходимо выполнить Допустимые значения: 3 — разрешительные документы.
          Проверяется статус разрешительных документов, указанных для всех КИ, в том
          числе для вложенных в агрегат. Описание групп статусов разрешительных документов
          см. в справочнике'
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Сообщение о том, что подаваемый документ успешно
                      отправлен в ГИС МТ В случае ошибки выводится сообщение об ошибке
                required:
                - message
              example:
                message: string
        '401':
          description: '2.1. Код 401: "Невалидный токен".'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: Текст ошибки
        '409':
          description: '2.2. Код 409: "Проверяемый документ находится в несуществующем
            статусе".'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: Текст ошибки
        '500':
          description: '2.3. Код 500: "Внутренняя ошибка сервиса".'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: Текст ошибки
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
