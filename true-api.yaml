  /cises/info:
    post:
      summary: Метод получения общедоступной информации о КИ по списку
      operationId: post_cises_info
      description: 'Метод возвращает подробную информацию о запрашиваемом списке КИ
        / КиЗ: в одном запросе указывается как один КИ / КиЗ, так и несколько (не
        более 1000). Также метод возвращает информацию о КИ товаров, отгруженных из
        стран ЕАЭС (если отгрузка была оформлена с экземплярным указанием КИ).


        Метод не предназначен для проверки сведений при сканировании КИ на ККТ при
        реализации маркированных товаров.


        Коды идентификации в запросе указываются в нормализованном виде (без скобок,
        обрамляющих идентификаторы применения).


        Для товарных групп «Альтернативная табачная продукция», «Никотиносодержащая
        продукция» и «Табачная продукция» поиск КИ реализован с МРЦ и без МРЦ для
        единиц товаров и групповых упаковок. Если произойдёт совпадение КИ потребительской
        упаковки, указанного с учётом МРЦ или иной информации, с КИ транспортной упаковки,
        то в ответе будут выведены значения и по потребительской, и по транспортной
        упаковкам.


        Общедоступная информация:


        Тип приватности: c токеном авторизации.'
      x-section: 5.1.2
      x-doc-anchor: _метод_получения_общедоступной_информации_о_ки_по_списку
      tags:
      - Сведения о КИ и товарах
      - Данные о КИ
      x-true-api-version: v3
      parameters:
      - name: childsWithoutBrackets
        in: query
        required: false
        schema:
          type: boolean
        description: Признак получения кодов вложений без скобок Параметр считается
          устаревшим и не рекомендуется к использованию, при любом указанном или неуказанном
          значении игнорируется
      - name: pg
        in: query
        required: false
        schema:
          type: string
        description: Товарная группа Cм. « Справочник «Список поддерживаемых товарных
          групп» »
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
            example:
            - 010460000000000021LLLLLLLLLLLLL
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    cisInfo:
                      type: object
                      properties:
                        productWeightGr:
                          type: string
                        isVarQuantity:
                          type: boolean
                        requestedCis:
                          type: string
                        cis:
                          type: string
                        gtin:
                          type: string
                        tnVedEaesGroup:
                          type: string
                        productName:
                          type: string
                        productGroupId:
                          type: integer
                        productGroup:
                          type: string
                        brand:
                          type: string
                        emissionDate:
                          type: string
                          format: date-time
                        emissionType:
                          type: string
                        packageType:
                          type: string
                        ownerInn:
                          type: string
                        ownerName:
                          type: string
                        status:
                          type: string
                        statusEx:
                          type: string
                        producerInn:
                          type: string
                        producerName:
                          type: string
                        markWithdraw:
                          type: boolean
              example:
              - cisInfo:
                  productWeightGr: integer
                  isVarQuantity: true
                  requestedCis: string
                  cis: string
                  gtin: string
                  tnVedEaesGroup: string
                  productName: string
                  productGroupId: 8
                  productGroup: milk
                  brand: brand
                  emissionDate: '2021-12-28T11:42:32.098Z'
                  emissionType: LOCAL
                  packageType: UNIT
                  ownerInn: string
                  ownerName: string
                  status: INTRODUCED
                  statusEx: EMPTY
                  producerInn: string
                  producerName: string
                  markWithdraw: false
        '400':
          description: '2.2. Код 400 при пустом списке КИ в теле запроса:'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: В запросе не указан ни один КМ
        '401':
          description: '2.5. Код 401 при не пройденной авторизации (если указан токен,
            но он не валиден):'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    cisInfo:
                      type: object
                      properties:
                        requestedCis:
                          type: string
                        cis:
                          type: string
                        gtin:
                          type: string
                        productGroup:
                          nullable: true
                        packageType:
                          nullable: true
                        generalPackageType:
                          nullable: true
                    errorMessage:
                      type: string
                    errorCode:
                      type: string
              example:
              - cisInfo:
                  requestedCis: string
                  cis: string
                  gtin: string
                  productGroup: null
                  packageType: null
                  generalPackageType: null
                errorMessage: Авторизация не пройдена
                errorCode: '401'
        '403':
          description: '2.6. Код 403 при не подписанном договоре, если на КИ и агрегаты
            вернулась ошибка 403:'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: Отсутствует действующий договор по ТГ
        '404':
          description: '2.7. Код 404 при неизвестных КИ:'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    cisInfo:
                      type: object
                      properties:
                        requestedCis:
                          type: string
                        cis:
                          type: string
                        gtin:
                          type: string
                        packageType:
                          nullable: true
                    errorMessage:
                      type: string
                    errorCode:
                      type: string
              example:
              - cisInfo:
                  requestedCis: string
                  cis: string
                  gtin: string
                  packageType: null
                errorMessage: КИ не найден
                errorCode: '404'
        '422':
          description: '2.10. Код 422, если для КИ не может быть возвращена информация,
            так как отсутствует согласие от текущего владельца КИ:'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: Отсутствует доступ к сведениям
        '504':
          description: '2.11. Код 504, если в запросе несколько КИ или агрегатов —
            по всем КИ и агрегатам ошибка, что сервис не вернул ответ:'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    cisInfo:
                      type: object
                      properties:
                        requestedCis:
                          type: string
                    errorMessage:
                      type: string
                    errorCode:
                      type: string
              example:
              - cisInfo:
                  requestedCis: string
                errorMessage: Отсутствует ответ системы
                errorCode: '504'
              - cisInfo:
                  requestedCis: string
                errorMessage: string
                errorCode: '504'
              - cisInfo:
                  requestedCis: string
                errorMessage: Отсутствует ответ системы
                errorCode: '504'
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
