                partNumbers:
                  type: string
                  description: 'Массив номеров партий Только для товарной группы «Молочная
                    продукция». Максимальное количество номеров партий — 50. Формат:
                    от 21 до 32 символов включительно, без пробелов. Допустимые символы:
                    цифры, буквы латинского алфавита, спецсимволы (/ . , -). Номер
                    партии состоит из трёх групп данных: первая группа данных состоит
                    из 14 цифр и содержит код товара единицы продукции либо код товара
                    набора; вторая группа данных состоит из 6 символов и содержит
