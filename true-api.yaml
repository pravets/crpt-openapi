      parameters:
      - name: fiasId
        in: query
        required: false
        schema:
          type: string
        description: Идентификатор ФИАС Если не будет указан, то в ответе вернутся
          все МОД
      - name: inns
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Список ИНН участников оборота товаров Максимально допустимое
          значение — 10. Если не будет указан, то в ответе вернутся все МОД участника
          оборота товаров, осуществляющего запрос
      - name: kpp
        in: query
        required: false
        schema:
          type: string
        description: КПП Для юридических лиц. Если не будет указан, то в ответе вернутся
          все МОД
      - name: limit
        in: query
        required: false
        schema:
          type: integer
        description: 'Максимальное количество записей на странице результата поиска
          Максимально допустимое значение — 1000, минимально допустимое значение —
          1. Значение по умолчанию: 100'
      - name: page
        in: query
        required: false
        schema:
          type: integer
        description: 'Номер страницы Используется для пагинации. Начинается с «0».
          Значение по умолчанию: 0'
      - name: productGroups
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Список товарных групп См. « Справочник «Список поддерживаемых
          товарных групп» ». Если не будет указан, то в ответе вернутся МОД по всем
          товарным группам
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        address:
                          type: string
                        kpp:
                          type: string
                        isBlockedEgais:
                          type: boolean
                        inn:
                          type: string
                    description: Список МОД
                  total:
                    type: integer
                    description: Общее количество объектов, удовлетворяющих параметрам
                      фильтрации
                  nextPage:
                    type: boolean
                    description: 'Признак наличия следующей страницы Возможные значения:
                      true — следующая страница есть; false — следующая страница отсутствует'
                  address:
                    type: string
                    description: Адрес
                  kpp:
                    type: string
                    description: КПП Возвращается для юридических лиц
                  fiasId:
                    type: string
                    description: Идентификатор ФИАС
                  isBlockedEgais:
                    type: boolean
                    description: 'Признак блокировки МОД в ЕГАИС Возможные значения:
                      true — МОД заблокирован; false — МОД не заблокирован'
                  inn:
                    type: string
                    description: ИНН
                  productGroups:
                    type: array
                    items:
                      type: string
                    description: Список товарных групп См. « Справочник «Список поддерживаемых
                      товарных групп» »
                required:
                - inn
                - nextPage
                - productGroups
                - result
                - total
              example:
                result:
                - address: string
                  kpp: '123456789'
                  isBlockedEgais: false
                  inn: '1122334455'
                - address: string
                  kpp: '987654321'
                  isBlockedEgais: false
                  inn: '6677889900'
                total: 2
                nextPage: false
        '400':
          description: '2.1. Код 400, если в параметре строки запроса «inns» («Список
            ИНН») указано более 10 значений:'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: 'Превышено допустимое количество ИНН в параметре inns:
                  10'
        '401':
          description: '2.4. Код 401 при непройденной авторизации, если в запросе
            не указан токен или он невалидный:'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
