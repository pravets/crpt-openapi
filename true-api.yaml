  /cises/gz/info:
    post:
      summary: Метод проверки КИ ТГ "Табачная продукция" на вхождение в "серую зону"
      operationId: post_cises_gz_info
      description: 'Метод возвращает информацию по заданному списку кодов о принадлежности
        кодов к серой зоне, для транспортных и потребительских упаковок — о наличии
        кодов из серой зоны в их составе.


        Возвращаемые параметры «gzPacks» («Расчётное суммарное число единиц товаров
        в серой зоне») и «gzBlocks» («Расчётное суммарное число групповых упаковок
        в транспортной упаковке в серой зоне») — это расчётные единицы для агрегатов,
        которые считаются на основании разницы физической ёмкости упаковки и указанных
        при агрегировании кодов, т.е. это потенциальное число единиц товаров и групповых
        упаковок, которые могут находиться в «Серой зоне» в данной упаковке. Признак
        «Серой зоны» для единицы товара / групповой упаковки проставляется на основании
        отчёта от производителя.


