    post:
      summary: Метод проверки готовности товара к вывозу в ЕАЭС
      operationId: post_cises_eaes_check_export
      description: 'Метод предназначен для проверки доступности корректной отгрузки
        товаров в выбранное государство-член ЕАЭС, в том числе если участник оборота
        товаров, формирующий запрос, не является владельцем кода товаров, а товар,
        по которому запрашивается информация, отсутствует на балансе.


        Проверка доступна только для кодов товаров, произведённых в РФ и Республике
        Беларусь.


        Тип приватности: публичный (с использованием токена).'
      x-section: 5.1.6
      x-doc-anchor: _метод_проверки_готовности_товара_к_вывозу_в_еаэс
