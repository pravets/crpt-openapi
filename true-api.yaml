openapi: 3.0.3
info:
  title: True API — ГИС МТ «Честный знак»
  version: '700.0'
  description: 'Спецификация True API системы маркировки «Честный знак» (ГИС МТ).


    True API предназначено для интеграции информационных систем участников оборота
    товаров с ГИС МТ: подача сведений (документы, чеки), получение сведений о кодах
    идентификации и маркированных товарах, получение квитанций, формирование выгрузок
    данных, взаимодействие с ЭДО Лайт, «Национальным каталогом» и «Станцией управления
    заказами».


    Официальная документация: https://docs.crpt.ru/gismt/True_API/


    Примечание: спецификация сгенерирована автоматически из HTML-документации «Описание
    True API» (версия v.700.0 от 16.07.2026). Для методов подачи документов примеры
    тел передаваемых документов (product_document и т.п.) в документации приводятся
    в виде шаблонов JSON/XML/CSV; в запросе документ передаётся в кодировке base64.
    Ссылки на разделы документации даны в полях x-section и x-doc-anchor (https://docs.crpt.ru/gismt/True_API/#<x-doc-anchor>).'
servers:
- url: https://markirovka.crpt.ru/api/v3/true-api
  description: Промышленный стенд, API v3
- url: https://markirovka.crpt.ru/api/v4/true-api
  description: Промышленный стенд, API v4
- url: https://markirovka.sandbox.crptech.ru/api/v3/true-api
  description: Демонстрационный стенд (песочница), API v3
- url: https://markirovka.sandbox.crptech.ru/api/v4/true-api
  description: Демонстрационный стенд (песочница), API v4
tags:
- name: Общие сведения
  description: 1. Назначение и условия применения True API
- name: Аутентификация
  description: 1.5. Единая аутентификация
- name: Рекомендации по работе с API
  description: 2. Рекомендации по работе с методами True API
- name: Регистрация УОТ
  description: 2.1. Процесс регистрации УОТ
- name: Обращение к True API
  description: 3. Обращение к True API
- name: Счета и договоры
  description: 3.7. Работа со счетами и договорами на оплату
- name: Баланс УОТ
  description: 3.8. Проверка баланса денежных средств УОТ по товарным группам
- name: Подача сведений
  description: 4. Подача сведений в систему
- name: Подача документов
  description: 4.1. Типы документов, доступные для подачи сведений через «Единый метод
    создания документов»
- name: Подача документов (другие типы)
  description: 4.3. Другие типы документов, доступные для подачи сведений в ГИС МТ
- name: Резервирование партий
  description: 4.4. Подача сведений о резервировании партий
- name: Сведения о КИ и товарах
  description: 5. Методы получения сведений о КИ и маркированных товарах
- name: Данные о КИ
  description: 5.1. Получение данных о КИ
- name: Карточки товара
  description: 5.6. Получение информации о карточках товара УОТ
- name: Согласие на предоставление информации
  description: 5.8. Работа с согласием о предоставлении информации участникам оборота
    товаров ГИС МТ
- name: Документы и чеки
  description: 6. Работа с документами и чеками в ГИС МТ
- name: Квитанции
  description: 7. Методы получения квитанций результата обработки документов
- name: Выгрузки данных
  description: 8. Методы формирования выгрузок данных из ГИС МТ
- name: Задания на выгрузку
  description: 8.3. Метод создания нового задания на выгрузку
- name: Статус задания на выгрузку
  description: 8.5. Метод получения статуса задания на выгрузку
- name: ЭДО Лайт
  description: 9. Взаимодействие с провайдером ЭДО Лайт
- name: Национальный каталог
  description: 10. Методы «Национального каталога»
- name: Станция управления заказами
  description: 11. Методы «Станции управления заказами»
paths:
  /auth/key:
    get:
      summary: Запрос авторизации при единой аутентификации
      operationId: get_auth_key
      description: 'Примечание Получение токена в формате UUID без предварительного
        запроса на получение уникальной пары доступно до сентября 2026 года


        Метод используется для получения уникальной пары: UUID (идентификатора текущей
        аутентификации) и сгенерированных случайных данных, которые в дальнейшем подписываются
        участником оборота товаров и передаются в метод получения ключа сессии при
        единой аутентификации для дальнейшего получения токена в формате UUID / JWT
        по УКЭП:'
      x-section: 1.5.1
      x-doc-anchor: _запрос_авторизации_при_единой_аутентификации
      tags:
      - Общие сведения
      - Аутентификация
      x-true-api-version: v3
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  uuid:
                    type: string
                    description: Уникальный идентификатор сгенерированных случайных
                      данных
                  data:
                    type: string
                    description: Случайная строка данных
                required:
                - data
                - uuid
              example:
                uuid: a63ff582-b723-4da7-958b-453da27a6c62
                data: GNUFBAZBMPIUUMLXNMIOGSHTGFXZMT
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/simpleSignIn:
    post:
      summary: Получение ключа сессии при единой аутентификации
      operationId: post_auth_simplesignin
      description: Примечание Поддержка токена в формате JWT сохранена до конца 2026
        года
      x-section: 1.5.2
      x-doc-anchor: _получение_ключа_сессии_при_единой_аутентификации
      tags:
      - Общие сведения
      - Аутентификация
      x-true-api-version: v3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                uuid:
                  type: string
                  description: Уникальный идентификатор подписанных случайных данных
                data:
                  type: string
                  description: Подписанные УКЭП зарегистрированного участника оборота
                    товаров случайные данные в base64 (присоединённая электронная
                    подпись)
                inn:
                  type: string
                  description: 'ИНН организации, под которой требуется авторизация
                    При получении токена в одном из форматов (UUID / JWT) обязательно
                    указывается ИНН организации, если у физического лица (пользователя
                    организации) есть действующая МЧД для получения доступа к ГИС
                    МТ. В остальных случаях параметр необязателен Длина значения:
                    10 или 12 цифр'
                details:
                  type: string
                  description: Реквизиты действующего аттестата соответствия объекта
                    информатизации, выданного органом по аттестации объектов информатизации
                unitedToken:
                  type: boolean
                  description: Признак запроса единого токена в виде uuid Обязательно
                    заполнен при получении токена в формате UUID. true — запрос токена
                    в формате UUID (единый токен аутентификации); false — запрос токена
                    в формате jwt (по умолчанию)
              required:
              - data
              - uuid
            example:
              uuid: string
              data: string
              inn: string
              details: string
              unitedToken: true
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Аутентификационный токен Параметр указывается в случае
                      успешного ответа
                  uuidToken:
                    type: string
                    description: Аутентификационный токен в виде uuid Возвращается
                      в случае успешного ответа при запросе токена в формате UUID
                  code:
                    type: string
                    description: Код ошибки Параметр указывается в случае не успешного
                      ответа
                  error_message:
                    type: string
                    description: Сообщение об ошибке
                  description:
                    type: string
                    description: Описание ошибки
                  expireDate:
                    type: string
                    description: 'Дата и время истечения срока действия токена Возвращается
                      только при запросе токена в формате UUID. Формат: yyyy-MM-ddTHH:mm:ss.SSSZ
                      Пример: 2026-10-10T00:00:00.123Z'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e.........mk6qe0lB12w9zEs
        '400':
          description: '2.1. Код 400, если не указан параметр «uuid»:'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: В запросе отсутствует идентификат�ор авторизации (UUID)
        '403':
          description: '2.8. Код 403, если «data» подписан УКЭП сотрудника, который
            не является добавленным пользователем организации, под которой происходит
            попытка авторизации:'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: Отсутствует доступ к ресурсу
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /elk/crm-api/documents:
    get:
      summary: 'Шаг 2: получение сведений по черновикам договоров между УОТ и ГИС
        МТ'
      operationId: get_elk_crm_api_documents
      description: 'Подробное описание метода см. в разделе " Получение сведений по
        черновикам заключённых договоров между УОТ и Оператором ГИС МТ ". После обработки
        заявки на регистрацию для начала работы с товарными группами, указанными в
        заявке на регистрацию, УОТ должен подписать соответствующие договора. Если
        запрос успешно обработан, в ответ вернётся структура JSON, содержащая перечень
        данных по договорам, которые УОТ должен подписать. Все договора, которые УОТ
        заключает с ГИС МТ в рамках маркировки товаров, являются исходящими от УОТ
        и должны быть подписаны.


        Этот же метод (path+HTTP-метод) описан также в разделе 3.7.1 «Получение сведений
        по черновикам заключённых договоров между УОТ и Оператором ГИС МТ» документации.'
      x-section: 2.1.2
      x-doc-anchor: _шаг_2_получение_сведений_по_черновикам_договоров_между_уот_и_гис_мт
      tags:
      - Рекомендации по работе с API
      - Регистрация УОТ
      responses:
        '200':
          description: Успешный ответ
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-merged-sections:
      - 3.7.1
  /elk/crm-api/document:
    get:
      summary: 'Шаг 3: получение (выгрузка) черновиков договоров для подписания УОТ'
      operationId: get_elk_crm_api_document
      description: 'Подробное описание метода см. в разделе " Получение сведений по
        заключённым договорам между УОТ и ГИС МТ ".


        Наименование для файла договора необходимо брать из поля "Content-Disposition"
        после "filename="UTF-8"" заголовка ответа метода. Имя файла необходимо декодировать.


        Пример:


        Пример: Content-Disposition: attachment; filename=" _00691_20.pdf"; filename*=UTF-8''''%D0%9C%D0%9F_00691_20.pdf

        %D0%9C%D0%9F_00691_20.pdf -> МП_00691_20.pdf


        После выгрузки и сохранения договора необходимо перейти к шагу 5.


        Этот же метод (path+HTTP-метод) описан также в разделе 3.7.2 «Получение сведений
        по заключённым договорам между УОТ и ГИС МТ» документации.'
      x-section: 2.1.3
      x-doc-anchor: _шаг_3_получение_выгрузка_черновиков_договоров_для_подписания_уот
      tags:
      - Рекомендации по работе с API
      - Регистрация УОТ
      responses:
        '200':
          description: Успешный ответ
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-merged-sections:
      - 3.7.2
      parameters:
      - name: guid
        in: query
        required: true
        schema:
          type: number
        description: ID черновика договора Значение параметра "document" ("ID документа")
          в ответе метода " Получение сведений по черновикам заключённых договоров
          между УОТ и Оператором ГИС МТ " (elk/crm-api/documents)
  /participants:
    get:
      summary: Метод проверки регистрации участников оборота товаров по ИНН в ГИС
        МТ
      operationId: get_participants
      description: 'В результате успешного выполнения запроса по одному или нескольким
        ИНН участников оборота товаров в ответе возвращается информация об участнике
        оборота товаров.


        Публичный метод: без токена возвращается краткая информация об УОТ; с токеном
        — расширенная (при совпадении ИНН).'
      x-section: '3.1'
      x-doc-anchor: _метод_проверки_регистрации_участников_оборота_товаров_по_инн_в_гис_мт
      tags:
      - Обращение к True API
      security: []
      parameters:
      - name: inns
        in: query
        required: true
        schema:
          type: string
        description: Список ИНН участников оборота товаров Не более 100 ИНН
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  inn:
                    type: string
                    description: ИНН участника оборота товаров
                  status:
                    type: string
                    description: Текущий статус участника оборота товаров См. « Справочник
                      «Статусы УОТ» » (столбец «Описание»)
                  productGroups:
                    type: array
                    items:
                      type: string
                    description: Список товарных групп, подключенных к ИНН участника
                      оборота товаров См. « Справочник «Список поддерживаемых товарных
                      групп» »
                  is_registered:
                    type: boolean
                    description: 'Признак регистрации в ГИС МТ Возможные значения:
                      true — текущий статус участника оборота товаров в ГИС МТ, принимает
                      возможные значения: «REGISTERED» (Зарегистрирован), «RESTORED»
                      (Восстановлен) и «BLOCKED» (Заблокирован); false — в остальных
                      случаях'
                  is_kfh:
                    type: boolean
                    description: 'Признак того, что участник оборота товаров является
                      крестьянским фермерским хозяйством Возможные значения: true
                      — участник оборота товаров является крестьянским фермерским
                      хозяйством; false — в остальных случаях. Значение по умолчанию:
                      false. Идентификация крестьянских (фермерских) хозяйств осуществляется
                      по ОКОПФ. Для товарных групп «Консервированная продукция», «Молочная
                      продукция» и «Мясные изделия»: 15300 — крестьянские (фермерские)
                      хозяйства; 50101 — главы крестьянских (фермерских) хозяйств;
                      14100 — сельскохозяйственные производственные кооперативы. Только
                      для товарных групп «Молочная продукция» и «Мясные изделия»:
                      14153 — сельскохозяйственные артели (колхозы); 14154 — рыболовецкие
                      артели (колхозы); 14155 — кооперативные хозяйства (коопхозы)'
                  name:
                    type: string
                    description: Наименование участника оборота товаров
                  statusInn:
                    type: string
                    description: Статус регистрации участника оборота товаров См.
                      « Справочник «Статусы УОТ» » (столбец «Код»)
                  chief:
                    type: array
                    items:
                      type: string
                    description: Список Ф.И.О. руководителей
                  role:
                    type: array
                    items:
                      type: string
                    description: Список кодов типов организации участника оборота
                      товаров См. « Справочник «Типы организаций» »
                  okopf:
                    type: string
                    description: ОКОПФ
                  productGroupInfo:
                    type: object
                    description: Информация по товарным группам
                  productGroup:
                    type: string
                    description: Товарная группа
                  farmer:
                    type: boolean
                    description: 'Признак фермера Возможные значения: true — участник
                      оборота товаров является крестьянским фермерским хозяйством;
                      false — в остальных случаях. Значение по умолчанию: false'
                  isControllability:
                    type: boolean
                    description: 'Признак наличия подконтрольных объектов по данным
                      ФГИС «ВетИС» Возможные значения: true — есть подконтрольные
                      объекты; false — в остальных случаях. Значение по умолчанию:
                      false. Данный признак возвращается на основании значения, отображаемого
                      в личном кабинете участника оборота товаров в поле «Подконтрольность
                      ВЕТИС» (подробнее — в инструкции )'
                required:
                - inn
                - is_registered
                - productGroupInfo
                - status
              example:
                inn: '0000000000'
                status: Зарегистрирован
                productGroups:
                - lp
                - tobacco
                - shoes
                is_registered: true
                is_kfh: true
        '404':
          description: '2.1. При запросе информации с ИНН, по которому нет информации
            в ГИС МТ, возвращается ответ с кодом ошибки 404 "УОТ не найден":'
          content:
            application/json:
              schema:
                type: object
                properties:
                  inn:
                    type: string
                  error_code:
                    type: string
                  error_message:
                    type: string
              example:
                inn: '0000000002'
                error_code: '404'
                error_message: УОТ не найден
        '400':
          description: '2.2. При запросе информации с некорректным ИНН возвращается
            ответ с кодом ошибки 400 "ИНН некорректен":'
          content:
            application/json:
              schema:
                type: object
                properties:
                  inn:
                    type: string
                  error_code:
                    type: string
                  error_message:
                    type: string
              example:
                inn: '00000'
                error_code: '400'
                error_message: ИНН некорректен
        default:
          description: Ошибка по умолчанию
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /mods/add:
    post:
      summary: Метод добавления мест осуществления деятельности
      operationId: post_mods_add
      description: 'Метод предназначен для добавления мест осуществления деятельности
        (МОД). Единовременно можно добавить до 100 МОД.


        Метод доступен для товарных групп «Антисептики и дезинфицирующие средства»,
        «Альтернативная табачная продукция», «Безалкогольное пиво», «Велосипеды и
        велосипедные рамы», «Духи и туалетная вода», «Игры и игрушки для детей», «Кабельно-проводниковая
        продукция», «Консервированная продукция», «Корма для животных», «Косметика,
        бытовая химия и товары личной гигиены», «Лёгкая промышленность», «Молочная
        продукция», «Морепродукты», «Моторные масла», «Мясные изделия», «Натуральный
