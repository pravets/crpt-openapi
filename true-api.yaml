          «xml»'
      - name: inn
        in: query
        required: false
        schema:
          type: integer
        description: ИНН субаккаунта ИНН субаккаунта, для которого необходимо вывести
          список доступных кодов товара. Если не указан, то выводятся все субаккаунты
          пользователя без списка кодов товаров
      - name: limit
        in: query
        required: false
        schema:
          type: integer
        description: Количество записей в ответе Минимально допустимое значение —
          1. Максимально допустимое значение — 10 000 (значение по умолчанию). Если
