                    лидирующие нули до установки каждому запрошенному коду товара
                    формата = 14 цифр перед получением информации о коде товара из
                    НКМТ. Проверка на принадлежность кода товара организации, ИНН
                    которой указан в токене, не осуществляется
                weight:
                  type: string
                  description: Вес товара в граммах Значение должно быть целым числом
                    > 0 длиной до 10 цифр
