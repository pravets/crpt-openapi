        schema:
          type: integer
        description: 'Код страны по справочнику ОКСМ Доступные значения: "112" – Республика
          Беларусь; "417" – Кыргызская Республика; "398" – Республика Казахстан; "051"
          – Республика Армения'
      - name: pg
