                    ответ
                perPage:
                  type: integer
                  description: Максимальное количество записей на странице результата
                    поиска Максимально допустимое значение — 1000, минимально допустимое
                    значение — 1
              required:
              - page
              - perPage
            example:
              gtins:
              - '04611111111111'
              - '00022222222222'
              - 04833333333333
              pagination:
                page: 1
                perPage: 100
