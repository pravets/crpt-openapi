  /nk/feed:
    post:
      summary: Метод создания и обновления товаров
      operationId: post_nk_feed
      description: 'Метод даёт возможность компаниям-владельцам товаров создавать
        и обновлять товары. Создание и обновление карточек товаров осуществляется
        при помощи фидов — пакетов обновлений, формируемых на стороне пользователя.


        Фид передаётся в теле запроса. Поддерживается 2 формата для отправки фида:
        * .json и * .xml.


        Метод возвращает feed_id (идентификатор полученного фида) или ошибку.


        "Content-Type: application/xml" , если фид в формате xml; "Content-Type: application/json"
        , если фид в формате json.


        Ограничения: При превышении лимита на размер фида или на количество товаров
        в фиде будет вызвана ошибка с кодом 413. При ошибке в схеме данных будет получена
        ошибка с кодом 400. Примечание: Информация о направленных пакетах обновлений
        хранится в течение одного года.


        Тип приватности: публичный — метод доступен без аутентификации (токен не требуется).'
      x-section: '10.17'
