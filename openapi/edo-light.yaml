      summary: Подписание квитанций / файла информации покупателя; приём аннулирования документа
      description: |
        Метод используется в двух сценариях (в документации ЭДО Лайт — разделы 3.16 и 3.19, URL и тело запроса совпадают,
        поэтому в спецификации они объединены в одну операцию):

        1. Подписание квитанций или файла информации покупателя (УПД/УПДи/УКД) — после выполнения запроса будут подписаны
           указанные в запросе квитанция или файл.
