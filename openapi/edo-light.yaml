components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Токен аутентификации (JWT или UUID), передаваемый в заголовке Authorization: Bearer <token>.
        Токен получается через методы True API: GET /auth/key (получение пары «uuid — data») и
        POST /auth/simpleSignIn (обмен подписанных УКЭП данных на токен). Срок действия токена — 10 часов с момента получения.
  parameters:
    DocIdPath:
      name: doc_id
      in: path
      required: true
      description: Идентификатор документа (UUID). В документации указан тип integer, однако во всех примерах используется UUID-строка
      schema:
        type: string
    EventIdPath:
      name: event_id
      in: path
      required: true
      description: Идентификатор события / квитанции (UUID), полученный в ответе на создание файла информации покупателя или файла квитанции. В документации указан тип integer, однако в примерах используется UUID-строка
      schema:
        type: string
    SendMchdFileHeader:
      name: send_mchd_file
      in: header
      required: false
      description: |
        Способ передачи сведений об МЧД. Параметр необязательный.
        - true — будет передана МЧД в виде отдельного файла и подписи к нему, если данная МЧД зарегистрирована в ГИС МТ;
        - false — сведения об МЧД будут переданы в метаданных.
        Если параметр не заполнен, значение по умолчанию — false.
        При заполненном параметре система проверяет наличие информационных полей (ИнфПолФХЖ1) с наименованием «МЧД» в XML,
        берёт значение МЧД и передаёт указанную МЧД в виде файла в пакете с документом и подписью.
      schema:
        type: boolean
        default: false
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Количество возвращаемых документов. По умолчанию 10
      schema:
        type: integer
        default: 10
    OffsetQuery:
      name: offset
      in: query
      required: false
      description: Позиция смещения в наборе результатов для начала нумерации страниц. По умолчанию 0
      schema:
        type: integer
        default: 0
    CreatedFromQuery:
      name: created_from
      in: query
      required: false
      description: Нижняя граница фильтрации документов по времени создания (Unix timestamp, секунды). В выборку попадут документы, время создания которых больше или равно указанному
      schema:
        type: integer
    CreatedToQuery:
      name: created_to
      in: query
      required: false
      description: Верхняя граница фильтрации документов по времени создания (Unix timestamp, секунды). В выборку попадут документы, время создания которых меньше или равно указанному
      schema:
        type: integer
    PartnerInnQuery:
      name: partner_inn
      in: query
      required: false
      description: ИНН контрагента. Для исходящего документа это получатель, для входящего — отправитель
      schema:
        type: string
    PartnerIdQuery:
      name: partner_id
      in: query
      required: false
      description: Идентификатор получателя документа
      schema:
        type: string
    StatusQuery:
      name: status
      in: query
      required: false
      description: Цифровое обозначение статуса возвращаемых документов. См. справочник «Статусы документов» документации ЭДО Лайт
      schema:
        type: integer
    TypeQuery:
      name: type
      in: query
      required: false
      description: Цифровое обозначение типа документов. См. справочник «Типы документов» документации ЭДО Лайт
      schema:
        type: integer
    FolderQuery:
      name: folder
      in: query
      required: false
      description: |
        Цифровое обозначение папки, в которой находятся документы. Для поиска по всем папкам параметр не указывается.
        Допустимые значения:
        - 0 — документы;
        - 1 — архив;
        - 2 — корзина;
        - 3 — на подписание;
        - 4 — отклоненные;
        - 5 — на подпись РВ;
        - 6 — на подпись РЭ;
        - 7 — биллинг;
        - 8 — автоподписание.
      schema:
        type: integer
        enum: [0, 1, 2, 3, 4, 5, 6, 7, 8]
    SortByQuery:
      name: sortBy
      in: query
      required: false
      description: 'Параметр, по которому необходимо отсортировать возвращаемый список документов. Допустимое значение: created_at — время создания документа'
      schema:
        type: string
        enum: [created_at]
    AscQuery:
      name: asc
      in: query
      required: false
      description: Параметр, определяющий направление сортировки. false — по убыванию (значение по умолчанию); true — по возрастанию
      schema:
        type: boolean
        default: false
    ProductGroupQuery:
      name: product_group
      in: query
      required: false
      description: Цифровое обозначение товарной группы, содержащейся в документе. См. справочник «Список поддерживаемых товарных групп» документации ЭДО Лайт
      schema:
        type: integer
  responses:
    Unauthorized:
      description: 'Ошибка авторизации — токен не прошёл проверку, истёк срок жизни токена или запрос выполнен без токена («Access denied: token not valid» / «Access denied: token not found»)'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Недостаточно прав для выполнения действия — в токене указана роль, которая не предусматривает выполнение данного запроса
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Документ или квитанция не найдены в базе данных
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Внутренняя ошибка сервиса / сервис недоступен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      description: |
        Сообщение об ошибке. В зависимости от метода сообщение об ошибке может возвращаться в поле «message»
        (основной API ЭДО Лайт) или в поле «error_message» (методы аутентификации True API).
      properties:
        message:
          type: string
          description: Сообщение об ошибке
        error_message:
          type: string
          description: Сообщение об ошибке (методы True API)
        code:
          type: string
          description: Код ошибки (методы True API)
        description:
          type: string
          description: Описание ошибки (методы True API)
    AuthKeyResponse:
      type: object
      description: Уникальная пара «uuid — data» для единой аутентификации
      required:
        - uuid
        - data
      properties:
        uuid:
          type: string
          description: Уникальный идентификатор сгенерированных случайных данных
        data:
          type: string
          description: Случайная строка данных
    SimpleSignInRequest:
      type: object
      required:
        - uuid
        - data
      properties:
        uuid:
          type: string
          description: Уникальный идентификатор подписанных случайных данных
        data:
          type: string
          description: Подписанные УКЭП зарегистрированного участника оборота товаров случайные данные в base64 (присоединённая электронная подпись)
        inn:
          type: string
          description: |
            ИНН организации, под которой требуется авторизация. Обязателен, если у физического лица (пользователя организации)
            есть действующая МЧД для получения доступа к ГИС МТ; в остальных случаях необязателен. Длина значения: 10 или 12 цифр
        details:
          type: string
          description: Реквизиты действующего аттестата соответствия объекта информатизации, выданного органом по аттестации объектов информатизации
        unitedToken:
          type: boolean
          description: |
            Признак запроса единого токена в виде uuid. Обязательно заполнен при получении токена в формате UUID.
            true — запрос токена в формате UUID (единый токен аутентификации); false — запрос токена в формате JWT (по умолчанию)
    SimpleSignInResponse:
      type: object
      description: Результат получения ключа сессии. В случае успеха возвращается токен (JWT или UUID), в случае ошибки — код и сообщение об ошибке
      properties:
        token:
          type: string
          description: Аутентификационный токен. Указывается в случае успешного ответа. Срок действия — не более 10 часов с момента получения
        uuidToken:
          type: string
          description: Аутентификационный токен в виде uuid. Возвращается в случае успешного ответа при запросе токена в формате UUID
        expireDate:
          type: string
          description: Дата и время истечения срока действия токена (формат yyyy-MM-ddTHH:mm:ss.SSSZ). Возвращается только при запросе токена в формате UUID
        code:
          type: string
          description: Код ошибки. Указывается в случае неуспешного ответа
        error_message:
          type: string
          description: Сообщение об ошибке
        description:
          type: string
          description: Описание ошибки
    IdResponse:
      type: object
      description: Идентификатор созданного объекта (документа, события, квитанции, универсального сообщения) в формате UUID
      required:
        - id
      properties:
        id:
          type: string
          description: Уникальный идентификатор созданного объекта (UUID)
    EventIdResponse:
      type: object
      description: Идентификатор события, полученный в ответе на создание файла информации покупателя или файла квитанции
      required:
        - event_id
      properties:
        event_id:
          type: string
          description: Идентификатор события (UUID). По данному идентификатору можно производить с документом необходимые действия (редактирование, подписание и т. д.)
    SellerUpdForm:
      type: object
      description: Данные для загрузки файла информации продавца УПД (multipart/form-data)
      required:
        - content
      properties:
        content:
          type: string
          format: binary
          description: Ссылка на XML документ. Метод не поддерживает загрузку УПД (ON_NSCHFDOPPRPROS) с признаком прослеживаемости (PROS)
        signature:
          type: string
          description: Откреплённая УКЭП XML документа в формате base64. Без параметра документ остаётся в статусе «Черновик», с параметром — переходит в статус «Отправлен»
    SellerUpdiForm:
      type: object
      description: Данные для загрузки файла информации продавца УПДи (multipart/form-data)
      required:
        - content
      properties:
        content:
          type: string
          format: binary
          description: Ссылка на XML документ. Метод не поддерживает загрузку УПДи (ON_NSCHFDOPPRPROS) с признаком прослеживаемости (PROS)
        signature:
          type: string
          description: Откреплённая УКЭП XML документа в формате base64
        parent_id:
          type: string
          description: Идентификатор родительского документа (UUID)
    SellerUkdForm:
      type: object
      description: Данные для загрузки файла информации продавца УКД по приказу № 189 (multipart/form-data)
      required:
        - content
      properties:
        content:
          type: string
          format: binary
          description: Ссылка на XML документ
        signature:
          type: string
          description: Откреплённая УКЭП XML документа в формате base64
        parent_id:
          type: string
          description: Идентификатор родительского документа (UUID)
    SellerUkd736Form:
      type: object
      description: Данные для загрузки файла информации продавца УКД/УКДи по приказу № 736 (multipart/form-data)
      required:
        - content
        - parent_id
      properties:
        content:
          type: string
          format: binary
          description: Файл документа. Метод не поддерживает загрузку УКД/УКД(и) (ON_NKORSCHFDOPPRPROS) с признаком прослеживаемости (PROS)
        parent_id:
          type: string
          description: Идентификатор родительского документа (UUID)
        signature:
          type: string
          description: Откреплённая УКЭП XML документа в формате base64
        product_group:
          type: integer
          description: Код товарной группы (целое число). См. справочник «Список поддерживаемых товарных групп» документации ЭДО Лайт
    BuyerTitleForm:
      type: object
      description: Данные для загрузки файла информации (титула) покупателя (multipart/form-data)
      required:
        - content
        - doc_id
        - signature
      properties:
        content:
          type: string
          format: binary
          description: Ссылка на XML документ (файл информации / титула покупателя)
        doc_id:
          type: string
          description: Идентификатор документа файла информации продавца (UUID)
        signature:
          type: string
          description: Откреплённая УКЭП XML документа в формате base64
    UvtochForm:
      type: object
      description: Данные для создания уведомления об уточнении (multipart/form-data)
      required:
        - content
        - doc_id
        - signature
      properties:
        content:
          type: string
          format: binary
          description: Ссылка на XML документ (файл DP_UVUTOCH)
        doc_id:
          type: string
          description: Идентификатор документа, для которого создаётся уведомление (UUID)
        signature:
          type: string
          description: Откреплённая УКЭП XML-документа в формате base64
    AnnulRequestForm:
      type: object
      description: Данные для запроса аннулирования документа (multipart/form-data)
      required:
        - content
        - doc_id
        - signature
      properties:
        content:
          type: string
          format: binary
          description: Файл DP_PRANNUL (XML)
        doc_id:
          type: string
          description: Идентификатор документа, который предлагается аннулировать. В значении идентификатора допускаются символы латинского алфавита a–z и цифры 0–9 (UUID)
        signature:
          type: string
          description: Откреплённая УКЭП
    AnnulRejectForm:
      type: object
      description: Данные для отклонения аннулирования документа (multipart/form-data)
      required:
        - content
        - doc_id
        - annul_id
        - signature
      properties:
        content:
          type: string
          format: binary
          description: Файл DP_UVUTOCH (XML)
        doc_id:
          type: string
          description: Идентификатор документа, для которого отклоняется аннулирование (UUID)
        annul_id:
          type: string
          description: Идентификатор запроса аннулирования — квитанции DP_PRANNUL (UUID)
        signature:
          type: string
          description: Откреплённая УКЭП
    Updi970Form:
      type: object
      description: Данные для создания УПДи через XML по приказу № ЕД-7-26/970@ (multipart/form-data)
      required:
        - content
      properties:
        content:
          type: string
          format: binary
          description: Файл документа (XML)
        doc_id:
          type: string
          description: Идентификатор связанного документа (UUID). Может быть указан документ любого типа (DOCUMENTS), который есть в БД
        signature:
          type: string
          description: Откреплённая УКЭП содержимого файла документа в формате base64
        product_group:
          type: integer
          description: Код товарной группы. См. справочник «Список поддерживаемых товарных групп» документации ЭДО Лайт
        movement_control:
          $ref: '#/components/schemas/MovementControl'
    MovementControl:
      type: object
      description: Объект, содержащий в себе флаги-параметры N4 и N5 (контроль движения маркированной продукции)
      properties:
        fixation:
          type: boolean
          description: |
            Необходимость отправки запроса на создание УПДи на фиксацию в ГИС МТ. По умолчанию false.
            Может быть заполнен для товарной группы «Пиво, напитки, изготавливаемые на основе пива, слабоалкогольные напитки»
            значением true только для типов документов 820 и 824 и с параметром N4="1" в имени файла. В остальных случаях игнорируется при обработке
          default: false
        beer:
          type: boolean
          description: Наличие в документе алкогольной продукции, подлежащей маркировке (N4). По умолчанию false. При значении true в параметре N4 необходимо передавать "1"
          default: false
        tobacco:
          type: boolean
          description: Наличие в документе табачной и никотиносодержащей продукции (N5). По умолчанию false (N5="0"). При значении true в параметре N5 необходимо передавать "1"
          default: false
    UnimsgForm:
      type: object
      description: Данные для создания универсального сообщения (multipart/form-data)
      required:
        - content
      properties:
        content:
          type: string
          format: binary
          description: Файл универсального сообщения в формате XML (DP_UNISOOBSCH)
    DocumentListResponse:
      type: object
      description: Список групп документов, найденных по заданным параметрам
      required:
        - items
        - has_next_page
      properties:
        items:
          type: array
          description: Информация о группах документов, найденных по заданным параметрам
          items:
            $ref: '#/components/schemas/DocumentListItem'
        has_next_page:
          type: boolean
          description: Признак наличия следующей страницы. true — есть данные для отображения на следующей странице; false — нет данных
    DocumentListItem:
      type: object
      description: Информация о группе (цепочке) документов
      properties:
        id:
          type: string
          description: Идентификатор последнего документа цепочки (UUID)
        created_at:
          type: integer
          description: Дата создания последнего документа цепочки в формате Unix timestamp в секундах
        date:
          type: integer
          description: Дата последнего документа цепочки в формате Unix timestamp в секундах
        documents:
          type: array
          description: Информация о документе в системе ЭДО Оператора
          items:
            $ref: '#/components/schemas/EdoDocument'
        group_id:
          type: string
          description: Идентификатор группы цепочки документов (UUID)
        number:
          type: string
          description: Номер последнего документа в цепочке. В документации указан тип integer, однако в примерах возвращается строка
        recipient:
          $ref: '#/components/schemas/Recipient'
        status:
          type: integer
          description: Статус последнего документа цепочки. См. справочник «Статусы документов» документации ЭДО Лайт
        total_price:
          type: number
          description: Общая сумма с НДС. В документации указан тип string, однако в примерах возвращается число
        total_vat_amount:
          type: number
          description: Общая сумма НДС. В документации указан тип string, однако в примерах возвращается число
        type:
          type: integer
          description: Код типа документа последнего в цепочке. См. справочник «Типы документов» документации ЭДО Лайт. В документации указан тип string, однако в примерах возвращается число
        create_time_stamp:
          type: integer
          description: Дата создания документа в формате timestamp
        export_time_stamp:
          type: integer
          description: Дата обработки документа в секундах
        product_group:
          type: integer
          description: Цифровое обозначение товарной группы. См. справочник «Список поддерживаемых товарных групп» документации ЭДО Лайт
        active_type:
          type: integer
          description: Тип поведения документа
    EdoDocument:
      type: object
      description: Информация о документе в системе ЭДО Оператора
      properties:
        id:
          type: string
          description: Идентификатор документа в системе ЭДО Оператора (UUID)
        created_at:
          type: integer
          description: Дата создания документа в формате Unix timestamp в секундах
        date:
          type: integer
          description: Дата документа в формате Unix timestamp в секундах
        number:
          type: string
          description: Номер документа. В документации указан тип integer, однако в примерах возвращается строка
        processed_at:
          type: integer
          description: Дата обработки документа в формате Unix timestamp в секундах
        revision:
          type: integer
          nullable: true
          description: Содержание атрибута ИспрСчФ
        status:
          type: integer
          description: Числовой статус документа. См. справочник «Статусы документов» документации ЭДО Лайт
        total_price:
          type: number
          description: Цена с НДС. В документации указан тип string, однако в примерах возвращается число
        total_vat_amount:
          type: number
          description: Сумма НДС. В документации указан тип string, однако в примерах возвращается число
        type:
          type: integer
          description: Код типа документа. См. справочник «Типы документов» документации ЭДО Лайт
        is_title_signed:
          type: boolean
          description: Признак наличия подписанного Титула покупателя
        created_by:
          type: integer
          description: Сервис, создавший документ. Допустимые значения — 0 (doc-off), 1 (edo-roaming)
          enum: [0, 1]
        created_hub:
          type: boolean
          description: Признак создания документа с помощью «1С:Хаб». В настоящий момент для всех документов приходит со значением false
        is_closed_lm_part:
          type: boolean
          nullable: true
          description: Признак закрытого логического сообщения (ЛС). Отвечает за признак поступления документа в составе ЛС закрытого типа
        package_status:
          type: integer
          nullable: true
          description: Статус закрытого пакета с документами (статус обработки пакета с документами в составе ЛС закрытого типа)
        uni_new_msg:
          type: boolean
          nullable: true
          description: Признак поступления к документу новой квитанции
    Recipient:
      type: object
      description: Объект с данными получателя группы документов
      properties:
        id:
          type: integer
          description: Идентификатор получателя в системе ЭДО Оператора
        extra_id:
          type: string
          description: UUID получателя документа
        participant_type:
          type: integer
          description: Тип организации получателя. Допустимые значения — 0 (юридическое лицо), 1 (индивидуальный предприниматель), 2 (нерезидент)
          enum: [0, 1, 2]
        inn:
          type: string
          description: ИНН получателя документа
        kpp:
          type: string
          description: КПП получателя документа
        ogrn:
          type: string
          description: ОГРН получателя документа
        name:
          type: string
          description: Наименование получателя документа
        fio:
          $ref: '#/components/schemas/RecipientFio'
        status:
          type: string
          description: Статус регистрации в ФНС
    RecipientFio:
      type: object
      nullable: true
      description: ФИО получателя документа
      properties:
        last_name:
          type: string
          description: Фамилия получателя документа
        first_name:
          type: string
          description: Имя получателя документа
        middle_name:
          type: string
          description: Отчество получателя документа
        address:
          type: string
          description: Адрес получателя документа
        legal_address:
          type: string
          description: Адрес в формате строки
    UnsignedEventsResponse:
      type: object
      description: Список квитанций, ожидающих подписания
      properties:
        items:
          type: array
          description: Информация о квитанциях
          items:
            $ref: '#/components/schemas/UnsignedEvent'
    UnsignedEvent:
      type: object
      description: Информация о квитанции, ожидающей подписания
      properties:
        id:
          type: string
          description: Идентификатор квитанции в формате GUID (event_id)
        type:
          type: integer
          description: Цифровое обозначение типа квитанции. См. справочник «Типы квитанций» документации ЭДО Лайт
        document:
          type: object
          description: Информация о документе
          properties:
            id:
              type: string
              description: Идентификатор документа в формате GUID
    MchdInfo:
      type: object
      description: Информация о МЧД в документообороте. Если документ / квитанция подписаны без МЧД, возвращается пустой JSON
      required:
        - id
        - type
        - created_at
        - mchd_id
        - mchd_inn_dov
        - mchd_status
      properties:
        id:
          type: string
          description: Идентификатор документа / квитанции из запроса (UUID)
        file_name:
          type: string
          description: Имя файла документа / квитанции без расширения. Не возвращается для 99 и 98 квитанций
        type:
          type: integer
          description: Тип документа / квитанции
        created_at:
          type: integer
          description: Дата создания документа / квитанции (timestamp)
        mchd_id:
          type: string
          description: Идентификатор МЧД (UUID)
        mchd_inn_dov:
          type: string
          description: ИНН доверителя
        name:
          type: string
          description: Наименование доверителя. Не возвращается, если данные отсутствуют в БД ГИС МТ
        mchd_date_from:
          type: integer
          description: Дата начала действия доверенности (timestamp). Не возвращается, если данные отсутствуют в БД ГИС МТ
        mchd_date_to:
          type: integer
          description: Дата окончания действия доверенности (timestamp). Не возвращается, если данные отсутствуют в БД ГИС МТ
        mchd_status:
          type: string
          description: |
            Статус МЧД на момент подписания документа / квитанции. Возможные значения:
            - ACTIVE — действительна;
            - CREATED — создана, в обработке;
            - PROCESSING — на проверке в ФНС;
            - EXPIRED — истёк срок действия;
            - REVOKED — отозвана;
            - REJECTED — не зарегистрирована;
            - NONE — не удалось проверить (возвращается также при отсутствии информации о статусе в БД ГИС МТ).
          enum: [ACTIVE, CREATED, PROCESSING, EXPIRED, REVOKED, REJECTED, NONE]
        mchd_fl_fio:
          type: string
          description: ФИО доверенного лица. Не возвращается, если данные отсутствуют в БД ГИС МТ
        mchd_fl_inn:
          type: string
          description: ИНН доверенного лица. Не возвращается, если данные отсутствуют в БД ГИС МТ
