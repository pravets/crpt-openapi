            - «Отсутствует или неверный формат заголовка запроса: multipart/form-data»;
            - «В теле запроса отсутствует файл» / «Отсутствует form-data key: content»;
            - «Неверный тип загружаемого файла: Content-Type: (...)»;
            - «Неверный тип документа загружаемого xml файла» (например, УКДи вместо УПД, УПД по старому приказу вместо нового);
            - «Неверный формат параметра "product_group" / "signature"»;
            - «Неверный формат параметра запроса "parent_id"»;
            - «Нет прав на подписание документа».

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: «Не найден связанный документ <идентификатор запрашиваемого документа>» — не найден УПД, для которого формируется УПДи
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: |
            Ошибка обработки документа. Типичные сообщения:
            - «Функция документа не соответствует функции родительского документа»;
            - «В документе не переданы данные о маркировке <наименование отсутствующего атрибута>...» — требуется указать признак наличия маркированных товаров (N3 = 1 в ИдФайл).

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/outgoing-documents/xml/unimsg/{doc_id}:
    post:
      tags:
        - Универсальные сообщения
      summary: Создание универсального сообщения через XML к исходящему документу / титулу продавца
      description: |
        Метод предназначен для создания универсального сообщения (УС) в формате XML к исходящему документу / титулу продавца.
        УС — вспомогательный электронный документ для передачи информации о событиях, связанных с основным документом
        (подписание, уточнение, аннулирование, отказ в подписи и др.).

        Коды статусов УС см. в справочнике «Коды универсальных сообщений» документации ЭДО Лайт
        (1999 — извещение о получении; 2999 — уведомление об уточнении; 3999 — отказ в принятии).

        Примечание: создание УС доступно только на интеграционном стенде. С 1 июля 2026 года будет осуществлён переход текущих методов
        на методы True API (см. «Планируемые изменения в True API»: https://docs.crpt.ru/gismt/Exchange/).

        Для исходящих документов доступно только создание УС-комментариев (11540021).
      operationId: createOutgoingUniversalMessage
      parameters:
        - $ref: '#/components/parameters/DocIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UnimsgForm'
      responses:
        '200':
          description: Универсальное сообщение успешно создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
              example:
                id: cd0ce000-0cd0-0c0c-0f0a-00000e0c000f
        '400':
          description: |
            Ошибка запроса. Типичные сообщения:
            - «Обмен УС со статусом {...} ограничен» — некорректный код УС;
            - «Для документа невозможно создать УС» — для исходящих документов доступно только создание УС-комментариев (11540021);
            - «Некорректное тело запроса» — тело запроса отсутствует;
            - «Значение элемента ИдОтпрУС / ИдПолучУС не совпадает с данными отправителя / получателя, указанными в ИдФайл»;
            - «Данные отправителя / получателя УС не совпадают с данными получателя / отправителя документа {filename}»;
            - «Не найден файл {Документ.СведУС.ИмяПолФайл} на который ссылается УС»;
            - «Имя загружаемого файла: {filename} не соответствует значению атрибута ИдФайл».

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: «Указанная в токене роль не разрешена при работе с документом»
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: «Документ не найден в БД» — не найден документ, для которого формируется универсальное сообщение
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
