openapi: 3.0.3
info:
  title: ЭДО Лайт API (Честный знак / ГИС МТ)
  description: |
    Спецификация API «ЭДО Лайт» системы «Честный знак» (ГИС МТ, ЦРПТ) для работы с документами и квитанциями.

    Источник: официальная документация https://docs.crpt.ru/gismt/Документация_по_API_ЭДО_Лайт/
    Дата генерации спецификации: 2026-07-16.

    Общие положения:
    - Авторизация в ЭДО доступна только участникам оборота товаров, зарегистрированным в Системе маркировки (ГИС МТ и «ИР Маркировки»).
    - Для использования методов API ЭДО Лайт необходимо получить токен аутентификации (срок действия — 10 часов) через методы True API: /auth/key и /auth/simpleSignIn (см. тег «Аутентификация»).
    - Поля с датой и временем при создании/редактировании документа или квитанции передаются как integer в формате timestamp (секунды Unix-времени).
    - При работе через API ЭДО Лайт действует ограничение на 1000 исходящих документов в год.
  version: "1.0.0"
servers:
  - url: https://edo-gismt.crpt.ru
    description: Промышленный стенд ГИС МТ (ЭДО Лайт)
  - url: https://edo.sandbox.crptech.ru
    description: Интеграционный стенд ГИС МТ (ЭДО Лайт)
tags:
  - name: Аутентификация
    description: Методы True API для получения токена аутентификации (выполняются на отдельных базовых URL)
  - name: Исходящие документы
    description: Загрузка, подписание и получение исходящих документов (УПД, УПДи, УКД, УКДи)
  - name: Входящие документы
    description: Получение входящих документов и загрузка файлов информации (титулов) покупателя
  - name: Квитанции
    description: 'Работа с квитанциями: извещения о получении, уведомления об уточнении, аннулирование'
  - name: Универсальные сообщения
    description: Создание универсальных сообщений (УС) к документам и квитанциям
  - name: МЧД
    description: Получение данных о машиночитаемых доверенностях (МЧД)
security:
  - bearerAuth: []
paths:
  /auth/key:
    servers:
      - url: https://markirovka.sandbox.crptech.ru/api/v3/true-api
        description: Демонстрационный контур (True API)
      - url: https://markirovka.crpt.ru/api/v3/true-api
        description: Промышленный контур (True API)
    get:
      tags:
        - Аутентификация
      summary: Запрос авторизации при единой аутентификации
      description: |
        Метод используется для получения уникальной пары: UUID (идентификатора текущей аутентификации) и сгенерированных случайных данных,
        которые в дальнейшем подписываются участником оборота товаров УКЭП и передаются в метод /auth/simpleSignIn для получения токена в формате UUID / JWT.

        1. Получение пары «uuid — data», где «uuid» — идентификатор текущей аутентификации, «data» — строка на подпись пользователю.
        2. Запрос авторизации обязателен для получения токена в формате JWT.
        3. Отправка в Систему маркировки данных в том же виде, в котором они были получены (пара «uuid — data»), только теперь «data» — подписанная УКЭП строка.
        4. Сервер отвечает сообщением с кодом 200 (ОК), либо сообщением об ошибке.

        Примечание: получение токена в формате UUID без предварительного запроса на получение уникальной пары доступно до сентября 2026 года.
      operationId: getAuthKey
      security: []
      responses:
        '200':
          description: Уникальная пара «uuid — data» успешно сгенерирована
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthKeyResponse'
              example:
                uuid: a63ff582-b723-4da7-958b-453da27a6c62
                data: GNUFBAZBMPIUUMLXNMIOGSHTGFXZMT
        '500':
          $ref: '#/components/responses/InternalError'
  /auth/simpleSignIn:
    servers:
      - url: https://markirovka.sandbox.crptech.ru/api/v3/true-api
        description: Демонстрационный контур (True API)
      - url: https://markirovka.crpt.ru/api/v3/true-api
        description: Промышленный контур (True API)
    post:
      tags:
        - Аутентификация
      summary: Получение ключа сессии при единой аутентификации
      description: |
        Метод используется для получения токена аутентификации (ключа сессии) в формате JWT или UUID по подписанным УКЭП случайным данным,
        полученным в методе /auth/key. Срок действия полученного токена — не более 10 часов с момента получения.

        Для токена в формате UUID срок не может превышать дату и время окончания срока действия УКЭП и/или МЧД.
        Если МЧД, на основании которой пользователю предоставлен доступ к системе, будет отозвана, токен будет автоматически аннулирован.
        При каждом запросе выдаётся новый токен (срок действия существующего токена не продлевается).

        Примечание: поддержка токена в формате JWT сохранена до конца 2026 года.
      operationId: simpleSignIn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimpleSignInRequest'
            example:
              uuid: a63ff582-b723-4da7-958b-453da27a6c62
              data: string
              inn: string
              details: string
              unitedToken: true
      responses:
        '200':
          description: |
            Токен успешно получен.
            - При запросе токена в формате JWT возвращается параметр «token» (JWT).
            - При запросе токена в формате UUID (unitedToken = true) возвращаются параметры «token», «uuidToken» и «expireDate».
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleSignInResponse'
              examples:
                jwt:
                  summary: Токен в формате JWT
                  value:
                    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e.........mk6qe0lB12w9zEs
                uuid:
                  summary: Токен в формате UUID
                  value:
                    token: string
                    uuidToken: 123e4567-e89b-12d3-a456-426655440000
                    expireDate: 2026-10-10T00:00:00.123Z
        '400':
          description: |
            Ошибка запроса. Типичные сообщения (в поле error_message):
            - «В запросе отсутствует идентификатор авторизации (UUID)» — не указан параметр uuid;
            - «В запросе отсутствует параметр data» — не указан параметр data;
            - «В параметре inn должен быть передан ИНН организации, под которой планируется авторизация от МЧД» — ИНН не равен 10 или 12 цифрам;
            - «Тело запроса не может быть пустым»;
            - «UUID не найден в хранилище ключей» — переданный uuid не найден в хранилище;
            - «Ошибка при проверке подписи» — data не подписан УКЭП или содержит не те данные;
            - «Подпись не валидна» — в data передано некорректное значение.

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: «Отсутствует доступ к ресурсу» — данные подписаны УКЭП сотрудника, не являющегося добавленным пользователем организации, под которой выполняется авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/outgoing-documents:
    get:
      tags:
        - Исходящие документы
      summary: Получение списка исходящих документов
