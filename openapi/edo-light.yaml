    post:
      tags:
        - Исходящие документы
      summary: Загрузка файла информации продавца УПД в формате XML
      description: |
        Метод предназначен для загрузки файла информации продавца (титула продавца) УПД по формату Приказа ФНС России № ЕД-7-26/970@ от 19.12.2023.

        При выполнении метода без параметра «signature» загруженный XML будет находиться в статусе «Черновик».
        При выполнении метода с параметром «signature» («Откреплённая УКЭП XML документа в формате base64») загруженный документ будет находиться в статусе «Отправлен».

        Метод не поддерживает загрузку УПД (ON_NSCHFDOPPRPROS) с признаком прослеживаемости (PROS).

        В зависимости от идентификатора ЭДО получателя документа (в *.xml значение «СвУчДокОбор.ИдПол») документ будет доставлен получателю в «ЭДО Лайт»
        или отправлен в роуминг; система проверит статус связи между отправителем и получателем в случае отправки документа в роуминг.

        При заполненном заголовке «send_mchd_file» система проверяет наличие информационных полей (ИнфПолФХЖ1) с наименованием «МЧД» в XML,
        берёт значение МЧД и передаёт указанную МЧД в виде файла в пакете с УПД и подписью.

        Форматы и XSD-схема размещены на сайте ФНС: https://www.nalog.gov.ru/rn77/about_fts/docs/8335278/
      operationId: uploadUpdSellerXml
      parameters:
        - $ref: '#/components/parameters/SendMchdFileHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SellerUpdForm'
      responses:
        '200':
          description: |
            Файл информации продавца успешно загружен.
            Идентификатор возвращается при успешном создании нового файла, а также при повторной загрузке файла,
            если файл с таким наименованием уже существует в системе (вернётся идентификатор ранее загруженного файла).
            По данному идентификатору можно производить с документом необходимые действия (редактирование, подписание и т. д.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
              example:
                id: 00000000-0000-0000-0000-000000000000
        '400':
          description: |
            Ошибка запроса. Типичные сообщения:
            - «Отсутствует или неверный формат заголовка запроса: multipart/form-data»;
            - «В теле запроса отсутствует файл» / «Отсутствует form-data key: content»;
            - «Неверный тип загружаемого файла: Content-Type: (...)»;
            - «Неверный тип документа загружаемого xml файла» (например, УПДи вместо УПД);
            - «Неверный формат параметра "product_group" / "signature" / "folder"»;
            - «Нет прав на подписание документа» — не пройдена проверка подписи;
            - «Невозможно создать документ. <наименование организации> не зарегистрирован в ГИС МТ».

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: |
            Ошибка обработки документа. Типичные сообщения:
            - «В ЭДО лайт нельзя создавать документы, содержащие сведения о прослеживаемом товаре» — загружен УПД с признаком прослеживаемости (PROS);
            - «Неверно заполнены сведения об МЧД в <тег с ошибкой из XML>».

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/outgoing-documents/xml/updi:
    post:
      tags:
        - Исходящие документы
      summary: Загрузка файла информации продавца УПДи в формате XML
      description: |
        Метод предназначен для загрузки файла информации продавца (титула продавца) УПДи по формату Приказа ФНС России № ЕД-7-26/970@ от 19.12.2023.

        При выполнении метода без параметра «signature» загружаемый документ будет находиться в статусе «Черновик»,
        с параметром «signature» — в статусе «Отправлен».

        Метод не поддерживает загрузку УПДи (ON_NSCHFDOPPRPROS) с признаком прослеживаемости (PROS).
      operationId: uploadUpdiSellerXml
      parameters:
        - $ref: '#/components/parameters/SendMchdFileHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SellerUpdiForm'
      responses:
        '200':
          description: Файл информации продавца УПДи успешно загружен (при повторной загрузке файла с тем же наименованием вернётся идентификатор ранее загруженного файла)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
              example:
                id: 00000000-0000-0000-0000-000000000000
        '400':
          description: |
            Ошибка запроса. Типичные сообщения:
            - «Отсутствует или неверный формат заголовка запроса: multipart/form-data»;
            - «В теле запроса отсутствует файл» / «Отсутствует form-data key: content»;
            - «Неверный тип загружаемого файла: Content-Type: (...)»;
            - «Неверный тип документа загружаемого xml файла»;
            - «Неверный формат параметра "product_group" / "signature" / "folder"»;
            - «Неверный формат параметра запроса "parent_id"»;
            - «Нет прав на подписание документа».

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: |
            Ошибка обработки документа. Типичные сообщения:
            - «В ЭДО лайт нельзя создавать документы, содержащие сведения о прослеживаемом товаре» — загружен УПДи с признаком PROS;
            - «Идентификатор ЭДО получателя документа отличается от Идентификатора получателя, указанного в корректируемом документе...»;
            - «Неверно заполнены сведения об МЧД в <тег с ошибкой из XML>».

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/outgoing-documents/xml/ukd:
    post:
      tags:
        - Исходящие документы
      summary: Загрузка информации продавца УКД (приказ № 189 от 13.04.2016) в формате XML
      description: |
        Метод предназначен для загрузки файла информации продавца УКД. Формат УКД регламентируется Приказом ФНС от 13 апреля 2016 г. № ММВ-7-15/189
        (https://www.nalog.gov.ru/rn77/about_fts/docs/6076582/).

        При выполнении метода без параметра «signature» загруженный документ будет находиться в статусе «Черновик»,
        с параметром «signature» — в статусе «Отправлен».
      operationId: uploadUkdSellerXml189
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SellerUkdForm'
      responses:
        '200':
          description: Файл информации продавца УКД успешно загружен (при повторной загрузке файла с тем же наименованием вернётся идентификатор ранее загруженного файла)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
              example:
                id: 00000000-0000-0000-0000-000000000000
        '400':
          description: |
            Ошибка запроса. Типичные сообщения:
            - «Отсутствует или неверный формат заголовка запроса: multipart/form-data»;
            - «В теле запроса отсутствует файл» / «Отсутствует form-data key: content»;
            - «Неверный тип загружаемого файла: Content-Type: (...)»;
            - «Неверный тип документа загружаемого xml файла»;
            - «Неверный формат параметра "product_group" / "signature" / "folder"»;
            - «Неверный формат параметра запроса "parent_id"»;
            - «Нет прав на подписание документа».

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/outgoing-documents/xml/ukd/736:
    post:
      tags:
        - Исходящие документы
      summary: Загрузка информации продавца УКД (приказ № 736 от 12.10.2020) в формате XML
      description: |
        Метод предназначен для загрузки файла информации продавца УКД. Формат УКД регламентируется Приказом ФНС от 12 октября 2020 г. № ЕД-7-26/736@
        (https://www.nalog.gov.ru/rn77/about_fts/docs/10223010/).

        При выполнении метода без параметра «signature» загруженный документ будет находиться в статусе «Черновик»,
        с параметром «signature» — в статусе «Отправлен».

        Метод не поддерживает загрузку УКД/УКД(и) (ON_NKORSCHFDOPPRPROS) с признаком прослеживаемости (PROS).

        По документации Content-Type: application/json — для интеграции с 1С; multipart/form-data — в остальных случаях
        (структура JSON-тела для интеграции с 1С в документации не приведена).
      operationId: uploadUkdSellerXml736
      parameters:
        - $ref: '#/components/parameters/SendMchdFileHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SellerUkd736Form'
          application/json:
            schema:
              type: object
              description: Вариант тела запроса для интеграции с 1С (структура тела в документации ЭДО Лайт не приведена)
      responses:
        '200':
          description: Файл информации продавца УКД успешно загружен (при повторной загрузке файла с тем же наименованием вернётся идентификатор ранее загруженного файла)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
              example:
                id: 00000000-0000-0000-0000-000000000000
        '400':
          description: |
            Ошибка запроса. Типичные сообщения:
            - «Отсутствует или неверный формат заголовка запроса: multipart/form-data»;
            - «В теле запроса отсутствует файл» / «Отсутствует form-data key: content»;
            - «Неверный тип загружаемого файла: Content-Type: (...)»;
            - «Неверный тип документа загружаемого xml файла» (например, УКДи вместо УКД);
            - «Неверный формат параметра "product_group" / "signature"»;
            - «Неверный формат параметра запроса "parent_id"»;
            - «Нет прав на подписание документа».

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: |
            Ошибка обработки документа. Типичные сообщения:
            - «В ЭДО лайт нельзя создавать документы, содержащие сведения о прослеживаемом товаре» — загружен УКД с признаком PROS;
            - «Идентификатор ЭДО получателя документа отличается от Идентификатора получателя, указанного в корректируемом документе...»;
            - «Неверно заполнены сведения об МЧД в <тег с ошибкой из XML>».

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
