  /api/v1/outgoing-documents/{doc_id}/signature:
    post:
      tags:
        - Исходящие документы
      summary: Подписание исходящего документа
      description: |
        Метод используется для добавления электронной откреплённой подписи к черновику файла информации продавца (УПД/УПДи/УКД/УКДи).
        В результате выполнения метода к документу добавляется откреплённая подпись, после чего документ отправляется получателю.

        Пример создания и подписания титула:
        1. Создаётся черновик документа методами загрузки файла информации продавца (УПД/УПДи/УКД) — возвращается doc_id документа.
        2. Запрашивается XML документа методом «Получение содержимого XML документа» с использованием doc_id — возвращается XML.
        3. XML подписывается и отправляется с использованием doc_id.

        Примечание: при попытке подписания и отправки документа участнику оборота товаров, не зарегистрированному в ГИС МТ,
        возвращается ошибка с кодом 400 («Невозможно создать документ. <наименование организации> не зарегистрирован в ГИС МТ»).
      operationId: signOutgoingDocument
      parameters:
        - $ref: '#/components/parameters/DocIdPath'
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              description: 'Откреплённая УКЭП в формате base64 (передаётся строкой в теле запроса, заголовок Content-encoding: base64)'
      responses:
        '200':
          description: Документ подписан и отправлен получателю
        '400':
          description: |
            Ошибка запроса. Типичные сообщения:
            - «Невозможно создать документ. <наименование организации> не зарегистрирован в ГИС МТ»;
            - «Нет прав на подписание документа» — не пройдена проверка подписи.

            Полный перечень ошибок см. в документации ЭДО Лайт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
