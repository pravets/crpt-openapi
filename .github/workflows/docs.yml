name: Deploy API Docs

on:
  push:
    branches: [master]
    paths:
      - 'openapi/**'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate OpenAPI specs (soft)
        continue-on-error: true
        run: |
          npx @scalar/cli document validate openapi/true-api.yaml --no-color || true
          npx @scalar/cli document validate openapi/edo-light.yaml --no-color || true

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp openapi/*.yaml dist/
          cp docs/*.html dist/
          touch dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
